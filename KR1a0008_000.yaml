body:
  text: 周易集解易類提要臣等謹案周易集解十七卷唐李鼎祚撰鼎祚唐書無𫝊始末未詳惟據序末結銜知其官為祕書省著作郎據袁桷清容居士集載資州有鼎祚讀書臺知為資州人耳朱睦㮮序稱為祕閣學士不知何據也其時代亦不可考舊唐書經籍志稱録開元盛時四部諸書而不載是編知為天寳以後人矣其書新唐書藝文志作十七卷晁公武讀書志曰今所有止十卷而始末皆全無所亡失豈後人併之耶經義考引李燾之言則曰鼎祚自序止云十卷無亡失也朱睦㮮序作于嘉靖丁巳亦云自序稱十卷與燾説同今所行毛晉汲古閣本乃作一十七卷序中亦稱王氏畧例附于卷末凡成一十八卷與諸家所説截然不同殊滋疑竇今考序中稱至如卦爻彖象理涉重元經注文言書之不盡别撰索隠錯綜根萌音義兩存詳之明矣云云則集解本十卷附畧例一卷為十一卷尚别有索隠六卷共成十七卷唐志所載葢併索隠畧例數之實非舛誤至宋而索隠散佚刋本又削去畧例僅存集解十卷故與唐志不符至毛氏刋本始析十卷為十七卷以合唐志之文又改序中一十卷為一十八卷以合附録畧例一卷之數故又與朱睦㮮序不符蓋自宋以來均未究序中别撰索隠一語故疑者誤疑改者誤改即辨其本止十卷者亦不能解唐志稱十七卷之故致愈説愈訛耳今詳為考正以祛將來之疑至十卷之本今既未見則姑仍以毛本著録盖篇帙分合無闗宏㫖固不必一一追改也其書仍用王弼本惟以序卦𫝊散綴六十四卦之首葢用毛詩分冠小序之例所採凡子夏孟喜焦贛京房馬融荀爽鄭元劉表何晏宋衷虞翻陸績干寳王肅王弼姚信王廙張璠向秀王凱沖侯果蜀才翟元韓康伯劉巘何妥崔憬沈驎士盧氏案盧氏周易注隋志已佚其名崔覲伏曼容孔穎達案以上三十二家朱睦㮮序所考姚規朱仰之蔡景君案以上三家朱彞尊經義考所補考等三十五家之説自序謂刋輔嗣之野文補康成之逸象盖王學既盛漢易遂亡千百年後學者得考見畫卦之本㫖者惟賴此書之存矣是真可寳之古笈也乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易集解原序序曰元氣氤氲三才成象神功浹洽八索成形在天則日月運行潤之以風雨在地則山澤通氣鼓之以雷霆至若近取諸身四支百體合其度遠取諸物森羅萬象備其工隂陽不測之謂神一隂一陽之謂道範圍天地而不過曲成萬物而不遺仁者見之以為仁知者見之以為知百姓日用而不知君子之道鮮矣斯乃顯諸仁而藏諸用神无方而易無體巍巍蕩蕩難可名焉逮乎天尊地卑君臣位列五運相繼父子道彰震巽索而男女分咸恒設而夫婦睦人倫之義旣闡家國之教鬱興故繋辭云古者庖犧氏王天下也始畫八卦以通神眀之德以類萬物之情作結繩而為罔罟以佃以漁蓋取諸離庖犧氏沒神農氏作斵木為耜揉木為耒耒耨之利以教天下蓋取諸益日中為市致天下之人聚天下之貨交易而退蓋取諸噬嗑神農氏沒黄帝堯舜氏作通其變使人不倦神其化使人宜之刳木為舟剡木為檝舟檝之利以濟不通蓋取諸渙服牛乘馬引重致遠蓋取諸隨古者穴居而野處後代聖人易之以宫室蓋取諸大壯弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽上古結繩為政後代易之書契百官以理萬人以察蓋取諸夬故聖人見天下之賾而擬諸形容象其物宜而觀其㑹通以行其典禮觸類而長之六十四卦三百八十四爻天下之能事畢矣其㫖遠其辭文其言曲而中其事肆而隱若夫雜物撰德辯是與非終日乾乾夕惕若厲無有師保如臨父母自天祐之吉无不利者也至於損以遠害説以先之定其交而後求安其身而後動履和而至謙尊而光能説諸心能研諸慮是故君子居則觀其象而玩其辭動則觀其變而玩其占蓍之德圓而神卦之德方以智探賾索隱鈎深致遠定天下之吉凶成天下之亹亹莫善乎蓍龜神以知來智以藏往將有為也問之以言其受命也應之如響無有遠邇幽深遂知來物故能窮理盡性利用安身聖人以此洗心退藏於密自然虚室生白吉祥至止坐忘遺照精義入神口僻焉不能言心困焉不能知微妙𤣥通深不可識易有聖人之道四焉斯之謂矣原夫權輿三教鈐鍵九流實開國承家修身之正術也自卜商入室親授㣲言傳注百家緜歴千古雖競有穿鑿猶未測淵深唯王鄭相㳂頗行于代鄭則多參天象王乃全釋人事且易之為道豈偏滯於天人者哉致使後學之徒紛然淆亂各修局見莫辯源流天象遠而難尋人事近而易習則折楊黃華嗑然而笑方以類聚其在兹乎臣少慕𤣥風遊心墳籍歴觀炎漢迄今巨唐採羣賢之遺言議三聖之幽賾集虞翻荀爽三十餘家刋輔嗣之野文補康成之逸象各列名義共契𤣥宗先儒有所未詳然後輒加添削每至章句僉例發揮俾童蒙之流一覽而悟達觀之士得意忘言當仁旣不讓於師論道豈慚於前哲至如卦爻彖象理涉重𤣥經注文言書之不盡别撰索隱錯綜根萌音義兩存詳之眀矣其王氏略例得失相叅采葑采菲無以下體仍附經末式廣未聞凡成一十八卷以貽同好冀將來君子無所疑焉祕書省著作郎臣李鼎祚序周易集解序予觀唐藝文志稱李鼎祚集註周易十七卷據鼎祚自序云十卷而首尾俱全初無亡失不知唐史何所據而云十七卷也崇文總目及邯鄲圖書志亦稱七篇逸葢承唐史之誤耳鼎祚解經多避唐諱又取序卦冠於各卦之首所引有子夏孟喜焦贛京房馬融荀爽鄭𤣥劉表何晏宋衷虞翻陸績干寳王肅王弼姚信王廙張璠向秀王凱沖侯果蜀才翟𤣥韓康伯劉巘何妥崔憬沈驎士盧氏崔覲伏曼容孔頴達凡三十二家又引九家易乾鑿度諸説義有未詳鼎祚乃加増削予嘗綜其義例蓋宗鄭學者也自商瞿之後註易者百家而鄭氏𤣥王氏弼為最顯鄭之學主象數王之學主名理漢晉以來二氏學竝立至劉宋初顔延之為祭酒黜鄭置王時陸澄王濟輩皆以為不可自是河汾諸儒多主于鄭江左及青齊多主于王唐興孔頴達受詔譔定五經正義于易獨取王傳而鄭學遂廢先代專門之業亦復不傳可勝嘆哉夫易有聖人之道四焉世之言理義之學者以其辭耳象變與占其可闕乎昔吳季札之魯觀樂見易象喜曰周禮盡在魯矣是故象者易之原也象成而後有辭辭著而後有變變見而後有占若乃顓尚文辭不復推原大傳天人之道岐而為二可乎康成去古未逺其所纂述必有所本鼎祚恐其失墜以廣其説均之為有禆于易者也是編刻自宋季人間希有存者頃歲予得之李中麓氏復用校梓以傳欲使聖人之道不致偏滯而自漢迄唐三十家之言亦不至埃滅弗聞也鼎祚資州人仕唐為秘閣學士以經學稱於時及閲唐列傳與蜀志俱不見其人豈遺之耶抑别有所載耶因附論著於此以俟博雅者考焉嘉靖丁巳冬十二月望日後學汴上睦㮮序
