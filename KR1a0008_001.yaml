body:
  text: 周易集解卷一唐李鼎祚撰乾下乾上乾元亨利貞案説卦乾健也言天之體以健為用運行不息應化无窮故聖人則之欲使人法天之用不法天之體故名乾不名天也子夏傳曰元始也亨通也利和也貞正也言乾稟純陽之性故能首出庶物各得元始開通和諧貞固不失其宜是以君子法乾而行四德故曰元亨利貞矣初九潛龍勿用崔憬曰九者老陽之數動之所占故陽稱焉潛隱也龍下隱地潛德不彰是以君子韜光待時未成其行故曰勿用子夏傳曰龍所以象陽也馬融曰物莫大於龍故借龍以喻天之陽氣也初九建子之月陽氣始動於黃泉旣未萌牙猶是潛伏故曰潛龍也沈驎士曰稱龍者假象也天地之氣有昇降君子之道有行藏龍之為物能飛能潛故借龍比君子之德也初九旣尚潛伏故言勿用干寳曰位始故稱初陽重故稱九陽在初九十一月之時自復來也初九甲子天正之位而乾元所始也陽處三泉之下聖德在愚俗之中此文王在羑里之爻也雖有聖眀之德未被時用故曰勿用九二見龍在田利見大人王弼曰出潛離隱故曰見龍處於地上故曰在田德施周普居中不偏雖非君位君之德也初則不彰三則乾乾四則或躍上則過亢利見大人唯二五焉鄭𤣥曰二於三才為地道地上卽田故稱田也干寳曰陽在九二十二月之時自臨來也二為地上田在地之表而有人功者也陽氣將施聖人將顯此文王免於羑里之日也故曰利見大人九三君子終日乾乾夕惕若厲无咎鄭𤣥曰三於三才為人道有乾德而在人道君子之象虞翻曰謂陽息至三已變成離離為日坤為夕荀爽曰日以喻君謂三居下體之終而為之君承乾行乾故曰乾乾夕惕以喻臣謂三臣於五則疾修柔順危去陽行故曰无咎干寳曰爻以氣表繇以龍興嫌其不關人事故著君子焉陽在九三正月之時自泰來也陽氣始出地上而接動物人為靈故以人事成天地之功者在於此爻焉故君子以之憂深思遠朝夕匪懈仰憂嘉㑹之不序俯懼義和之不逮反復天道謀始反終故曰終日乾乾此蓋文王反國大釐其政之日也凡无咎者憂中之喜善補過者也文恨早耀文眀之德以蒙大難增修柔順以懷多福故曰无咎矣九四或躍在淵无咎崔憬曰言君子進德修業欲及於時猶龍自試躍天疑而處淵上下進退非邪離羣故无咎干寳曰陽氣在四二月之時自大壯來也四虛中也躍者暫起之言旣不安於地而未能飛於天也四以初為應淵謂初九甲子龍之所由升也或之者疑之也此武王舉兵孟津觀釁而退之爻也守柔順則逆天人之應通權道則違經常之教故聖人不得已而為之故其辭疑矣九五飛龍在天利見大人鄭𤣥曰五於三才為天道天者清眀无形而龍在焉飛之象也虞翻曰謂四已變則五體離離為飛五在天故飛龍在天利見大人也謂若庖犧觀象於天造作八卦備物致用以利天下故曰飛龍在天天下之所利見也干寳曰陽在九五三月之時自夬來也五在天位故曰飛龍此武王克紂正位之爻也聖功旣就萬物旣覩故曰利見大人矣上九亢龍有悔王肅曰窮髙曰亢知進忘退故悔也干寳曰陽在上九四月之時也亢過也乾體旣備上位旣終天之鼓物寒暑相報聖人治世威德相濟武功旣成義在止戈盈而不反必陷於悔案以人事眀之若桀放於南巢湯有慚德斯類是也用九見羣龍无首吉劉瓛曰總六爻純九之義故曰用九也王弼曰九天之德也能用天德乃見羣龍之義焉夫以剛健而居人之首則物之所不與也以柔順而為不正則佞邪之道也故乾吉在无首坤利在永貞矣彖曰劉瓛曰彖者斷也斷一卦之才也大哉乾元九家易曰陽稱大六爻純陽故曰大乾者純陽衆卦所生天之象也觀乾之始以知天德惟天為大惟乾則之故曰大哉元者氣之始也萬物資始荀爽曰謂分為六十四卦萬一千五百二十策皆受始於乾也策取始於乾猶萬物之生稟於天乃統天九家易曰乾之為德乃統繼天道與天合化也雲行雨施品物流形虞翻曰已成旣濟上坎為雲下坎為雨故雲行雨施乾以雲雨流坤之形萬物化成故曰品物流形也大眀終始荀爽曰乾起坎而終於離坤起於離而終於坎離坎者乾坤之家而隂陽之府故曰大眀終始也六位時成荀爽曰六爻隨時而成乾時乘六龍以御天侯果曰大眀日也六位天地四時也六爻效彼而作也大眀以晝夜為終始六位以相揭為時成言乾乘六氣而陶冶變化運四時而統御天也故曰時乘六龍以御天也故乾鑿度曰日月終始萬物是其義也乾道變化各正性命保合大和乃利貞首出庶物萬國咸寧劉瓛曰陽氣為萬物之所始故曰首出庶物立君而天下皆寧故曰萬國咸寧也象曰案象者像也取其法象卦爻之德天行健何妥曰天體不健能行之德健也猶如地體不順承弱之勢順也所以乾卦獨變名為健者宋衷曰晝夜不懈以健詳其名餘卦當名不假於詳矣君子以自强不息虞翻曰君子謂三乾健故强天一日一夜過周一度故自强不息老子曰自勝者强干寳曰言君子通之於賢也凡勉强以德不必須在位也故堯舜一日萬幾文王日昃不暇食仲尼終夜不寢顔子欲罷不能自此以下莫敢淫心捨力故曰自强不息矣潛龍勿用陽在下也荀爽曰氣㣲位卑雖有陽德潛藏在下故曰勿用也見龍在田德施普也荀爽曰見者見居其位田謂坤也二當升坤五故曰見龍在田大人謂天子見據尊位臨長羣隂德施於下故曰德施普也終日乾乾反復道也虞翻曰至三體復故反復道謂否泰反其類也或躍在淵進无咎也荀爽曰乾者君卦四者隂位故上躍居五者欲下居坤初求陽之正地下稱淵也陽道樂進故曰進无咎也飛龍在天大人造也荀爽曰飛者喻无所拘天者首事造制大人造法見居天位聖人作而萬物覩是其義也亢龍有悔盈不可久也九家易曰陽當居五今乃居上故曰盈也亢極失位當下之坤三故曰盈不可久若太上皇者也下之坤三屈為諸侯故曰悔者也用九天德不可為首也宋衷曰用九六位皆九故曰見羣龍純陽則天德也萬物之始莫能先之不可為首先之者凶隨之者吉故曰无首吉文言曰劉瓛曰依文而言其理故曰文言姚信曰乾坤為門戸文説乾坤六十二卦皆放焉元者善之長也九家易曰乾者君卦也六爻皆當為君始而大通君德會合故元為善之長也亨者嘉之會也九家易曰通者謂陽合而為乾衆善相繼故曰嘉之會也利者義之和也荀爽曰隂陽相和各得其宜然後利矣貞者事之幹也荀爽曰隂陽正而位當則可以幹舉萬事君子體仁足以長人何妥曰此眀聖人則天合五常也仁為木木主春故配元為四德之首君子體仁故有長人之義也嘉會足以合禮何妥曰禮是交接會通之道故以配通五禮有吉凶賓軍嘉故以嘉合於禮也利物足以和義何妥曰利者裁成也君子體此利以利物足以合於五常之義貞固足以幹事何妥曰貞信也君子堅貞正可以委任於事故論語曰敬事而信故幹事而配信也案此釋非也夫在天成象者乾元亨利貞也言天運四時以生成萬物在地成形者仁義禮智信也言君法五常以教化於人元為善長故能體仁仁主春生東方木也通為嘉㑹足以合禮禮主夏養南方火也利為物宜足以和義義主秋成西方金也貞為事幹以配於智智主冬藏北方水也故孔子曰仁者樂山智者樂水則智之眀證矣不言信者信主土而統屬於君故中孚云信及豚魚是其義也若首出庶物而四時不忒者乾之象也厚德載物而五行相生者土之功也土居中宫分王四季亦由人君无為皇極而奄有天下水火金木非土不載仁義禮智非君不𢎞信旣統屬於君故先言乾而後不言信眀矣君子行此四德者故曰乾元亨利貞干寳曰夫純陽天之精氣四行君子懿德是故乾冠卦首辭表篇目眀道義之門在於此矣猶春秋之備五始也故夫子畱意焉然則體仁正已所以化物觀運知時所以順天氣用隨宜所以利民守正一業所以定俗也逾亂則敗禮其教淫逆則拂時其功否錯則妨用其事廢忘則失正其官敗四德者文王所由興四愆者商紂所由亡初九曰潛龍勿用何謂也何妥曰夫子假設疑問也後五爻皆放此也子曰龍德而隱者也何妥曰此直答言聖人有隱顯之龍德今居初九窮下之地隱而不見故云勿用矣不易乎世崔憬曰言據當潛之時不易乎世而行者龍之德也不成乎名鄭𤣥曰當隱之時以從世俗不自殊異无所成名也遯世无悶崔憬曰道雖不行達理无悶也不見是而无悶崔憬曰世人雖不已是而已知不違道故无悶樂則行之憂則違之虞翻曰隂出初震為樂為行故樂則行之坤死稱憂隱在坤中遯世无悶故憂則違之也確乎其不可拔潛龍也虞翻曰確剛貎也乾剛潛初坤亂於上君子弗用隱在下位確乎難拔潛龍之志也九二曰見龍在田利見大人何謂也子曰龍德而正中者也虞翻曰中下之中二非陽位故眀言能正中也庸言之信荀爽曰處和應坤故曰信庸行之謹九家易曰以陽居隂位故曰謹也庸常也謂言常以信行常以謹矣閑邪存其誠宋衷曰閑防也防其邪而存誠焉二在非其位故以閑邪言之能處中和故以存誠言之善世而不伐九家易曰陽升居五處中居上始以美德利天下不言所利卽是不伐故老子曰上德不德是以有德此之謂也德博而化荀爽曰處五據坤故德博羣隂順從故物化也易曰見龍在田利見大人君德也虞翻曰陽始觸隂當升五為君時舍於二宜利天下直方而大德无不利眀言君德地數始二故稱易曰九三曰居子終日乾乾夕惕若厲无咎何謂也子曰君子進德修業虞翻曰乾為德坤為業以乾通坤謂為進德修業宋衷曰業事也三為三公君子處公位所以進德修業也忠信所以進德也翟𤣥曰忠於五所以修德也崔憬曰推忠於人以信待物故其德日新也修辭立其誠所以居業也荀爽曰修辭謂終日乾乾立誠謂夕惕若厲居業謂居三也翟𤣥曰居三修其教令立其誠信民敬而從之知至至之可與幾也翟𤣥曰知五可至而至之故可與行幾㣲之事也知終終之可與存義也姚信曰知終者可以知始終終謂三也義者宜也知存知亡君子之宜矣崔憬曰君子喻文王也言文王進德修業所以貽厥武王至於九五至於九五可與進修意合故言知至至之可與言㣲也知天下歸周三分有二以服事殷終於臣道終於臣道可與進修意合故言知終終之可與存義是故居上位而不驕虞翻曰天道三才一乾而以至三乾成故為上夕惕若厲故不驕也在下位而不憂虞翻曰下位謂初隱於初憂則違之故不憂故乾乾因其時而惕雖危无咎矣王弼曰惕怵惕也處事之極失時則廢懈怠則曠故乾乾因其時而惕雖危无咎九四曰或躍在淵无咎何謂也子曰上下无常非為邪也荀爽曰乾者君卦四者臣位也故欲進躍居五下者當下居坤初德陽正位故曰上下无常非為邪也進退无恒非離羣也荀爽曰進謂居五退謂居三故進退无恒非離羣也君子進德修業欲及時也故无咎崔憬曰至公欲及時濟人故无咎也九五曰飛龍在天利見大人何謂也子曰同聲相應虞翻曰謂震巽也庖犧觀變而放八卦雷風相薄故相應也張璠曰天者陽也君者陽也雷風者天之聲號令者君之聲眀君與天地相應合德同化動靜不違也同氣相求虞翻曰謂艮兌山澤通氣故相求也崔憬曰方諸與月同有隂氣相感則水生陽燧與日同有陽氣相感則火出也水流濕荀爽曰陽動之坤而為坎坤者純隂故曰濕也火就燥荀爽曰隂動之乾而成離乾者純陽故曰燥也虞翻曰離上而坎下水火不相射崔憬曰决水先流濕闕火先就燥雲從龍荀爽曰龍喻王者謂乾二之坤五為坎也虞翻曰乾為龍雲生天故從龍也風從虎荀爽曰虎喻國君謂坤五之乾二為巽而從三也三者下體之君故以喻國君虞翻曰坤為虎風生地故從虎也聖人作而萬物覩虞翻曰覩見也聖人則庖犧合德乾五造作八卦以通神眀之德以類萬物之情五動成離日出照物皆相見故曰聖人作而萬物覩也陸績曰陽氣至五萬物茂盛故譬以聖人在天子之位功成制作萬物咸見之矣本乎天者親上荀爽曰謂乾九二本出於乾故曰本乎天而居坤五故曰親上本乎地者親下荀爽曰謂坤六五本出於坤故曰本乎地降居乾二故曰親下也崔憬曰謂動物親於天之動植物親於地之靜則各從其類也虞翻曰方以類聚物以羣分乾道變化各正性命觸類而長故各從其類上九曰亢龍有悔何謂也子曰貴而无位荀爽曰在上故貴失位故无位高而无民何妥曰旣不處九五帝王之位故无民也夫率土之濱莫非王臣旣非王位則民不𨽻屬也賢人在下位荀爽曰謂上應三三陽德正故曰賢人别體在下故曰在下位而无輔荀爽曰兩陽无應故无輔是以動而有悔也荀爽曰升極當降故有悔潛龍勿用下也何妥曰此第二章以人事眀之當帝舜耕漁之日卑賤處下未為時用故云下見龍在田時舍也何妥曰此夫子洙泗之日開張業藝教授門徒自非通舍孰能如此虞翻曰二非王位時暫舍也終日乾乾行事也何妥曰此當文王為西伯之時處人臣之極必須事上接下故言行事也或躍在淵自試也何妥曰欲進其道猶復疑惑此當武王觀兵之日欲以試觀物情也飛龍在天上治也何妥曰此當堯舜冕旒之日以聖德而居髙位在上而治民也亢龍有悔窮之災也案此當桀紂失位之時亢極驕盈故致悔恨窮斃之災禍也乾元用九天下治也案此當三皇五帝禮讓之時垂拱无為而天下治矣王弼曰此一章全以人事眀之也九陽也陽剛直之物也夫能全用剛直放遠善柔非天下之至治未之能也故乾元用九則天下治也夫識物之動則其所以然之理皆可知也龍之為德不為妄也潛而勿用何乎必窮處於下也見而在田必以時之通舍也以爻為人以位為時人不妄動則時皆可知也文王眀夷則主可知矣仲尼旅人則國可知矣潛龍勿用陽氣潛藏何妥曰此第三章以天道眀之當十一月陽氣雖動猶在地中故曰潛龍也見龍在田天下文眀案陽氣上達於地故曰見龍在田百草萌牙孚甲故曰文眀孔穎達曰先儒以為九二當太簇之月陽氣見地則九三為建辰之月九四為建午之月九五為建申之月上九為建戌之月羣隂旣盛上九不得言與時偕極先儒此説於理稍乖此乾之陽氣漸生似聖人漸進宜據十一月之後建巳之月已來此九二爻當建丑建寅之間於時地之萌芽物有生者卽是陽氣發見之義也但隂陽二氣共成歲功故隂興之時仍有陽在陽生之月尚有隂氣所以六律六吕隂陽相關取象論義與此不殊也終日乾乾與時偕行何妥曰此當三月陽氣浸長萬物將盛與天之運俱行不息也或躍在淵乾道乃革何妥曰此當五月㣲隂初起陽將改變故云乃革也飛龍在天乃位乎天德何妥曰此當七月萬物盛長天功大成故云天德也亢龍有悔與時偕極何妥曰此當九月陽氣大衰向將極盡故云偕極也乾元用九乃見天則何妥曰陽消天氣之常天象法則自然可見案王弼曰此一章全説天氣以眀之也九剛直之物唯乾體能用之用純剛以觀天天則可見矣乾元者始而亨者也虞翻曰乾始開通以陽通隂故始通利貞者性情也干寳曰以施化利萬物之性以純一正萬物之情王弼曰不為乾元何能通物之始不性其情何能久行其正是故始而亨者必乾元也利而正者必性情也乾始能以美利利天下虞翻曰美利謂雲行雨施品物流形故利天下也不言所利大矣哉虞翻曰天何言哉四時行焉百物生焉故利者大也大哉乾乎剛健中正純粹精也崔覲曰不雜曰純不變曰粹言乾是純粹之精故有剛健中正之四德也六爻發揮旁通情也陸績曰乾六爻發揮變動旁通於坤坤來入乾以成六十四卦故曰旁通情也時乘六龍九家易曰謂時之元氣以王而行履涉衆爻是乘六龍也以御天也荀爽曰御者行也陽升隂降天道行也雲行雨施天下平也荀爽曰乾升於坤曰雲行坤降於乾曰雨施乾坤二卦成兩旣濟隂陽和均而得其正故曰天下平君子以成德為行干寳曰君子之行動靜可觀進退可度動以成德无所茍行也日可見之行也虞翻曰謂初乾稱君子陽出成為上德雲行雨施則成離日新之謂上德故日可見之行潛之為言也隱而未見行而未成是以君子弗用也荀爽曰隱而未見謂居初也行而未成謂行之坤四陽居隂位未成為君乾者君卦也不成為君故不用也君子學以聚之問以辯之虞翻曰謂二陽在二兌為口震為言為講論坤為文故學以聚之問以辯之兌象君子以朋友講習寛以居之仁以行之虞翻曰震為寛仁為行謂居寛行德博而化也易曰見龍在田利見大人君德也虞翻曰重言君德者大人善世不伐信有君德後天而奉天時故詳言之九三重剛而不中虞翻曰以乾接乾故重剛位非二五故不中也上不在天下不在田何妥曰上不及五故云不在天下已過二故云不在田處此之時實為危厄也故乾乾因其時而惕雖危无咎矣何妥曰處危懼之地而能乾乾懷厲至夕猶惕乃得无咎矣九四重剛而不中案三居下卦之上四處上卦之下俱非得中故曰重剛而不中也上不在天下不在田中不在人侯果曰案下繫易有天道有地道有人道兼三才而兩之謂兩爻為一才也初兼二地也三兼四人也五兼六天也四是兼才非正故言不在人也故或之或之者疑之也故无咎虞翻曰非其位故疑之也夫大人者乾鑿度曰聖眀德備曰大人也與天地合其德荀爽曰與天合德謂居五也與地合德謂居二也案謂撫育无私同天地之覆載也與日月合其眀荀爽曰謂坤五之乾二成離離為日乾二之坤五為坎坎為月案威恩遠被若日月之照臨也與四時合其序翟𤣥曰乾坤有消息從四時來也又案賞罰嚴眀順四時之序也與鬼神合其吉凶虞翻曰謂乾神合吉坤鬼合凶以乾之坤故與鬼神合其吉凶案禍淫福善叶鬼神之吉凶矣先天而天弗違虞翻曰乾為天為先大人在乾五乾五之坤五天象在先故先天而天弗違崔憬曰行人事合天心也後天而奉天時虞翻曰奉承行乾三之坤初成震震為後也震春兌秋坎冬離夏四時象具故後天而奉天時謂承天時行順也崔憬曰奉天時布行聖政也天且弗違况於人乎荀爽曰人謂三况於鬼神乎荀爽曰神謂天鬼謂地也案大人惟德動天無遠弗届鬼神饗德夷狄來賔人神叶從猶風偃草豈有違忤哉亢之為言也知進而不知退荀爽曰陽位在五今乃居上故曰知進而不知退也知存而不知亡荀爽曰在上當隂今反為陽故曰知存而不知亡也知得而不知喪荀爽曰得謂陽喪謂隂又案此論人君驕盈過亢必有喪亡若殷紂招牧野之災太康遘洛水之怨卽其類矣其唯聖人乎知進退存亡而不失其正者其唯聖人乎荀爽曰進謂居五退謂居二存謂五為陽位亡謂上為隂位也再稱聖人者上聖人謂五下聖人謂二也案此則乾元用九天下治也言大寳聖君若能用九天德者垂拱無為芻狗萬物生而不有功成不居百姓日用而不知豈荷生成之德者也此則三皇五帝乃聖乃神保合太和而天下自治矣今夫子文言再稱聖人者歎美用九之君能知進退存亡而不失其正故得大眀終始萬國咸寧時乘六龍以御天也斯卽有始有卒者其唯聖人乎是其義也崔憬曰謂失其正者若燕噲讓位於子之之類是也案三王五伯揖讓風頽専恃干戈遞相征伐失正忘退其徒實繁略舉宏綱斷可知矣周易集解卷一
