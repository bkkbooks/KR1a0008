body:
  text: 周易集解卷二唐李鼎祚撰坤下坤上坤元亨利牝馬之貞干寶曰隂氣之始婦德之常故稱元與乾合德故稱亨行天者莫若龍行地者莫若馬故乾以龍繇坤以馬象也坤隂類故稱利牝馬之貞矣虞翻曰謂隂極陽生乾流坤形坤含光大凝乾之元終於坤亥出乾初子品物咸亨故元亨也坤為牝震為馬初動得正故利牝馬之貞矣君子有攸往先迷後得主利盧氏曰坤臣道也妻道也後而不先先則迷失道矣故曰先迷隂以陽為主當後而順之則利故曰後得主利九家易曰坤為牝為迷西南得朋東北喪朋安貞吉崔憬曰妻道也西方坤兑南方巽離二方皆隂與坤同類故曰西南得朋東方艮震北方乾坎二方皆陽與坤非類故曰東北喪朋以喻在室得朋猶迷於失道出嫁喪朋乃順而得常安於承天之正故言安貞吉也彖曰至哉坤元九家易曰謂乾氣至坤萬物資受而以生也坤者純隂配乾生物亦善之始地之象也故又歎言至美萬物資生九家易曰謂萬一千五百二十策皆受始於乾由坤而生也策生於坤猶萬物成形出乎地也乃順承天劉瓛曰萬物資生於地故地承天而生也坤厚載物蜀才曰坤以廣厚之德載含萬物無有窮竟也德合無疆蜀才曰天有無疆之德而坤合之故云德合無疆也含𢎞光大荀爽曰乾二居坤五為含坤五居乾二為𢎞坤初居乾四為光乾四居坤初為大也品物咸亨荀爽曰天地交萬物生故咸亨崔憬曰含育萬物為𢎞光華萬物為大動植各遂其性故言品物咸亨也牝馬地類行地無疆侯果曰地之所以含𢎞物者以其順而承天也馬之所以行地遠者以其柔而伏人也而又牝馬順之至也誡臣子當至順故作易者取象焉柔順利貞君子攸行九家易曰謂坤爻本在柔順隂位則利正之乾則陽爻來據之故曰君子攸行先迷失道後順得常何妥曰隂道惡先故先致迷失後順於主則保其常慶也西南得朋乃與類行虞翻曰謂陽得其類月朔至望從震至乾與時偕行故乃與類行東北喪朋乃終有慶虞翻曰陽喪滅坤坤終復生謂月三日震象出庚故乃終有慶此指說易道隂陽消息之大要也謂陽月三日變而成震出庚至月八日成兌見丁庚西丁南故西南得朋謂二陽為用故兊君子以朋友講習文言曰敬義立而德不孤彖曰乃與類行二十九日消乙入坤滅藏於癸乙東癸北故東北喪朋謂之以坤滅乾坤為喪故也馬君云孟秋之月隂氣始著而坤之位同類相得故西南得朋孟春之月陽氣始著隂始從陽失其黨類故東北喪朋失之甚矣而荀君以為隂起於午至申三隂得坤一體故曰西南得朋陽起於子至寅三陽喪坤一體故東北喪朋就如荀說從午至申經當言南西得朋子至寅當言北東喪朋以乾變坤而言喪朋經以乾卦為喪耶此何異於馬也安貞之吉虞翻曰坤道至靜故安復初得正故貞吉應地無疆虞翻曰震為應陽正於初以承坤隂地道應故應地無疆象曰地勢坤王弼曰地形不順矣宋衷曰地有上下九等之差故以形勢言其性也君子以厚德載物虞翻曰勢力也君子謂乾陽為德動在坤下君子之德車故厚德載物老子曰勝人者有力也初六履霜堅冰至干寶曰重隂故稱六剛柔相推故生變占變故有爻繫曰爻者言乎變者也故易繫辭皆稱九六也陽數奇隂數偶是以乾用一也坤用二也隂氣在初五月之時自姤來也隂氣始動乎三泉之下言隂氣動矣則必至於履霜履霜則必至於堅冰言有漸也藏器於身貴其俟時故陽在潛龍戒以勿用防禍之原欲其先幾故隂在三泉而顯以履霜也象曰履霜堅冰隂始凝也馴致其道至堅冰也九家易曰霜者乾之命也堅冰者隂功成也謂坤初六之乾四履乾命令而成堅冰也此封本乾陰始消陽起於此爻故履霜也馴猶順也言陽順隂之性成堅冰矣初六始姤姤為五月盛夏而言堅冰五月隂氣始生地中言始於微霜終至堅冰以眀漸順至也六二直方大荀爽曰大者陽也二應五五下動之則應陽出直布陽於四方不習無不利荀爽曰物唱乃和不敢先有所習陽之所唱從而和之無不利也干寶曰隂氣在二六月之時自遁來也隂出地上佐陽成物臣道也妻道也臣之事君妻之事夫義成者也臣貴其直義尚其方地體其大故曰直方大士該九德然後可以從王事女躬四教然後可以配君子道成於我而用之於彼不方以仕學為政不方以嫁學為婦故曰不習無不利也象曰六二之動直以方也九家易曰謂陽下動應之則直而行布陽氣動於四方也不習無不利地道光也干寶曰女德光於夫士德光於國也六三含章可貞虞翻曰貞正也以隂包陽故含章三失位發得正故可貞也或從王事無成有終虞翻曰謂三已發成泰乾為主坤為事震為從故或從王事地道無成而有終故無成有終干寶曰隂氣在三七月之時自否來也陽降在四三公位也隂升在三三公事也上失其權位在諸侯坤體既具隂黨成羣君弱臣强戒在二國唯文德之臣然後可以遭之運而不失其柔順之正坤為文坤象既成故曰含章可貞此蓋平襄之王垂拱以賴晉鄭之輔也茍利社稷專之則可故曰或從王事遷都誅親疑於專命故亦或之失後順之節故曰無成終於濟國安民故曰有終象曰含章可貞以時發也崔憬曰陽命則發非時則含也或從王事知光大也干寶曰位彌高德彌廣也六四括囊無咎無譽虞翻曰括結也謂泰反成否坤為囊艮為手巽為繩故括囊在外多咎也得位承五繫於包桑故無咎隂在二多譽而遠在四故無譽干寶曰隂氣在四八月之時自觀來也天地將閉賢人必隱懷智茍容以觀時舋此蓋寧戚蘧瑗與時卷舒之爻也不艱其身則無咎功業不建故無譽也象曰括囊無咎愼不害也盧氏曰愼言則無咎也六五黃裳元吉干寶曰隂氣在五九月之時自剝來也剝者反常道也黃中之色裳下之飾元善之長也中美能黃上美為元下美則裳隂登於五柔居尊位若成昭之主周霍之臣也百官總已專斷萬幾雖情體信順而貌近僭疑周公其猶病諸言必忠信行必篤敬然後可以取信於神眀無尤於四海也故曰黃裳元吉也象曰黃裳元吉文在中也王肅曰坤為文五在中故曰文在中也干寶曰當總己之任處僭疑之間而能終元吉之福者由文德在中也上六龍戰于野荀爽曰消息之位坤在於亥下有伏乾為其兼於陽故稱龍也其血𤣥黃九家易曰實本坤體未離其類故稱血焉血以喻隂也𤣥黃天地之雜言乾坤合居也侯果曰坤十月卦也乾位西北又當十月隂窮於亥窮隂薄陽所以戰也故說卦云戰乎乾是也六稱龍者隂盛似龍故稱龍也干寶曰隂在上六十月之時也爻終於酉而卦成於乾乾體純剛不堪隂盛故曰龍戰戌亥乾之都也故稱龍焉隂德過度以逼乾戰郭外曰郊郊外曰野坤位未申之維而氣溢酉戌之間故曰于野未離隂類故曰血隂陽色雜故曰𤣥黃言隂陽離則異氣合則同功君臣夫妻其義一也故文王之忠於殷抑參二之强以事獨夫之紂蓋欲彌縫其闕而匡救其惡以祈殷命以濟生民也紂遂長惡不悛天命殛之是以至於武王遂有牧野之事是其義也象曰龍戰于野其道窮也干寶曰天道窮至於隂陽相薄也君德窮至於攻戰受誅也柔順窮至於用權變矣用六利永貞干寶曰隂體其順臣守其柔所以秉義之和履貞之幹唯有推變終歸於正是周公始於負扆南面以先王道卒於復子眀辟以終臣節故曰利永貞也矣象曰用六永貞以大終也侯果曰用六妻道也臣道也利在長正矣不長正則不能大終陽事也文言曰何妥曰坤文言唯一章者以一心奉順於主也坤至柔荀爽曰純隂至順故柔也而動也剛九家易曰坤一變而成震隂動生陽故動也剛至靜而德方荀爽曰坤性至靜得陽而動布於四方也後得主而有常虞翻曰坤隂先迷後順得常陽出初震為主為常也含萬物而化光干寶曰光大也謂坤含藏萬物順承天施然後化光也坤道其順乎承天而時行荀爽曰承天之施因四時而行之也積善之家必有餘慶虞翻曰謂初乾為積善以坤牝陽滅出復震為餘慶謂東北喪朋乃終有慶也積不善之家必有餘殃虞翻曰坤積不善以臣弒君以乾通坤極姤生巽為餘殃也案聖人設教理貴隨宜故夫子先論人事則不語怪力亂神絶四毋必今於易象闡揚天道故曰積善之家必有餘慶積不善之家必有餘殃者欲眀陽生隂殺天道必然理國修身積善為本故於坤爻初六隂始生時著此微言永為深誡欲使防萌杜漸災害不生開國承家君臣同德者也故繫辭云善不積不足以成名惡不積不足以滅身是其義也臣弒其君子弒其父虞翻曰坤消至二艮子弒父至三成否坤臣弒君上下不交天下無邦故子弒父臣弒君也非一朝一夕之故其所由來者漸矣虞翻曰剛爻為朝柔爻為夕乾為寒坤為暑相推而成歲焉故非一朝一夕所由來漸矣由辨之不早辨也孔穎達曰臣子所以久包禍心由君父不早辨眀故也此文誡君父防臣子之惡也易曰履霜堅冰至蓋言順也荀爽曰霜者乾之命令坤下有伏乾履霜堅冰蓋言順也乾氣加之性而堅象臣順君命而成之直其正也方其義也虞翻曰謂二陽稱直乾其靜也專其動也直故直其正方謂闢陽開為方坤其靜也翕其動也闢故方其義也君子敬以直內義以方外敬義立而德不孤虞翻曰陽息在二故敬以直內坤位在外故義以方外謂陽見兌丁西南得朋乃與類行故德不孤孔子曰必有鄰也直方大不習無不利則不疑其所行也荀爽曰直方大乾之唱也不習無不利坤之和也陽唱隂和而無所不利故不疑其所行也隂雖有美含之以從王事弗敢成也荀爽曰六三陽位下有伏陽坤隂卦也雖有伏陽含藏不顯以從王事要待乾命不敢自成也地道也妻道也臣道也翟𤣥曰坤有此三者也地道無成而代有終也宋衷曰臣子雖有才美含藏以從其上不敢有所成名也地得終天功臣得終君事婦得終夫業故曰而代有終也天地變化草木蕃虞翻曰謂陽息坤成泰天地反以乾變坤坤化升乾萬物出震故天地變化草木蕃矣天地閉賢人隱虞翻曰謂四泰反成否乾稱賢人隱藏坤中以儉德避難不榮以祿故賢人隱矣易曰括囊無咎無譽蓋言謹也荀爽曰今四隂位迫近於五雖有成德當括而囊之謹愼畏敬也孔穎達曰括結也囊所以貯物以譬心藏智也閉其智而不用故曰括囊不與物忤故無咎功名不顯故無譽也君子黃中通理正位居體虞翻曰謂五坤息體觀地色黃坤為理以乾通坤故稱通理五正陽位故曰正位艮為居體謂四支也艮為兩肱巽為兩股故曰黃中通理正位居體美在其中而暢於四支虞翻曰陽稱美在五中四支謂股肱發於事業九家易曰天地交而萬物生也謂陽德潛藏變則發見若五動為比乃事業之盛美之至也侯果曰六五以中和通理之德居體於正位故能美充於中而旁暢於萬物形於事業無不得宜是美之至也隂疑於陽必戰孟喜曰隂乃上薄疑似於陽必與陽戰也為其嫌於無陽也故稱龍焉九家易曰隂陽合居故曰嫌陽謂上六坤行至亥下有伏乾陽者變化以喻龍焉猶未離其類也故稱血焉荀爽曰實本坤卦故曰未離其類也血以喻隂順陽也崔憬曰乾坤交㑹乾為大赤伏隂柔之故稱血焉夫𤣥黃者天地之雜也荀爽曰消息之卦坤位在亥下有伏乾隂陽相和故言天地之雜也天𤣥而地黃王凱沖曰隂陽交戰故血𤣥黃荀爽曰天者陽始於東北故色𤣥也地者隂始於西南故色黃也序卦曰有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者萬物之始生也崔憬曰此仲尼序文王次卦之意也不序乾坤之次者以一生二二生三三生萬物則天地之次第可知而萬物之先後宜序也萬物之始生者言剛柔始交故萬物資始於乾而資生於坤震下坎上屯元亨利貞虞翻曰坎二之初剛柔交震故元亨之初得正故利貞矣勿用有攸往利建侯虞翻曰之外稱往初震得正起之欲應動而失位故勿用有攸往震為侯初剛難拔故利以建侯老子曰善建者不拔也彖曰屯剛柔始交而難生虞翻曰乾剛坤柔坎二交初故始交確乎難拔故難生也崔憬曰十二月陽始浸長而交於隂故曰剛柔始交萬物萌牙生於地中有寒冰之難故言難生於人事則是運季業初之際也動乎險中大亨貞荀爽曰物難在始生此本坎卦也案初六升二九二降初是剛柔始交也交則成震震為動也上有坎是動乎險中也動則物通而得正故曰動乎險中大亨貞也雷雨之動滿盈荀爽曰雷震雨潤則萬物滿盈而生也虞翻曰震雷坎雨坤為盈也謂三已反正成既濟坎水流坤故滿盈謂雷動雨施品物流形也天造草昧荀爽曰謂陽動在下造物於冥昧之中也宜建侯而不寧荀爽曰天地初開世尚屯難震位承乾故宜建侯動而遇險故不寧也虞翻曰造造生也草草創物也坤冥為昧故天造草昧成既濟定故曰不寧言寧也干寶曰水運將終木德將始殷周際也百姓盈盈匪君子不寧天下既遭屯險之難後王宜蕩之以雷雨之政故封諸侯以寧之也象曰雲雷屯九家易曰雷雨者興養萬物今言屯者十二月雷伏藏地中未得動出雖有雲雨非時長育故言屯也君子以經綸荀爽曰屯難之代萬事失正經者常也綸者理也君子以經綸不失常道也姚信曰經緯也時在屯難是天地經綸之日故君子法之須經綸艱難也初九盤桓利居貞利建侯虞翻曰震起艮止動乎險中故盤桓得正得民故利居貞謂君子居其室愼密而不出也象曰雖盤桓志行正也荀爽曰盤桓者動而退也謂陽從二動而退居初雖盤桓得其正也以貴下賤大得民也荀爽曰陽貴而隂賤陽從二來是以貴下賤所以得民也六二屯如邅如荀爽曰陽動而止故屯如也隂乘於陽故邅如也乘馬班如虞翻曰屯邅盤桓謂初也震為馬作足二乘初故乘馬班躓也馬不進故班如矣匪寇婚媾女子貞不字十年乃字虞翻曰匪非也寇謂五坎為寇盜應在坎故匪寇隂陽得正故婚媾字妊娠也三失位變復體離離為女子為大腹故稱字今失位為坤離象不見故女子貞不字坤數十三動反正離女大腹故十年反常乃字謂成既濟定也象曰六二之難乘剛也崔憬曰下乘初九故為之難也十年乃字反常也九家易曰隂出於坤今還為坤故曰反常也隂出於坤謂乾再索而得坎今變成震中有坤體故言隂出於坤今還於坤謂二從初即逆應五順也去逆就順隂陽道正乃能長養故曰十年乃字六三即鹿無虞惟入于林中虞翻曰即就也虞謂虞人掌禽獸者艮為山山足稱鹿鹿林也三變體坎坎為藂木山下故稱林中坤為兕虎震為麋鹿又為驚走艮為狐狼三變禽走入于林中故曰即鹿無虞惟入于林中矣君子幾不如舍往吝虞翻曰君子謂陽已正位幾近舍置吝疵也三應於上之應歷險不可以往動如失位故不如舍之往必吝窮矣象曰即鹿無虞以從禽也案白虎通云禽者何鳥獸之總名為人所禽制也即比卦九五爻辭王用三驅失前禽是其義也君子舍之往吝窮也崔憬曰君子見動之微逆知無虞則不如舍而往往則吝窮也六四乘馬班如虞翻曰乘三也謂三已變坎為馬故曰乘馬馬在險中故班如也或說乘初初為建侯安得乘之也求婚媾往吉無不利崔憬曰屯難之時勿用攸往初雖作應班如不進既比於五五來求婚男求女往吉無不利象曰求而往眀也虞翻曰之外稱往體離故眀也九五屯其膏虞翻曰坎雨稱膏詩云隂雨膏之是其義也小貞吉大貞凶崔憬曰得屯難之宜有膏澤之惠謂與四為婚媾施雖未光小貞之道也故吉至於遠求嘉偶以行大正赴二之應冒難攸往固宜且凶故曰大貞正也貞凶也象曰屯其膏施未光也虞翻曰陽陷隂中故未光也上六乘馬班如虞翻曰乘五也坎為馬震為行艮為止馬行而止故班如也泣血漣如九家易曰上六乘陽故班如也下二四爻雖亦乘陽皆更得承五憂解難除今上無所復承憂難不解故泣血漣如也體坎為血伏離為目互艮為手掩目流血泣之象也象曰泣血漣如何可長也虞翻曰謂三變時離為目坎為血震為出血流出目故泣血漣如柔乘於剛故不可長也序卦曰物生必蒙故受之以蒙蒙者蒙也物之稚也崔憬曰萬物始生之後漸以長稚故言物生必蒙鄭𤣥曰蒙幼小之貌齊人謂萌為蒙也坎下艮上蒙亨虞翻曰艮三之二亨謂二震剛柔接故亨蒙亨以通行時中也干寶曰蒙者離宫隂也世在四八月之時降陽布德薺麥並生而息來在寅故蒙於世為八月於消息為正月卦也正月之時陽氣上達故屯為物之始生蒙為物之稚也施之於人則童蒙也茍得其運雖蒙必亨故曰蒙亨此蓋以寄成王之遭周公也匪我求童蒙童蒙求我虞翻曰童蒙謂五艮為童蒙我謂二也震為動起嫌求之五故曰匪我求童蒙五隂求陽故童蒙求我志應也艮為求二體師象坎為經謂禮有來學無往教初筮告再三瀆瀆則不告崔憬曰初筮謂六五求決於九二二則告之再三瀆謂三應於上四隔於二與二為瀆故二不告也瀆古黷字也利貞虞翻曰二五失位利變之正故利貞蒙以養正聖功也彖曰蒙山下有險險而止蒙侯果曰艮為山坎為險是山下有險險被山止止則未通蒙昧之象也蒙亨以亨行時中也荀爽曰此本艮卦也案二進居三三降居二剛柔得中故能通發蒙時令得時中矣故曰蒙亨以亨行時中也匪我求童蒙陸績曰六五隂爻在蒙暗蒙又體艮少男故曰童蒙童蒙求我志應也荀爽曰二與五志相應也初筮告以剛中也崔憬曰以二剛中能發於蒙也再三瀆瀆則不告瀆蒙也荀爽曰再三謂三與四也皆乘陽不敬故曰瀆瀆不能尊陽蒙氣不除故曰瀆蒙也蒙以養正聖功也虞翻曰體頤故養五多功聖謂二二志應五變得正而忘其蒙故聖功也干寶曰武王之崩年九十三矣而成王八歲言天後成王之年將以養公正之道而成三聖之功象曰山下出泉蒙虞翻曰艮為山震為出坎泉流出故山下出泉君子以果行育德虞翻曰君子為二艮為果震為行育養也二至上有頤養象故以果行育德也初六發蒙利用刑人用說桎梏以往吝虞翻曰發蒙之正初為蒙始而失其位發蒙之正以成兌兌為刑人坤為用故曰利用刑人矣坎為穿木震足艮手互與坎連故稱桎梏初發成兌兌為說坎象毁壞故曰用說桎梏之應歷險故以往吝吝小疵也象曰利用刑人以正法也虞翻曰坎為法初發之正故正法也干寶曰初六戊寅平眀之時天光始照故曰發蒙此成王始覺周公至誠之象也坎為法律寅為貞廉以貞用刑故利用刑人矣此成王將正四國之象也說解也正四國之罪宜釋周公之黨故曰用說桎梏既感金縢之文追恨昭德之晚故曰以往吝初二失位吝之由也九二包蒙吉納婦吉子克家象曰子克家剛柔接也虞翻曰坤為包應五據初一與三四同體包養四隂故包蒙吉震剛為夫伏巽為婦二以剛接柔故納婦吉二稱家震長子主器者納婦成初故有子克家也六三勿用娶女見金夫不有躬無攸利虞翻曰謂三誡上也金夫謂二初發成兌故三稱女兌為見陽稱金震為夫三逆乘二陽所行不順為二所淫上來之三陟隂故曰勿用娶女見金夫矣坤身稱躬三為二所乘兌澤動下不得之應故不有躬失位多凶故無攸利也象曰勿用娶女行不順也虞翻曰失位乘剛故行不順也六四困蒙吝象曰困䝉之吝獨遠實也王弼曰陽稱實也獨遠於陽處兩隂之中暗莫之發故曰困蒙也困於蒙昧不能比賢以發其志亦鄙矣故曰吝六五童蒙吉虞翻曰艮為童蒙處貴承上有應於二動而成巽故吉也象曰童蒙之吉順以巽也荀爽曰順於上巽於二有似成王任用周召也上九擊蒙不利為寇利禦寇虞翻曰體艮為手故擊謂五已變上動成坎稱寇而逆乘陽故不利為冦矣禦止也此寇謂二坎為寇巽為高艮為山登山備下順有師象故利禦寇也象曰利用禦寇上下順也虞翻曰自上禦下故順也序卦曰物稚不可不養也故受之以需需者飲食之道也干寶曰需坤之遊魂也雲升在天而雨未降翺翔東西須之象也王事未至飲宴之日也夫坤者地也婦人之職也百穀果蓏之所生禽獸魚鱉之所託也而在遊魂變化之象即烹爨腥實以為和味者也故曰需者飲食之道也乾下坎上需有孚光亨貞吉虞翻曰大壯四之五孚謂五離日為光四之五得位正中故光亨貞吉謂壯于大輿之輻也利涉大川何妥曰大川者大難也須之待時本欲涉難既能以信而待故可以利涉大川矣彖曰需須也險在前也何妥曰此眀得名由於坎也坎為險也有險在前不可妄涉故須待時然後動也剛健而不陷其義不困窮矣侯果曰乾體剛健遇險能通險不能險義不窮也需有孚光亨貞吉位乎天位以正中也蜀才曰此本大壯卦案六五降四有孚光亨貞吉九四升五位乎天位以正中也利涉大川往有功也虞翻曰謂三失位變而涉坎坎為大川得位應五故利涉大川五多功故往有功也象曰雲上於天需宋衷曰雲上於天須時而降也君子以飲食宴樂虞翻曰君子謂乾坎水兌口水流入口為飲二夫位變體噬嗑為食故以飲食陽在內稱宴大壯震為樂故宴樂也初九需于郊利用恆無咎干寶曰郊乾坎之際也既已受命進道北郊未可以進故曰需于郊處不避汙出不辭難臣之常節也得位有應故曰利用恆雖小稽留終於必達故曰無咎象曰需于郊不犯難行也利用恆無咎未失常也王弼曰居需之時最遠於險能抑其進不犯難行雖不應機可以保常故無咎九二需于沙小有言終吉虞翻曰沙謂五水中之陽稱沙也二變之隂稱小大壯震為言兌為口四之五震象半見故小有言二變應之象曰需于沙衍在中也虞翻曰衍流也中謂五也荀爽曰二應於五水中之剛故曰沙知前有沙漠而不進也體乾處和美德優衍在中而不進也雖小有言以吉終也荀爽曰二與四同功而三據之故小有言乾雖在下終當升上二當居五故終吉也九三需于泥致寇至荀爽曰親與坎接故稱泥須止不進不取於四不致寇害象曰需于泥災在外也崔憬曰泥近乎外者也三逼於坎坎為險盜故致寇至是災在外也自我致寇敬愼不敗也虞翻曰離為戎乾為敬隂消至五遁臣將弒君四上壯坤故敬愼不敗六四需于血出自穴案六四體坎坎為雲又為血卦血以喻隂隂體卑弱宜順從陽故曰需于血九家易曰雲從地出上升于天自地出者莫不由穴故曰需于血出自穴也象曰需于血順以聽也王弼曰穴者隂之路也四處坎始居穴者也九三剛進四不能距見侵則避順以聽命也九家易曰雲欲升天須時升降順以聽五五為天也九五需于酒食貞吉荀爽曰五互離坎水在火上酒食之象需者飲食之道故坎在需家為酒食也雲須時欲降乾須時當升五有剛德處中居正故能帥羣隂舉坎以降陽能正居其所則吉故曰需于酒食也象曰酒食貞吉以中正也九家易曰謂乾二當升五正位者也盧氏曰沈湎則凶中正則吉也上六入于穴荀爽曰須道已終雲當下入穴也雲上升極則降而為雨故詩云朝躋于西崇朝其雨則還入地故曰入于穴雲雨入地則下三陽動而自至者也有不速之客三人來敬之終吉荀爽曰三人謂下三陽也須時當升非有召者故曰不速之客焉乾升在上君位以定坎降居下當循臣職故敬之終吉也象曰不速之客來敬之終吉雖不當位未大失也荀爽曰上降居三雖不當位承陽有實故終吉無大失矣周易集解卷二
