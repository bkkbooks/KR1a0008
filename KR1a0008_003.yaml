body:
  text: 周易集解卷三唐李鼎祚撰序卦曰飲食必有訟故受之以訟也鄭玄曰訟猶諍也言飲食之會恆多諍也坎下乾上訟有孚干寶曰訟離之遊魂也離為戈兵此天氣將刑殺聖人將用師之卦也訟不親也兆民未識天命不同之意荀爽曰陽來居二而孚於初故曰訟有孚矣窒惕中吉虞翻曰遁三之二也孚謂二窒塞止也惕懼二也二失位故不言貞遁將成否則子弒父臣弒君三來之二得中弒不得行故中吉也終凶虞翻曰二失位終止不變則入于淵故終凶也利見大人不利涉大川侯果曰大人謂五也斷決必中故利見也訟是隂事以險涉險故不利涉大川彖曰訟上剛下險險而健訟盧氏曰險而健者恆好爭訟也訟有孚窒惕中吉剛來而得中也蜀才曰此本遁卦案二進居三三降居二是剛來而得中也終凶訟不可成也王肅曰以訟成功者終必凶也王弼曰凡不和而訟無施而可涉難特甚焉唯有信而見塞懼者乃可以得吉也猶復不可以終中乃吉也不閉其源使訟不至雖每不枉而訟至終竟此亦凶矣故雖復有信而見塞懼猶不可以為終故曰訟有孚窒惕中吉終凶也無善聽者雖有其實何由得眀而有信窒懼者乃得其中吉必有善聽主焉其在二乎以剛而來正夫羣小斷不失中應其任矣案天為訟善聽之主者其在五焉何以眀之案爻辭九五訟元吉王氏注云處得尊位為訟之主用其中正以斷枉直即彖云利見大人尚中正是其義也九二象曰不克訟歸逋竄也自下訟上患至掇也九二居訟之時自救不暇訟既不克懷懼逃歸僅得免其終凶禍豈能為善聽之主哉年代綿流師資道喪恐傳寫字誤以五為二後賢當審詳之也利見大人尚中正也荀爽曰二與四訟利見於五五以中正之道解其訟也不利涉大川入于淵也荀爽曰陽來居二坎在下為淵象曰天與水違行訟荀爽曰天自西轉水自東流上下違行成訟之象也君子以作事謀始虞翻曰君子謂乾三來變坤為作事坎為謀乾知大始故以作事謀始干寶曰省民之情以制作也武王故先觀兵孟津蓋以卜天下之心故曰作事謀始也初六不永所事小有言終吉虞翻曰永長也坤為事初失位而為訟始故不永所事也小有言謂初四易位成震言三食舊德震象半見故小有言初變得正故終吉也象曰不永所事訟不可長也雖小有言其辨明也盧氏曰初欲應四而二據之暫爭事不至永雖有小訟訟必辨眀故終吉九二不克訟歸而逋虞翻曰謂與四訟坎為隱伏故逋乾位剛在上坎濡失正故不克也其邑人三百戶無眚虞翻曰眚災也坎為眚謂二變應五乾為百坤為戶三爻故三百戶坎化為坤故無眚象曰不克訟歸逋竄也荀爽曰三不克訟故逋而歸坤稱邑二者邑中之陽人逋逃也謂逃失邑中之陽人自下訟上患至掇也荀爽曰下與上爭即取患害如拾掇小物而不失也坤有三爻故云三百戶無眚二者下體之君君不爭則百姓無害也六三食舊德貞厲終吉虞翻曰乾為舊德食謂初四二已變之正三動得位體噬嗑食四變食乾故食舊德三變在坎正危貞厲得位故終吉也或從王事無成虞翻曰乾為王二變否時坤為事故或從王事道無成而代有終故曰無成坤三同義也象曰食舊德從上吉也侯果曰雖失其位專心應上故能保全舊恩食舊德者也處兩剛之間而皆近不相得乘二負四正之危也剛不能侵故終吉九四不克訟復即命渝安貞吉虞翻曰失位故不克訟渝變也不克訟故復位變而成巽巽為命令故復即命渝動而得位故安貞吉謂二已變坤安也象曰復即命渝安貞吉不失也侯果曰初既辨眀四訟妄也詔既不克當反就前理變其詔命則安靜貞吉而不失初也九五訟元吉象曰訟元吉以中正也王肅曰以中正之德齊乖爭之俗元吉也王弼曰處得尊訟之主用其中正以斷枉直中則不過正則不邪剛則無所溺公則無所偏故訟元吉上九或錫之鞶帶虞翻曰錫謂王之錫命鞶帶大帶男子鞶革初四已易位三二之正巽為腰帶故鞶帶終朝三褫之虞翻曰位終乾上二變時坤為終離為日乾為甲日出甲上故稱朝應在三三變時艮為手故終朝三褫之使變應己則去其鞶帶體坎乘陽故象曰不足敬也侯果曰褫解也乾為衣為言故以訟受服荀爽曰二四爭三三本下體取之有緣或者疑之辭也以三錫二於義疑矣爭競之世分理未眀故或以錫二終朝者君道眀三者陽成功也君眀道盛則奪二與四故曰終朝三褫之也鞶帶宗廟之服三應於上上為宗廟故曰鞶帶也翟玄曰上以六三錫下三陽羣剛交爭得不以讓故終一朝之間各一奪之為三褫象曰以訟受服亦不足敬也虞翻曰服謂鞶帶終朝見褫乾象毁壞故不足敬九家易曰初二三四皆不正以不正相訟而得其服故不足敬也序卦曰訟必有衆起故受之以師師者衆也崔憬曰因爭必起衆相攻故受之以師也坎下坤上師貞丈人吉無咎何晏曰師者軍旅之名故周禮云二千五百人為師也王弼曰丈人嚴莊之稱有軍正者也為師之正丈人乃吉興役動衆無功則罪故吉乃無咎陸績曰丈人者聖人也帥師未必聖人若漢高祖光武應此義也崔憬曰子夏傳作大人並王者之師也案此彖云師衆貞正也能以衆正可以王矣故老子曰域中有四大而王居其一焉由是觀之則知夫為王者必大人也豈以丈人而為王哉故乾文言曰夫大人與天地合德與日月合眀先天而天不違後天而奉天時天且不違而况于人乎况于行師乎以斯而論子夏傳作大人是也今王氏曲解大人為丈人臆云嚴莊之稱學不師古匪説攸聞既誤違於經旨輒改正作大人眀矣彖曰師衆也貞正也能以衆正可以王矣虞翻曰坤為衆謂二失位變之五為比故能以衆正乃可以王矣荀爽曰謂二有中和之德而據羣隂上居五位可以王也剛中而應行險而順蜀才曰此本剝卦案上九降二六二升上是剛中而應行險而順也以此毒天下而民從之干寶曰坎為險坤為順兵革刑獄所以險民也毒民於險中而得順道者聖王之所難也毒荼苦也五刑之用斬刺肌體六軍之鋒殘破城邑皆所荼毒姦凶之人使服王法者也故曰以此毒天下而民從之毒以治民眀不獲已而用之故於彖象六爻皆著戒懼之辭也吉又何咎矣崔憬曰剛能進義中能正衆既順且應行險戡暴亭毒天下人皆歸往而以為王吉又何咎矣象曰地中有水師陸績曰坎在坤內故曰地中有水師衆也坤中衆者莫過於水君子以容民畜衆虞翻曰君子謂二容寬也坤為民衆又畜養也陽在二寬以居之五變執言時有頤養象故以容民畜衆矣初六師出以律否臧凶象曰師出以律失律凶也案初六以隂居陽履失其位位既匪正雖令不從以斯行師失律者也凡首率師出必以律若不以律雖臧亦凶故曰師出以律失律凶也九家易曰坎為法律也九二在師中吉無咎王三錫命象曰在師中吉承天寵也九家易曰雖當為王尚在師中為天所寵事克功成故言無咎二非其位蓋謂武王受命而未即位也受命為王定天下以師故曰在師中吉王三錫命懷萬邦也荀爽曰王謂二也三者陽德成也德純道盛故能上居王位而行錫命羣隂歸之故曰王三錫命懷萬邦也案二互體震震木數三王三錫命之象周禮云一命受職再命受服三命受位是其義也六三師或輿尸凶虞翻曰坤為尸坎為車多眚同人離為戈兵為折首失位乘剛無應尸在車上故輿尸凶矣象曰師或輿尸大無功也盧氏曰失位乘剛內外無應以此帥師必大敗故有輿尸之凶功業大喪也六四師左次無咎荀爽曰左謂二也陽稱左次舍也二與四同功四承五五無陽故呼二舍於五四得承之故無咎象曰左次無咎未失常也崔憬曰偏將軍居左左次常備師也師順用柔與險無應進取不可次舍無咎得位故也六五田有禽利執言無咎虞翻曰田謂二陽稱禽震為言五失位變之正艮為執故利執言無咎荀爽曰田獵也謂二帥師禽五五利度二之命執行其言故無咎也案六五居尊失位在師之時蓋由殷紂而被武王擒於鹿臺之類是也以臣伐君假言田獵六五離爻體坤離為戈兵田獵行師之象也長子帥師虞翻曰長子謂二震為長子在師中故帥師也弟子輿尸貞凶虞翻曰弟子謂三三體坎坎震之弟而乾之子失位乘陽逆故貞凶象曰長子帥師以中正也荀爽曰長子謂九二也五處中應二受任帥師當上升五故曰長子帥師以中正也弟豫輿尸使不當也宋衷曰弟子謂六三也失位乘陽處非所據衆不聽從師人分北或敗績死亡輿尸而還故曰弟子輿尸謂使不當其職也上六大君有命虞翻曰同人乾為大君巽為有命干寶曰大君聖人也有命天命也五常為玉位至師之家而變其例者上為郊也故易位以見武王親征與師人同處於野也離上九曰王用出征有嘉折首上六為宗廟武王以文王行故正開國之辭於宗廟之爻眀已之受命文王之德也故書泰誓曰豫克紂非豫武惟朕文考無罪受克豫非朕文考有罪惟豫小子無良開國封諸侯也承家立都邑也小人勿用非所能矣開國承家虞翻曰承受也坤為國二稱家謂變乾為坤欲令二上居五為比故開國承家荀爽曰大君謂二師旅已息既上居五當封賞有功立國命家也開國封諸侯承家立大夫也宋衷曰陽當之五處坤之中故曰開國隂下之二在二承五故曰承家開國謂析土地以封諸侯如武王封周公七百里地也承家立大夫為差次立大夫因采地名正其功勳行其賞祿小人勿用虞翻曰隂稱小人坤虛無君體迷復凶坤成乾滅以弒君故小人勿用象曰大君有命以正功也虞翻曰謂五多功五動正位故正功也干寶曰湯武之事小人勿用必亂邦也虞翻曰坤反君道故亂邦也干寶曰楚靈齊閔窮兵之禍也序卦曰衆必有所比故受之以比崔憬曰方以類聚物以羣分人衆則羣類必有所比矣上比相阿黨下比相和親也相黨則相親故言比者比也坤下坎上比吉虞翻曰師二上之五得位衆隂頗從比而輔之故吉與大有旁通子夏傳曰地得水而柔水得土而流比之象也夫凶者生乎乖爭今既親比故云比吉也原筮元永貞無咎不寧方來後夫凶干寶曰比者坤之歸魂也亦世於七月而息來在已去隂居陽承乾之命義與師同也原卜也周禮三卜一曰原兆坤德變化反歸其所四方既同萬國既親故曰比吉考之著龜以謀王業大相東土卜惟洛食遂乃定鼎郟鄏卜世三十卜年七百德善長於兆民戩祿永於被業故曰原筮元永貞逆取順守居安如危故曰無咎天下歸德不唯一方故曰不寧方來後服之夫違天失人必災其身故曰後夫凶也彖曰比吉也比輔也下順從也崔憬曰下比於上是下順也原筮元永貞無咎以剛中也蜀才曰此本師卦案六五降二九二升五剛往得中為比之主故能原究筮道以求長正而無咎矣不寧方來上下應也虞翻曰水性流動故不寧坤隂為方上下應之故方來也後夫凶虞翻曰後謂上夫謂五也坎為後艮為背上位在背後無應乘陽故後夫凶也其道窮也荀爽曰後夫謂上六逆禮乘陽不比聖王其義當誅故其道窮凶也象曰地上有水比何晏曰水性潤下今在地上更相浸潤比之義也先王以建萬國親諸侯虞翻曰先王謂五初陽已復震為建為諸侯坤為萬國為腹坎為心腹心親比故以建萬國親諸侯詩曰公侯腹心是其義也初六有孚比之無咎虞翻曰孚謂五初失位變來得正故無咎也荀爽曰初在應外以喻殊俗聖王之信光被四表絶域殊俗皆來親比故無咎也有孚盈缶終來有它吉虞翻曰坤器為缶坎水流坤初動成屯屯者盈也故盈缶終變得正故終來有它吉在內稱來也象曰比之初六有它吉也荀爽曰缶者應內以喻中國孚既盈滿中國終來及初非應故曰它也象云有它吉者謂信及非應然後吉也六二比之自內貞吉干寶曰二在坤中坤國之象也得位應五而體寬大君樂民人自得之象也故曰比之自內貞吉矣象曰比之自內不自失也崔憬曰自內而比不失已親也六三比之匪人虞翻曰匪非也失位無應三又多凶體剝傷象弒父弒君故曰匪人象曰比之匪人不亦傷乎干寶曰六三乙卯坤之鬼吏在比之家有土之君也周為木德卯為木辰同姓之國也爻失其位辰體隂賊管蔡之象也比建萬國唯去此人故曰比之匪人不亦傷王政也六四外比之貞吉虞翻曰在外體故稱外得位比賢故貞吉也象曰外比於賢以從上也干寶曰四為三公在比之象而得其位上比聖主下御列國方伯之象也能外親九服賢德之君務宣上志綏萬邦也故曰外比於賢以從上也九五顯比虞翻曰五貴多功得位正中初三以變體重眀故顯比謂顯諸仁也王用三驅失前禽虞翻曰坎五稱王三驅謂驅下三隂不及於初故失前禽謂初已變成震震為鹿為驚走鹿之斯奔則失前禽也邑人不誡吉虞翻曰坤為邑師震為人師時坤虛無君使師二上居五中故不誡吉也象曰顯比之吉位正中也虞翻曰謂離象眀正上中也舍逆取順失前禽也虞翻曰背上六故舍逆據三隂故取順不及初故失前禽邑人不誡上使中也虞翻曰謂二使師二居五中上上六比之無首凶荀爽曰陽欲無首隂以大終隂而無首不以大終故凶也虞翻曰首始也隂道無成而代有終無首凶象曰比之無首無所終也虞翻曰迷失道故無所終也序卦曰比必有所畜故受之以小畜崔憬曰下順從而上下應之則有所畜矣韓康伯曰由比而畜故曰小畜也乾下巽上小畜亨侯果曰四為畜主體又稱小唯九三被畜下剛皆通是以小畜亨也密雲不雨自我西郊崔憬曰雲如不雨積我西邑之郊施澤未通以眀小畜之義案雲雨者隂之氣也今小畜五陽而一隂既微少才作密雲故未能為雨四互居兊西郊之象也彖曰小畜柔得位而上下應之曰小畜王弼曰謂六四也成卦之義在此一爻者也體無二隂以分其應既得其位而上下應之三不能陵小畜之義健而巽剛中而志行乃亨虞翻曰需上變為巽與豫旁通豫四之坤初為復復小陽潛所畜者少故曰小畜二失位五剛中正二變應之故志行乃亨也密雲不雨尚往也虞翻曰密小也兊為密需坎升天為雲墜地稱雨上變為陽坎象半見故密雲不雨上往也自我西郊施未行也虞翻曰逸坤為自我兊為西乾為郊雨生於西故自我西郊九二未變故施未行矣荀爽曰體兊位秋故曰西郊也時當收斂臣不專賞故施未行喻文王也象曰風行天上小畜九家易曰風者天之命令也今行天上則是令未下行畜而未下小畜之義君子以懿文德虞翻曰君子謂乾懿美也逸坤為文乾為德離為眀初至四體夬為書契乾離照坤故懿文德也初九復自道何其咎吉象曰復自道其義吉也虞翻曰謂從逸四之初成復卦故復自道出入無疾朋來無咎何其咎吉乾稱道也九二牽復吉崔憬曰四柔得位羣剛所應二以中和牽復自守不失於行也象曰牽復在中亦不自失也虞翻曰變應五故不自失與比二同義也九三輿説輻虞翻曰逸坤為車為輻至三成乾坤象不見故車説輻馬君及俗儒皆以乾為車非也夫妻反目虞翻曰逸震為夫為反巽為妻離為目今夫妻共在四離火動上目象不正巽多白眼夫妻反目妻當在內夫當在外今妻乘夫而出在外象曰不能正室三體離需飲食之道飲食有訟故爭而反目也象曰夫妻反目不能正室也九家易曰四互體離離為目也離既不正五引而上三引而下故反目也輿以輪成車夫以妻成室今以妻乘夫其道逆故不能正室六四有孚血去惕出無咎虞翻曰孚謂五逸坎為血為惕惕憂也震為出變成小畜坎象不見故血去惕出得位成五故無咎也象曰有孚惕出上合志也荀爽曰血以喻隂四隂臣象有信順五惕疾也四當去初疾出從五故曰上合志也九五有孚攣如富以其鄰虞翻曰孚五謂二也攣引也巽為繩逸艮為手二失位五欲其變故曰攣如以及也五貴稱富鄰謂三兊西震東稱鄰三變承二故富以其鄰象曰不獨富二變為既濟與東西鄰同義象曰有孚攣如不獨富也九家易曰有信下三爻也體巽故攣如如謂連接其鄰鄰謂四也五以四隂作財與下三陽共之故曰不獨富也上九既雨既處尚德載婦貞厲虞翻曰既已也應在三坎水零為雨巽為處謂二已變三體坎雨故既雨既處坎雲復天坎為車載積在坎上故上得積載巽為婦坎成巽壞故婦貞厲月幾望君子征凶虞翻曰幾近也坎月離日上已正需時成坎與離相望兌西震東日月象對故月幾望上變陽消之坎為疑故君子征有所疑矣與歸妹中孚月幾望義同也象曰既雨既處德積載也虞翻曰巽消承坎故德積載坎習為積也君子征凶有所疑也虞翻曰變坎為盜故有所疑也序卦曰物畜然後有禮故受之以履崔憬曰履禮也物畜不通則君子先懿文德然後以禮導之故言物畜然後有禮也兊下乾上履虎尾不嘻人亨虞翻曰謂變訟初為兊也與謙旁通以坤履乾以柔履剛謙坤為虎艮為尾乾為人乾兊乘謙震足蹈艮故履虎尾兌悅而應虎口與上絶故不嘻人剛當位故通俗儒皆以兊為虎乾履兌非也兊剛鹵非柔也彖曰履柔履剛也虞翻曰坤柔乾剛謙坤籍乾故柔履剛荀爽曰謂三履二也二五無應故無元以乾履兊故有通六三履二非和正故云利貞也説而應乎乾虞翻曰説兌也眀兌不履乾故言應也九家易曰動來為兌而應上故曰説而應乎乾也以喻一國之君應天子命以臨下承上以巽據下以恱其正應天故虎為之不嘻人也是以履虎尾不嘻人亨九家易曰虎尾謂二也三以説道履五之應上順於天故不嘻人亨也能巽説之道順應於五故雖踐虎不見嘻噬也太平之代虎不食人亨謂於五也剛中正履帝位而不疚光明也虞翻曰剛中正謂五謙震為帝五帝位坎為疾病乾為大明五履帝位坎象不見故履帝位而不疚光眀也象曰上天下澤履君子以辨上下定民志虞翻曰君子謂乾辨别也乾天為上兌澤為下謙坤為民坎為志謙時坤在乾上變而為履故辨上下定民志也初九素履往無咎虞翻曰應在巽為白故素履四失位變往得正故往無咎初已得正使四獨變在外稱往象曰獨行願也象曰素履之往獨行願也荀爽曰初九者潛位隱而未見行而未成素履者謂布衣之士未得居位獨行禮義不失其正故無咎也九二履道坦坦幽人貞吉虞翻曰二失位變成震為道為大塗故履道坦坦訟時二在坎獄中故稱幽人之正得位震出兊悅幽人喜笑故貞吉也象曰幽人貞吉中不自亂也虞翻曰雖幽訟獄中終辨得正故不自亂六三眇能視跛能履虞翻曰離目不正兌為小故眇而視視上應也訟坎為曵變震時為足足曵故跛而履俗儒多以兌刑為跛兌折震足為刑人見刑斷足者非為跛也履虎尾嘻人凶虞翻曰艮為尾在兌下故履虎尾位在虎口中故嘻人凶既跛又眇視步不能為虎所囓故嘻人凶象曰位不當也武人為于大君虞翻曰乾象在上為武人三失位變而得正成乾故曰武人為于大君志剛也象曰眇能視不足以有明也跛能履不足以與行也侯果曰六三兌也互有離巽離為目巽為股體俱非正雖能視眇目者也雖能履跛足者也故曰眇能視不足以有明跛能履不足以與行是其義也嘻人之凶位不當也案六三為履卦之主體悅應乾下柔上剛尊卑合道是以履虎尾不嘻人通今於當爻以隂處陽履非其位互體離兌水火相刑故獨唯三被嘻凶矣武人為于大君志剛也案以隂居陽武人者也三互體離離為嚮眀為于大君南面之象與乾上應故曰志剛九四履虎尾訴訴終吉虞翻曰體與下絶四多懼故訴訴變體坎得位承五應初故終吉象曰志行也象曰訴訴終吉志行也侯果曰訴訴恐懼也履乎兌主履虎尾也逼近至尊故恐懼以其恐懼故終吉也執乎樞密故志行也九五夬履貞厲虞翻曰謂三上已變體夬象故夬履四變五在坎中也為上所乘故貞厲象曰位正當也象曰夬履貞厲位正當也干寶曰夬決也居中履正為履貴主萬方所履一決於前恐決失正恆懼危厲故曰夬履貞厲位正當也上九視履考祥其旋元吉虞翻曰應在三三先視上故上亦視三故曰視履考祥矣考稽祥善也乾為積善故考祥三上易位故其旋元吉象曰大有慶也象曰元吉在上大有慶也盧氏曰王者履禮於上則萬方有慶於下周易集解卷三
