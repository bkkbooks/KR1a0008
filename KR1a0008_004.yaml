body:
  text: 周易集解卷四唐李鼎祚撰序卦曰履而泰然後安故受之以泰泰者通也崔憬曰以禮導之必通通然後安所謂君子以辯上下定民志通而安也乾下坤上泰小往大來吉亨虞翻曰陽息坤反否也坤隂詘外為小往乾陽信内稱大來天地交萬物通故吉亨彖曰泰小往大來吉亨蜀才曰此本坤卦小謂隂也大謂陽也天氣下地氣上隂陽交萬物通故吉亨則是天地交而萬物通也何妥曰此眀天道泰也夫泰之為道本以通生萬物若天氣上騰地氣下降各自閉塞不能相交則萬物無由得生眀萬物生由天地交也上下交而其志同也何妥曰此眀人事泰也上之與下猶君之與臣君臣相交感乃可以濟養民也天地以氣通君臣以志同也内陽而外隂内健而外順何妥曰此眀天道也隂陽之名就爻為語健順之稱指卦為言順而隂居外故曰小往健而陽在内故曰大來内君子而外小人崔憬曰此眀人事也陽為君子在内健於行事隂為小人在外順以聽命君子道長小人道消也九家易曰謂陽息而升隂消而降也陽稱息者長也起復成巽萬物盛長也隂言消者起姤終乾萬物成熟成熟則給用給用則分散故隂用特言消也象曰天地交泰荀爽曰坤氣上升以成天道乾氣下降以成地道天地二氣若時不交則為閉塞今旣相交乃通泰后以財成天地之道虞翻曰后君也隂升乾位坤女主故稱后坤富稱財守位以人聚人以財故曰成天地之道輔相天地之宜以左右民虞翻曰相贊左右助之震為左兌為右坤為民謂以隂輔陽詩曰宜民宜人受禄于天鄭𤣥曰財節也輔相左右助也以者取其順隂陽之節為出内之政春崇寛仁夏以長養秋以收斂冬敕葢藏皆可以成物助民也初九拔茅茹以其彚征吉王弼曰茅之為物拔其根而相牽引也茹相牽引之貌也三陽同志俱志在外初為類首已舉則從若茅茹也上順而應不為違距進皆得志故以其類征吉也象曰拔茅貞吉志在外也虞翻曰否泰反其類否巽為茅茹茅根艮為手彚類也初應四故拔茅茹以彚震為征得位應四征吉志在外外謂四也九二包荒翟𤣥曰荒虛也二五相應五虛无陽二上包之用馮河不遐遺荀爽曰河出於乾行於地中陽性欲升隂性欲承馮河而上不用舟航自地升天道雖遼遠三體俱上不能止之故曰不遐遺朋亡得尚于中行荀爽曰中謂五坤謂朋朋亡而下則二得上居五而行中和矣象曰包荒得尚于中行以光大也虞翻曰在中稱包荒大川也馮河涉河遐遠遺亡也失位變得正體坎坎為大川為河震為足故用馮河乾為遠故不遐遺兑為朋坤虛無君欲使二上故朋亡二與五易位故得上于中行震為行故光大也九三无平不陂无往不復虞翻曰陂傾謂否上也平謂三天地分故平天成地平謂危者使傾往謂消外復謂息内從三至上體復象終日乾乾反復道故无平不陂无往不復也艱貞无咎勿恤其孚于食有福虞翻曰艱險貞正恤憂孚信也二之五得正在坎中故艱貞坎為憂故勿恤陽在五孚險坎為孚故有孚體噬嗑食也二上之五據四則三乘二故于食有福也象曰无往不復天地際也宋衷曰位在乾極應在坤極天地之際也地平極則險陂天行極則還復故曰无平不陂无往不復也六四翩翩不富以其鄰虞翻曰二五變時四體離飛故翩翩坤虛无陽故不富兌西震東故稱其鄰三隂乘陽不得之應象曰皆失實也不戒以孚虞翻曰謂坤邑人不戒故使二升五信來孚邑故不戒以孚二上體坎中正象曰中心願也與比邑人不戒同義也象曰翩翩不富皆失實也宋衷曰四互體震翩翩之象也隂虛陽實坤今居上故言失實也不戒以孚中心願也九家易曰乾升坤降各得其正隂得承陽皆隂心之所願也六五帝乙歸妹以祉元吉九家易曰五者帝位震象稱乙是為帝乙六五以隂處尊位帝者之姊妹五在震後眀其為妹也五應於二當下嫁二婦人謂嫁曰歸故言帝乙歸妹謂下居二以中和相承故元吉也虞翻曰震為帝坤為乙帝乙紂父歸嫁也震為兄兌妹故嫁妹祉福也謂五變體離離為大腹則妹嫁而孕得位正中故以祉元吉也象曰以祉元吉中以行願也九家易曰五下於二而得中正故言中以行願也上六城復于隍虞翻曰否艮為城故稱城坤為積土隍城下溝無水稱隍有水稱池今泰反否乾壞為土艮城不見而體復象故城復于隍也勿用師自邑告命貞吝虞翻曰謂二動時體師隂皆乘陽行不順故勿用師坤為自邑震為言兊為口否巽為命今逆陵陽故自邑告命命逆不順隂道先迷失實遠應故貞吝象曰城復于隍其命亂也九家易曰乾當來上不可用師而拒之也自邑者謂從坤往而降也告命者謂下為巽宣布君之命令也三隂自相告語俱不服順承乾也城復于隍國政崩也坤為亂否巽為命交在泰上故其命亂也序卦曰物不可以終通故受之以否崔憬曰物極則反故不終通而否矣所謂城復于隍者也坤下乾上否之匪人不利君子貞大往小來虞翻曰隂消乾又反泰也謂三比坤滅乾以臣弑其君子弑其父故曰匪人隂來滅陽君子道消故不利君子貞隂信陽詘故大往小來則是天地不交而萬物不通與比三同義也彖曰否之匪人不利君子貞崔憬曰否不通也於不通之時小人道長故云匪人君子道消故不利君子貞也大往小來蜀才曰此本乾卦大往陽往而消小來隂來而息也則是天地不交而萬物不通也何妥曰此眀天道否也上下不交而天下无邦也何妥曰此眀人事否也泰中言志同否中云无邦者言人志不同必致離散而亂邦國崔憬曰君臣乖阻取亂之道故言无邦内隂而外陽内柔而外剛崔憬曰隂柔謂坤陽剛謂乾也内小人而外君子小人道長君子道消也崔憬曰君子在野小人在位之義也象曰天地不交否宋衷曰天地不交猶君臣不接天氣上升而不下降地氣沈下又不上升二氣特隔故云否也君子以儉德辟難不可榮以禄虞翻曰君子謂乾坤為營乾為禄難謂坤為弑君故以儉德辟難巽為入伏乾為遠艮為山體遯象謂辟難遠遁入山故不可營以禄營或作榮儉或作險孔穎達曰言君子於此否時以節儉為德辟其危難不可榮華其身以居禄位若據諸侯公卿而言是辟時羣小之難不可重受官爵也若據王者言之謂節儉為德辟隂陽厄運之難不可自重榮貴而驕逸也初六拔茅茹以其彚貞吉亨荀爽曰拔茅茹取其相連彚者類也合體同包謂坤三爻同類相遭欲在下也貞者正也謂正居其所則吉也象曰拔茅貞吉志在君也九家易曰隂志在下欲承君也案初六巽爻巽為草木陽爻為木隂爻為草初六隂爻草茅之象也六二包承小人吉大人否亨荀爽曰二與四同功為四所包故曰包承也小人二也謂一爻獨居間象相承得繋於陽故吉也大人謂五乾坤分體天地否隔故曰大人否也二五相應否義得通故曰否亨矣象曰大人否亨不亂羣也虞翻曰否不也物三稱羣謂坤三隂亂弑君大人不從故不亂羣也六三包羞象曰包羞位不當也荀爽曰卦性為否其義否隔今以不正與陽相承為四所包違義失正而可羞者以位不當故也九四有命无咎疇離祉九家易曰巽為命謂受五之命以據三隂故无咎无命而據則有咎也疇者類也謂四應初據三與二同功故隂類皆離祉也離附祉福也隂皆附之故曰有福謂下三隂離受五四之福也象曰有命无咎志行也荀爽曰謂志行於羣隂也九五休否大人吉九家易曰否者消卦隂欲消陽故五處和居正以否絶之乾坤異體升降殊隔卑不犯尊故大人吉也其亡其亡荀爽曰隂欲消陽由四及五故曰其亡其亡謂坤性順從不能消乾使亡繋于包桑荀爽曰包者乾坤相包也桑者上𤣥下黃以象乾坤也乾職在上坤體在下雖欲消乾繋其本體不能亡也京房曰桑有衣食人之功聖人亦有天覆地載之德故以喻陸績曰包本也言其堅固不亡如以巽繩繋也案其亡其亡近死之嗟也其與幾同幾者近也九五居否之時下包初二二互坤艮艮山坤地地上卽田也五互巽木田上有木莫過於桑故曰其亡其亡繋於苞桑言五二包繋根深蔕固若山之堅如地之厚者也雖遭危亂物莫能害矣鄭𤣥曰猶紂囚文王於羑里之獄四臣獻珍異之物而終免於難繋於包桑之謂象曰大人之吉位正當也崔憬曰得位居中也上九傾否先否後喜侯果曰傾為覆也否窮則傾矣傾猶否故先否也傾畢則通故後喜也象曰否終則傾何可長也虞翻曰否終必傾盈不可久故先否下反於初成益體震民説无疆故後喜以隂剝陽故不可久也序卦曰物不可以終否故受之以同人崔憬曰否終則傾故同於人通而利涉矣離下乾上同人于野亨鄭𤣥曰乾為天離為火卦體有巽巽為風天在上火炎上而從之是其性同於天也火得風然後炎上益熾是猶人君在上施政教使天下之人和同而事之以是為人和同者君之所為也故謂之同人風行无所不遍遍則㑹通之德大行故曰同人于野亨利涉大川利君子貞崔憬曰以離文眀而合乾健九五中正同人於二為能通天下之志故能利涉大川利君子之貞彖曰同人九家易曰謂乾舍於離同而為日天日同眀以照于下君子則之上下同心故曰同人柔得位得中而應乎乾曰同人蜀才曰此本夬卦九二升上上六降二則柔得位得中而應乎乾下奉上之象義同於人故曰同人同人曰同人于野亨利涉大川乾行也虞翻曰旁通師卦巽為同乾為野師震為人二得中應乾故曰同人于野亨此孔子所以眀嫌表㣲師震為夫巽為婦所謂二人同心故不稱君臣父子兄弟朋友而故言人耳乾四上失位變而體坎故曰利涉大川乾行也侯果曰九二升上上為郊野是同人于野而得通者由乾爻上行耳故特曰乾行也文眀以健中正而應君子正也何妥曰離為文明乾為剛健健非尚武乃以文明應不以邪乃以中正故曰利君子貞也唯君子為能通天下之志虞翻曰唯獨也四變成坎坎為通為志故能通天下之志謂五以類族辯物聖人作而萬物覩崔憬曰君子謂九二能捨己同人以通天下之志若九三九四以其人臣則不當矣故爻辭不言同人也象曰天與火同人荀爽曰乾舍於離相與同居故曰同人也君子以類族辯物虞翻曰君子謂乾師坤為類乾為族辯别也乾陽物坤隂物體姤天地相遇品物咸章以乾照坤故以類族辯物謂方以類聚物以羣分孔子曰君子和而不同故於同人象見以類族辯物也初九同人于門无咎虞翻曰乾為門謂同於四四變應初故无咎也象曰出門同人又誰咎也崔憬曰剛而无應比二以柔近同於人出門之象又誰咎矣案初九震爻帝出乎震震為大塗又為日門出門之象也六二同人于宗吝荀爽曰宗者衆也三據二隂二與四同功五相應初相近上下衆陽皆欲與二為同故曰同人于宗也隂道貞靜從一而終今宗同之故吝也象曰同人于宗吝道也侯果曰宗謂五也二為同人之主和同者之所仰也有應在五唯同於五過五則否不能大同於人則為主之德吝狹矣所同雖吝亦妻臣之道也九三伏戎于莽升其高陵三歲不興虞翻曰巽為伏震為草莽離為戎謂四變時三在坎中隱伏自藏故伏戎于莽也巽為高師震為陵以巽股升其高陵爻在三乾為歲興起也動不失位故三歲不興也象曰伏戎于莽敵剛也三歲不興安行也崔憬曰與二相比欲同人焉盜憎其主而忌於五所以隱兵于野將以襲之故曰伏戎于莽五旣居上故曰升其髙陵一爻為一年自三至五頻遇剛敵故三歲不興安可行也案三互離巽巽為草木離為戈兵伏戎于莽之象也九四乘其墉弗克攻吉虞翻曰巽為墉四在巽上故乘其墉變而承五體訟乾剛在上故弗克攻則吉也象曰乘其墉義弗克也其吉則困而反則也王弼曰處上攻下力能乘墉者也履非其位與三爭二二自應五三非犯已攻三求二尤而效之違義傷禮衆所不與勢雖乘墉義終弗克而得吉者以困而反正則也九五同人先號咷而後笑大師克相遇虞翻曰應在二巽為號咷乾為先故先號咷師震在下故後笑震為後笑也乾為大同人反師故大師二至五體姤遇也故相遇象曰同人之先以中直也大師相遇言相克也侯果曰乾德中直不私於物欲天下大同方始同二矣三四失義而近據之未獲同心故先號咷也時須同好宼阻其途以言相克然後始相遇故笑也九家易曰乾為言上九同人于郊无悔虞翻曰乾為郊失位无應與乾上九同義當有悔同心之家故无悔象曰同人于郊志未得也侯果曰獨處于外同人於郊也不與内爭无悔吝也同人之時唯同于郊志未得也序卦曰與人同者物必歸焉故受之以大有崔憬曰以欲從人物必歸已所以成大有乾下離上大有元亨虞翻曰與比旁通柔得尊位大中應天而時行故元亨也姚規曰互體有兊兊為澤位在秋也乾則施生澤則流潤離則長茂秋則成收大富有也大有則元亨矣鄭𤣥曰六五體離處乾之上猶大臣有聖眀之德代君為政處其位有其事而理之也元亨者又能長羣臣以善使嘉㑹禮通若周公攝政朝諸侯於眀堂是也彖曰大有柔得尊位大中而上下應之曰大有王弼曰處尊以柔居中以大體無二隂以隂而分其應上下應之靡所不納大有之義也其德剛健而文明應乎天而時行是以元亨虞翻曰謂五以日應乾而行於天也時謂四時也大有亨比初動成震為春至二兌為秋至三離為夏坎為冬故曰時行以乾亨坤是以元亨象曰火在天上大有荀爽曰謂夏火王在天萬物並生故曰大有也君子以遏惡揚善順天休命虞翻曰遏絶揚舉也乾為揚善坤為遏惡為順以乾滅坤體夬揚于王庭故遏惡揚善乾為天休二變時巽為命故順天休命初九无交害匪咎艱則無咎虞翻曰害謂四四離火為惡人故无交害初動震為交比坤為害匪非也艱難謂陽動比初成屯屯難也變得位艱則无咎象曰大有初九无交害也虞翻曰害謂四九二大車以載有攸往无咎虞翻曰比坤為大車乾來積上故大車以載往謂之五二失位變得正應五故有攸往无咎矣象曰大車以載積中不敗也虞翻曰乾為大車故曰大車以載體剛履中可以任重有應於五故所積皆中而不敗也九三公用亨于天子小人弗克虞翻曰天子謂五三公位也小人謂四二變得位體鼎象故公用亨于天子四折鼎足覆公餗故小人不克也象曰公用亨于天子小人害也虞翻曰小人謂四也九四匪其彭无咎虞翻曰匪非也其位尫足尫體行不正四失位折震足故尫變而得正故无咎尫或作彭作旁聲字之誤象曰匪其彭无咎明辯晢也虞翻曰晢之離故眀辯晢也四在乾則尫在坤為鼠在震噬胏得金矢在巽折鼎足在坎為鬼方在離焚死在艮旅于處言无所容在兌聧孤孚厲三百八十四爻獨无所容也六五厥孚交如威如吉虞翻曰孚信也發而孚二故交如乾稱威發得位故威如吉象曰厥孚交如信以發志也威如之吉易而无備也侯果曰其體文眀其德中順信發乎志以覃於物物懷其德以信應君君物交信厥孚交如也為卦之主有威不用唯行簡易无所防備物感其德翻更畏威威如之吉也上九自天祐之吉无不利虞翻曰謂乾也祐助也大有通比坤為自乾為天兊為祐故自天祐之比坤為順乾為信天之所助者順人之所助者信履信思順又以尚賢故自天祐之吉无不利王弼曰餘爻皆乘剛已獨乘柔順也五為信德而已履焉履信者也居豐富之代物不累心高尚其志尚賢者也爻有三德盡夫助道故繋辭具焉也象曰大有上吉自天祐也九家易曰上九悦五以柔處尊而自謙損尚賢奉己上下應之為乾所祐故吉且和也序卦曰有大者不可以盈故受之以謙崔憬曰富貴而自遺其咎故有大者不可盈當須謙天之道也艮下坤上謙亨虞翻曰乾上九來之坤與履旁通天道下濟故亨彭城蔡景君説剝上來之三君子有終虞翻曰君子為三艮終萬物故君子有終鄭𤣥曰艮為山坤為地山體高今在地下其於人道高能下下謙之象亨者嘉㑹之禮以謙而為主謙者自貶損以下人唯艮之堅固坤之厚順乃能終之故君子之人有終也彖曰謙亨九家易曰艮山坤地山至高地至卑以至高下至卑故曰謙也謙者兊世艮與兊合故亨天道下濟而光明荀爽曰乾來之坤故下濟隂去為離陽來成坎日月之象故光眀也地道卑而上行侯果曰此本剥卦乾之上九來居坤三是天道下濟而光眀也坤之六三上升乾位是地道卑而上行者也天道虧盈而益謙虞翻曰謂乾盈履上虧之坤三故虧盈貴處賤位故益謙崔憬曰若日中則昃月滿則虧損有餘以補不足天之道也地道變盈而流謙虞翻曰謙二以坤變乾盈坎動而潤下水流濕故流謙也崔憬曰高岸為谷深谷為陵是為變盈而流謙地之道也鬼神害盈而福謙虞翻曰鬼謂四神謂三坤為鬼害乾為神福故鬼神害盈而福謙也崔憬曰朱門之家鬼闞其室黍稷非馨眀德惟馨是其義矣人道惡盈而好謙虞翻曰乾為好為人坤為惡也故人道惡盈從上之三故好謙矣崔憬曰滿招損謙受益人之道也謙尊而光卑而不可踰虞翻曰天道遠故尊光三位賤故卑坎水就下險弱難勝故不可踰君子之終也孔穎達曰尊者有謙而更光眀盛大卑者有謙而不踰越是君子之終也言君子能終其謙之善而又獲謙之福故曰君子有終也象曰地中有山謙劉表曰地中有山以高下下故曰謙謙之為道降已升人山本地上今居地中亦降體之義故為謙象也君子以裒多益寡稱物平施虞翻曰君子謂三裒取也艮為多坤為寡乾為物為施坎為平謙乾盈益謙故以裒多益寡稱物平施侯果曰裒聚也彖云天道益謙則謙之大者天益之以大福謙之小者天益之以小福故君子則之以大益施大德以小益施小德是稱物平施也初六謙謙君子用涉大川吉荀爽曰初最在下為謙二隂承陽亦為謙故曰謙謙也二隂一陽相與成體故曰君子也九三體坎故用涉大川吉也象曰謙謙君子卑以自牧也九家易曰承陽卑謙以陽自牧養也六二鳴謙貞吉姚信曰三體震為善鳴二親承之故曰鳴謙得正處中故貞吉象曰鳴謙貞吉中心得也崔憬曰言中正心與謙相得虞翻曰中正謂二坎為心也九三勞謙君子有終吉荀爽曰體坎為勞終下二隂君子有終故吉也象曰勞謙君子萬民服也荀爽曰陽當居五自卑下衆降居下體君有下國之意也衆隂皆欲撝陽上居五位羣隂順陽故萬民服也六四无不利撝謙荀爽曰四得位處正家性為謙故无不利隂欲撝三使上居五故曰撝謙撝猶舉也象曰无不利撝謙不違則也九家易曰隂撝上陽不違法則六五不富以其鄰荀爽曰鄰謂四與上也自四以上乘陽乘陽失實故皆不富五居中有體故總言之利用侵伐无不利荀爽曰謂陽利侵伐來上无敢不利之者象曰利用侵伐征不服也荀爽曰不服謂五也案六五離爻離為戈兵侵伐之象也上六鳴謙利用行師征邑國虞翻曰應在震故曰鳴謙體師象震為行坤為邑國利五之正已得從征故利用行師征邑國象曰鳴謙志未得也可用行師征邑國也九家易曰隂陽相應故鳴善也雖應不承故志未得謂下九三可行師來上坤為邑國也三應上上呼三征來居五位故曰利用行師征邑國也案上六兌爻兌為口舌鳴謙之象也序卦曰有大而能謙必豫故受之以豫鄭𤣥曰言國旣大而能謙則於政事恬豫雷出地奮逸豫行出而喜樂之意坤下震上豫利建侯行師鄭𤣥曰坤順也震動也順其性而動者莫不得其所故謂之豫豫喜豫悦樂之貌也震又謂雷諸侯之象坤又為衆師役之象故利建侯行師矣虞翻曰復初之四與小畜旁通坤為邦國震為諸侯初至五體比象四利復初故利建侯三至上體師象故行師彖曰豫剛應而志行侯果曰四為卦主五隂應之剛志大行故曰剛應而志行順以動豫崔憬曰坤下震上順以動也豫順以動故天地如之虞翻曰小畜乾為天坤為地如之者謂天地亦動以成四時而况建侯行師言其皆應而逸豫也而况建侯行師乎九家易曰震為建侯坤為行師建侯所以興利行師所以除害利興害除民所逸樂也天地有生殺萬物有始終王者盛衰亦有迭更猶武王承亂而應天地建侯行師奉詞除害民得豫悦君得安樂也天地以順動虞翻曰豫變通小畜坤為地動初至三成乾故天地以順動也故日月不過而四時不忒虞翻曰過謂失度忒差迭也謂變初至需離為日坎為月皆得其正故日月不過動初時震為春至四兌為秋至五坎為冬離為夏四時位正故四時不忒通變之謂事葢此之類聖人以順動則刑罰清而民服虞翻曰清猶眀也動初至四兌為刑至坎為罰坎兌體正故刑罰清坤為民乾為清以乾乘坤故民服案帝出震聖人也坎為法律刑罰也坤為衆順而民服也豫之時義大矣哉虞翻曰順動天地使日月四時皆不過差刑罰清而民服故義大也象曰雷出地奮豫崔憬曰震在坤上故言雷出地雷陽氣亦謂龍也夏至後陽氣極而一隂爻生隂陽相擊而成雷聲雷聲之疾有龍奮迅豫躍之象故曰奮豫先王以作樂崇德殷薦之上帝以配祖考鄭𤣥曰奮動也雷動於地上萬物乃豫也以者取其喜佚動搖猶人至樂則手欲鼓之足欲舞之也崇充也殷盛也薦進也上帝天也王者功成作樂以文得之者作籥舞以武得之者作萬舞各充其德而為制祀天帝以配祖考者使與天同饗其功也故孝經云郊祀后稷以配天宗祀文王於眀堂以配上帝也初六鳴豫凶虞翻曰應震善鳴失位故鳴豫凶也象曰初六鳴豫志窮凶也虞翻曰體剝蔑貞故志窮凶也六二介于石虞翻曰介纎也與四為艮艮為石故介于石不終日貞吉虞翻曰與小畜通應在五終變成離離為日得位欲四急復初已得休之故不終日貞吉象曰不終日貞吉以中正也侯果曰得位居中柔順正一眀豫動之可否辯趣舍之權宜假如堅石不可移變應時則改不待終日故曰豫之正吉六三盱豫悔遲有悔象曰盱豫有悔位不當也王弼曰履非其位承動豫之主若其睢盱而豫悔亦至焉遲而不從豫之所疾進退離悔位不當也向秀曰睢盱小人喜悦佞媚之貌也九四由豫大有得勿疑朋盍簪侯果曰為豫之主衆隂所宗莫不由之以得其逸體剛心直志不懷疑故得羣物依歸朋從大合若以簪篸之固括也虞翻曰由自從也據有五隂坤以衆順故大有得得羣隂也坎為疑故勿疑小畜兊為朋盍合也坤為盍戠聚㑹也坎為聚坤為衆衆隂竝應故朋盍戠戠舊讀作撍作宗也象曰由豫大有得志大行也崔憬曰以一陽而衆隂從已合簪交歡故其志大行也六五貞疾恒不死虞翻曰恒常也坎為疾應在坤坤為死震為反生位在震中與坤體絶故貞疾恒不死也象曰六五貞疾乘剛也恒不死中未亡也侯果曰六五居尊而乘於四四以剛動非己所乘乘剛為政終亦病若恒不死者以其中也上六㝠豫成有渝无咎虞翻曰應在三坤為㝠渝變也三失位无應多凶變乃得正體艮成故成有渝无咎象曰㝠豫在上何可長也荀爽曰隂性㝠昧居尊在上而猶豫悦故不可長周易集解卷四
