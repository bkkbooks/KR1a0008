body:
  text: 周易集解卷五唐李鼎祚撰序卦曰豫必有隨也故受之以隨韓康伯曰順以動者衆之所隨震下兑上隨元亨利貞無咎虞翻曰否上之初剛來下柔初上得正故元亨利貞無咎鄭玄曰震動也兌悅也內動之以德外悅之以言則天下之人咸慕其行而隨從之故謂隨也既見隨從能長之以善通其嘉禮和之以義幹之以正則功成而有福若無此四德則有凶咎焉焦贛曰漢髙帝與項籍其眀徴也彖曰隨剛來而下柔動而説隨虞翻曰否乾上來之坤初故剛來而下柔動震悅兑也大亨貞無咎荀爽曰隨者震之歸魂震歸從巽故大通動爻得正故利貞陽降隂升嫌於有咎動而得正故無咎而天下隨時虞翻曰乾為天坤為下震春兌秋三四之正坎冬離夏四時位正時行則行故天下隨時矣隨時之義大矣哉蜀才曰此本否卦剛自上來居初柔自初而升上則內動而外悅是動而悅隨也相隨而大亨無咎得於時也得時則天下隨之矣故曰隨時之義大矣哉象曰澤中有雷隨九家易曰兑澤震雷八月之時雷藏於澤則天下隨時之象也君子以嚮晦入宴息翟玄曰晦者冥也雷者陽氣春夏用事今在澤中秋冬時也故君子象之日出視事其將晦冥退入宴寢而休息也侯果曰坤為晦乾之上九來入坤初嚮晦者也坤初升兌兌為休息入宴者也欲君民者晦德息物動悅黎庶則萬方歸隨也初九官有渝貞吉出門交有功九家易曰渝變也謂陽來居初德正為震震為子得土之位故曰官也隂陽出門相與交通隂往之上亦不失正故曰貞吉而交有功象曰官有渝從正吉也出門交有功不失也鄭玄曰震為大塗又為日門當春分隂陽之所交也是臣出君門與四方賢人交有成功之象也昔舜愼徽五典五典克從納于百揆百揆時序賔于四門四門穆穆是其義也六二係小子失丈夫虞翻曰應在巽巽為繩故稱係小子謂五兌為少故曰小子丈夫謂四體大過老夫故稱大夫承四隔三故失丈夫三至上有大過象故與老婦士夫同義體咸象夫死大過故每有欲嫁之義也象曰係小子弗兼與也虞翻曰己係於五不兼與四也六三係丈夫失小子隨有求得利居貞虞翻曰隨家隂隨陽三之上無應上係於四失初小子故係丈夫失小子艮為居為求謂求之正得位遠應利上承四故利居貞矣象曰係丈夫志舍下也王弼曰雖體下卦二已據初將何所附故捨初係四志在丈夫也四俱無應亦欲於己隨之則得其求矣故曰隨有求得也應非其正以係於人何可以妄故利居貞也初處已下四處已上故曰係丈夫失小子九四隨有獲貞凶有孚在道以眀何咎虞翻曰謂獲三也失位相據在大過死象故貞凶象曰其義凶矣孚謂五初震為道三已之正四變應初得位在離故有孚在道以眀何咎象曰眀功也象曰隨有獲其義凶也虞翻曰死在大過故凶也有孚在道明功也虞翻曰功謂五也三四之正離為眀故眀功也九五孚于嘉吉虞翻曰坎為孚陽稱嘉位五正故吉也象曰孚于嘉吉位正中也虞翻曰凡五言中正中正皆陽得其正以此為例矣上六拘係之乃從維之虞翻曰應在艮艮手為拘巽為繩兩係稱維故拘係之乃從維之在隨之上而無所隨故維之象曰上窮是其義也王用亨于西山虞翻曰否乾為王謂五也有觀象故亨兌為西艮為山故王用亨於西山也象曰拘係之上窮也虞翻曰乘剛無應故上窮也序卦曰以喜隨人者必有事故受之以蠱蠱者事也九家易曰子行父事備物致用而天下治也備物致用立成器以為天下利莫大於聖人子修聖道行父之事以臨天下無為而治也巽下艮上蠱元亨虞翻曰泰初之上而與隨旁通剛上柔下乾坤交故元亨也伏曼容曰蠱惑亂也萬事從惑而起故以蠱為事也案尚書大傳云乃命五史以書五帝之蠱事然為訓者正以太古之時無為無事也今言蠱者是卦之惑亂也時既漸澆物情惑亂故事業因之而起惑矣故左傳云女惑男風落山謂之蠱是其義也利涉大川虞翻曰謂二失位動而之坎也故利涉大川也先甲三日後甲三日子夏傳云先甲三日者辛壬癸也後甲三日者乙丙丁也馬融曰甲在東方艮在東北故云先甲巽在東南故云後甲所以十日之中唯稱甲者甲為十日之首蠱為造事之端故舉初而眀事始也言所以三日者不令而誅謂之暴故令先後各三日欲使百姓遍習行而不犯也彖曰蠱剛上而柔下巽而止蠱虞翻曰泰初之上故剛上坤上之初故柔下上艮下巽故巽而止蠱也蠱元亨而天下治也荀爽曰蠱者巽也巽歸合震故元亨也蠱者事也備物致用故天下治也利涉大川往有事也九家易曰陽往據隂隂來乘陽故有事也此卦泰乾天有河坤地有水二爻升降出入乾坤利涉大川也陽往求五隂來求二未得正位戎事不息故有事先甲三日後甲三日終則有始天行也虞翻曰謂初變成乾乾為甲至二成離離為日謂乾三爻在前故先甲三日賁時也變三至四體離至五成乾乾三爻在後故後甲三日無妄時也易出震消息歷乾坤象乾為始坤為終故終則有始乾為天震為行故天行也象曰山下有風蠱何妥曰山者高而靜風者宣而疾有似君處上而安靜臣在下而行令也君子以振民育德虞翻曰君子謂泰乾也坤為民初上撫坤故振民乾稱德體大畜須養故以育德也初六幹父之蠱有子考無咎厲終吉虞翻曰幹正蠱事也泰乾為父坤為事故幹父之蠱初上易位艮為子父死大過稱考故有子考變而得正故無咎厲終吉也案位陽令首父之事也爻隂柔順子之質也象曰幹父之蠱意承考也王弼曰幹事之首時有損益不可盡承故意承而已也九二幹母之蠱不可貞象曰幹母之蠱得中道也虞翻曰應在五泰坤為母故幹母之蠱失位故不可貞變而得正故貞而得中道也案位隂居內母之象九三幹父之蠱小有悔無大咎象曰幹父之蠱終無咎也王弼曰以剛幹事而無其應故有悔也履得其位以正幹父雖小有悔終無大咎矣案爻位俱陽父之事六四裕父之蠱往見吝虞翻曰裕不能爭也孔子曰父有爭子則身不陷於不義四隂體大過本末弱故裕父之蠱兌為見變而失正故往見吝象曰往未得是其義也象曰裕父之蠱往未得也虞翻曰往失位折鼎足故未得六五幹父之蠱用譽荀爽曰體和應中承陽有實用斯幹事榮譽之道也象曰幹父用譽承以德也虞翻曰譽謂二也二五失位變而得正故用譽變二使承五故承以德二乾爻故稱德矣上九不事王侯虞翻曰泰乾為王坤為事應在於三震為侯坤象不見故不事王侯髙尚其事虞翻曰謂五已變巽為高艮陽升在坤上故高尚其事象曰不事王侯志可則也荀爽曰年老事終不當其位體艮為止故不事王侯據上臨下重隂纍實故志可則序卦曰有事而後可大故受之以臨臨者大也崔憬曰有蠱元亨則可大之業成故曰有事然後可大也兌下坤上臨元亨利貞虞翻曰陽息至二與遁旁通剛浸而長乾來交坤動則成乾故元亨利貞至于八月有凶虞翻曰與遁旁通臨消於遁六月卦也於周為八月遁弒君父故至于八月有凶荀公以兌為八月兊於周為十月言八月失之甚矣鄭玄曰臨大也陽氣自此浸而長大陽浸長矣而有四德齊功於乾盛之極也人之情盛則奢淫奢淫則將亡故戒以凶臨卦斗建丑而用事殷之正月也當文王之時紂為無道故於是卦為殷家著興衰之戒以見周改殷正之數云臨自周二月用事訖其七月至八月而遁卦受之此終而復始王命然矣彖曰臨剛浸而長虞翻曰剛謂二也兌為水澤自下浸上故浸而長也説而順剛中而應大亨以正天之道也虞翻曰説兌順坤也剛中謂二也四隂皆應之故曰而應大亨以正謂三動成乾天得正為泰天地交通故亨以正天之道也至于八月有凶消不久也蜀才曰此本坤卦剛長而柔消故大亨利正也案臨十二月卦也自建丑之月至建申之月凡閲八月則成否也否則天地不交萬物不通是至于八月有凶斯之謂也象曰澤上有地臨荀爽曰澤卑地髙髙下相臨之象也君子以教思無窮容保民無疆虞翻曰君子謂二也震為言兑口講習學以聚之問以辨之坤為思剛浸長故以教思無窮容寬也二寬以居之仁以行之坤為容民故保民無疆矣初九咸臨貞吉虞翻曰咸感也得正應四故貞吉也象曰咸臨貞吉志行正也荀爽曰陽始咸升以剛臨柔得其正位而居是吉故曰志行正九二咸臨吉無不利虞翻曰得中多譽兼有四隂體復初元吉故無不利象曰咸臨吉無不利未順命也荀爽曰陽感至二當升居五羣隂相承故無不利也陽當居五隂當順從今尚在二故曰未順命也六三甘臨無攸利既憂之無咎象曰甘臨位不當也既憂之咎不長也虞翻曰兌為口坤為土土爰稼穡作甘兌口銜坤故曰甘臨失位乘陽故無攸利言三失位無應故憂之動而成泰故咎不可長也六四至臨無咎虞翻曰至下也謂下至初應當位有實故無咎象曰至臨無咎當位實也荀爽曰四與二同功欲升二至五已得承順之故曰至臨也陽雖未乘處位居正故得無咎是當位實也六五知臨大君之宜吉象曰大君之宜行中之謂也荀爽曰五者帝位大君謂二也宜升上居五位吉故曰知臨大君之宜也二者處中行升居五五亦處中故行中之謂也上六敦臨吉無咎荀爽曰上應於三欲因三升二過應於陽敦厚之意故曰敦臨吉無咎象曰敦臨之吉志在內也九家易曰志在升二也隂以陽為主故志在內也序卦曰物大然後可觀也故受之以觀崔憬曰言德業大者可以觀政於人故受之以觀也坤下巽上觀盥而不薦有孚顒若鄭玄曰坤為地為衆巽為木為風九五天子之爻互體有艮艮為鬼門又為宮闕地上有木而為鬼門宮闕者天子宗廟之象也王弼曰王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛乎盥也至薦簡略不足復觀故觀盥而不薦也馬融曰盥者進爵灌地以降神也此是祭祀盛時及神降薦牲其禮簡略不足觀也國之大事唯祭與戎王道可觀在於祭祀祭祀之盛莫過初盥降神故孔子禘自既灌而往者吾不欲觀之矣此言及薦簡略則不足觀也以下觀上見其至盛之禮萬民信敬故云有孚顒若孚信顒敬也案鬼神害盈禍淫福善若人君修德至誠感神則黍稷非馨明德惟馨故觀盥而不觀薦饗其誠信者也斯即東鄰殺牛不如西鄰之禴祭實受其福是其義也彖曰大觀在上蜀才曰此本乾卦案柔小浸長剛大在上其德可觀故曰大觀在上也順而巽中正以觀天下虞翻曰謂陽息臨二直方大臨者大也在觀上故稱大觀順坤也中正謂五五以天神道觀示天下咸服其化賓於王庭觀盥而不薦有孚顒若下觀而化也虞翻曰觀反臨也以五陽觀示坤民故稱觀盥沃盥薦羞牲也孚信謂五顒顒君德有威容貌若順也坎為水坤為器艮手臨坤坎水沃之盥之象也故觀盥而不薦孔子曰禘自既灌吾不欲觀之矣巽為進退容止可觀進退可度則下觀其德而順其化上之三五在坎中故有孚顒若下觀而化詩曰顒顒卬卬如圭如璋君德之義也觀天之神道而四時不忒虞翻曰忒差也神道謂五臨震兌為春秋三上易位坎冬離夏日月象正故四時不忒聖人以神道設教而天下服矣虞翻曰聖人謂乾退藏於密而齊於巽以神眀其德教故聖人設教坤民順從而天下服矣象曰風行地上觀先王以省方觀民設教九家易曰先王謂五應天順民受命之王也風行地上草木必偃枯稿朽腐獨不從風謂應外之爻天地氣絶隂陽所去象不化之民五刑所加故以省察四方觀視民俗而設其教也言先王德化光被四表有不賔之民不從法令以五刑加之以齊德教也初六童觀小人無咎君子吝虞翻曰艮為童隂小人陽君子初位賤以小人承君子故無咎陽伏隂下故君子吝矣象曰初六童觀小人道也王弼曰失位處下最遠朝美無所鑒見故曰童觀處大觀之時而童觀趣順而已小人為之無可咎責君子為之鄙吝之道六二窺觀利女貞虞翻曰臨兌為女竊觀稱窺兌女反成巽巽四五得正故利女貞艮為宫室坤為闔戶小人而應五故窺觀女貞利不淫視也象曰窺觀女貞亦可醜也侯果曰得位居中上應於五窺觀朝美不能大觀處大觀之時而為窺觀女正則利君子則醜也案六二離爻離為目又為中女外互體艮艮為門闕女目近門窺觀之象也六三觀我生進退虞翻曰坤為我臨震為生生謂坤生民也巽為進退故觀我生進退臨震進之五得正居中故象曰未失道象曰觀我生進退未失道也荀爽曰我謂五也生者教化生也三欲進觀於五四既在前而三故退未失道也六四觀國之光利用賓于王虞翻曰坤為國臨陽至二天下文眀反上成觀進顯天位故觀國之光王謂五陽陽尊賔坤坤為用為臣四在王庭賓事於五故利用賓于王矣詩曰莫敢不來賓莫敢不來王是其義也象曰觀國之光尚賓也崔憬曰得位比尊承於王者職在搜揚國俊賓薦王庭故以進賢為尚賔也九五觀我生君子無咎虞翻曰我身也謂我生生謂生民震生象反坤為死喪嫌非生民故不言民陽為君子在臨二失位之五得道處中故君子無咎矣象曰觀我生觀民也王弼曰觀我生自觀其道也為衆觀之主當宣文化光于四表上之化下猶風之靡草百姓有過在豫一人君子風著已乃無咎欲察已道當觀民也虞翻曰坤為民謂三也坤體成故觀民也上九觀其生君子無咎虞翻曰應在三三體臨震故觀其生君子謂三之三得正故無咎矣象曰觀其生志未平也王弼曰觀其生為人所觀也最處上極天下所觀者也處天下所觀之地其志未為平易不可不愼故君子德見乃得無咎生猶動出也虞翻曰坎為志為平上來之三故志未平矣序卦曰可觀而有所合故受之以噬嗑嗑者合也崔憬曰言可觀政於人則有所合於刑矣故曰可觀而有所合震下離上噬嗑亨利用獄虞翻曰否五之坤初坤初之五剛柔交故亨也坎為獄艮為手離為眀四以不正而係於獄上當之三蔽四成豐折獄致刑故利用獄坤為用也案頤中有物曰噬嗑謂九四也四互體坎坎為法律又為刑獄四在頤中齧而後亨故利用獄也彖曰頤中有物曰噬嗑虞翻曰物謂四則所噬乾脯也頤中無物則口不噬故先舉頤中有物曰噬嗑也噬嗑而亨崔憬曰物在頤中隔其上下因齧而合乃得其亨焉以喻人於上下之間有亂羣者當用刑去之故言利用獄剛柔分動而眀雷電合而章盧氏曰此本否卦乾之九五分降坤初坤之初六分升乾五是剛柔分也分則雷動於下電照於上合成天威故曰雷電合而成章也柔得中而上行雖不當位利用獄也侯果曰坤之初六上升乾五是柔得中而上行雖則失位文眀以中斷制枉直不失情理故利用獄象曰雷電噬嗑宋衷曰雷動而威電動而眀二者合而其道彰也用刑之道威眀相兼若威而不眀恐致淫濫眀而無威不能伏物故須雷電並合而噬嗑備先王以明罰勑法侯果曰雷所以動物電所以照物雷電震照則萬物不能懷邪故先王則之明罰敕法以示萬物欲萬方一心也初九屨校滅趾無咎侯果曰屨貫趾足也震為足坎為校震沒坎下故屨校滅趾初位得正故無咎干寶曰趾足也屨校貫械也初居剛躁之家體貪狼之性以震掩巽強暴之男也行侵陵之罪以陷屨校之刑故曰屨校滅趾得位於初顧震知懼小懲大戒以免刑戮故曰無咎矣象曰屨校滅趾不行也虞翻曰否坤小人以隂消陽其亡其亡故五變滅初否殺不行也干寶曰不敢遂行強也六二噬膚滅鼻無咎虞翻曰噬食也艮為膚為鼻鼻沒水坎中隱藏不見故噬膚滅鼻乘剛又得正多譽故無咎象曰噬膚滅鼻乘剛也侯果曰居中履正用刑者也二互體艮艮為鼻又為黔喙噬膚滅鼻之象也乘剛噬必深噬過其分故滅鼻也刑刻雖峻得所疾也雖則滅鼻而無咎矣六三噬臘肉遇毒小吝無咎虞翻曰三在膚裏故稱肉離日熯之為臘坎為毒故噬臘肉遇毒毒謂矢毒也失位承四故小吝與上易位利用獄成豐故無咎也象曰遇毒位不當也荀爽曰臘肉謂四也三以不正噬取異家法當遇罪故曰遇毒為艮所止所欲不得故小吝也所欲不得則免於罪故無咎矣九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也陸績曰肉有骨謂之胏離為乾肉又為兵矢失位用刑物亦不服若噬有骨之乾胏也金矢者取其剛直也噬胏雖復艱難終得申其剛直雖獲正吉未為光大也六五噬乾肉得黃金貞厲無咎虞翻曰隂稱肉位當離日中烈故乾肉也乾金黃故得黃金貞正厲危也變而得正故無咎王弼曰乾肉堅也黃中金剛也以隂處陽以柔承剛以噬於物物亦不服故曰噬乾肉也然處得尊位而居於中能行其戮也履不正而能行其戮剛勝者也噬雖不服得中而勝故曰噬乾肉得黃金也已雖不正而刑戮得當故雖厲而無咎也象曰貞厲無咎得當也荀爽曰謂隂來正居是而厲陽也以隂厲陽正居其處而無咎者以從下眀上不失其中所言得當上九何校滅耳凶荀爽曰為五所何故曰何校據五應三欲盡滅坎上體坎為耳故曰滅耳凶上以不正侵欲無已奪取異家惡積而不可掩罪大而不可解故宜凶矣鄭玄曰離為稿木坎為耳木在耳上何校滅耳之象也象曰何校滅耳聰不眀也九家易曰當據離坎以為聰眀坎既不正今欲滅之故曰聰不眀也序卦曰物不可以茍合而已故受之以賁賁者飾也崔憬曰言物不可茍合於刑當須以文飾之故受之以賁離下艮上賁亨虞翻曰泰上之乾二乾二之坤上柔來文剛隂陽交故亨也小利有攸往虞翻曰小謂五五失正動得位體離以剛文柔故小利有攸往鄭玄曰賁文飾也離為日天文也艮為石地文也天文在下地文在上天地二文相飾成賁者也猶人君以剛柔仁義之道飾成其德也剛柔雜仁義合然後嘉會禮通故亨也卦互體坎艮艮止於上坎險於下夾震在中故不利大行小有所之則可矣彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往荀爽曰此本泰卦謂隂從上來居乾之中文飾剛道交於中和故亨也分乾之二居坤之上上飾柔道兼據二隂故小利有攸往矣天文也虞翻曰謂五利變之正成巽體離艮為星離日坎月巽為高五天位離為文眀日月星辰高麗於上故稱天之文也文眀以止人文也虞翻曰人謂三乾為人文眀離止艮也震動離眀五變據四二五分則止文三故以三為人文也觀乎天文以察時變虞翻曰日月星辰為天文也泰震春兌秋賁坎冬離夏巽為進退日月星辰進退盈縮謂朓側朏也厯象在天成變故以察時變矣觀乎人文以化成天下虞翻曰泰乾為人五二動體既濟賁離象重眀麗正故以化成天下也干寶曰四時之變懸乎日月聖人之化成乎文章觀日月而要其會通觀文眀而化成天下象曰山下有火賁王廙曰山下有火文相照也夫山之為體層峰峻嶺峭嶮參差直置其形已如雕飾復加火照彌見文章賁之象也君子以眀庶政無敢折獄虞翻曰君子謂乾離為眀坤為庶政故眀庶政坎為獄三在獄得正故無敢折獄噬嗑四不正故利用獄也初九賁其趾虞翻曰應在震震為足故賁其趾也舍車而徒虞翻曰應在艮艮為舍坎為車徒步行也位在下故舍車而徒象曰舍車而徒義弗乘也崔憬曰剛柔相交以成飾義者也今近四棄於二比故曰舍車車士大夫所乘謂二也四乘於剛艮止其應初全其義故曰而徒徒塵賤之事也自飾其行故曰賁其趾趾謂初也王肅曰在下故稱趾既舍其車又飾其趾是徒步也六二賁其須象曰賁其須與上興也侯果曰自三至上有頤之象也二在頤下須之象也上無其應三亦無應若能上承於三與之同德雖俱無應可相與而興起也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也虞翻曰有離之文以自飾故曰賁如也有坎之水以自潤故曰濡如也體剛履正故永貞吉與二同德故終莫之陵也六四賁如皤如白馬翰如匪寇婚媾王弼曰有應在初三為寇難二志相感不獲交通欲靜則失初之應欲進則懼三之難故或飾或素內懷疑懼鮮潔其馬翰如以待雖履正位未果其志匪緣寇隔乃為婚媾則終無尤也陸績曰震為馬為白故曰白馬翰如案皤亦白素之貌也象曰六四當位疑也案坎為盜故疑當位乘三悖禮難飾應初遠陽故曰當位疑也匪寇婚媾終無尤也崔憬曰以其守正待應故終無尤也六五賁于丘園束帛戔戔吝終吉虞翻曰艮為山五半山故稱丘木果曰園故賁于丘園也六五失正動之成巽巽為帛為繩艮手持故束帛以艮斷巽故戔戔失位無應故吝變而得正故終吉矣象曰六五之吉有喜也荀爽曰艮山震林失其正位在山林之間賁飾丘陵以為園圃隱士之象也五為王位體中履和勤賢之主尊道之君也故曰賁于丘園束帛戔戔君臣失正故吝能以中和飾上成功故終吉而有喜也虞翻曰五變之陽故有喜凡言喜慶皆陽爻束帛戔戔委積之貌案六五離爻離為中女午為蠶絲束帛之象上九白賁無咎虞翻曰在巽上故曰白賁乘五隂變而得位故無咎矣象曰白賁無咎上得志也干寶曰白素也延山林之人採素士之言以飾其政故上得志也虞翻曰上之正得位體成既濟故曰得志坎為志也序卦曰致飾然後通則盡矣故受之以剝剝者剝也崔憬曰以文致飾則上下情通故曰致飾然後通也文者致理極而無救則盡矣盡猶剝也坤下艮上剝不利有攸往虞翻曰隂消乾也與夬旁通以柔變剛小人道長子弒其父臣弒其君故不利有攸往也彖曰剝剝也盧氏曰此本乾卦羣隂剝陽故曰為剝也柔變剛也荀爽曰謂隂外變五五者至尊為隂所變故曰剝也不利有攸往小人長也鄭玄曰隂氣侵陽上至於五萬物零落故謂之剝也五隂一陽小人極盛君子不可有所之故不利有攸往也順而止之觀象也虞翻曰坤順艮止謂五消觀成剝故觀象也君子尚消息盈虛天行也虞翻曰乾為君子乾息為盈坤消為虛故君子尚消息盈虛天行也則出入無疾反復其道易虧巽消艮出震息兌盈乾虛坤故於是見之耳象曰山附於地剝陸績曰艮為山坤為地山附於地謂髙附於卑貴附於賤君不能制臣也上以厚下安宅虞翻曰上君也宅居也山高絶於地今附地者眀被剝矣屬地時也君當厚錫於下賢當卑降於愚然後得安其居初六剝牀以足蔑貞凶虞翻曰此卦坤變乾也動初成巽巽木為牀復震在下為足故剝牀以足蔑無貞正也失位無應故蔑貞凶震在隂下象曰以滅下也象曰剝牀以足以滅下也虞翻曰蔑滅也坤所以載物牀所以安人在下故稱足先從下剝漸及於上則君政崩滅故曰以滅下也六二剝牀以辨蔑貞凶虞翻曰指間稱辨剝剝二成艮艮為指二在指間故剝牀以辨無應在剝故蔑貞凶也象曰剝牀以辨未有與也鄭玄曰足上稱辨謂近膝之下屈則相近申則相遠故謂之辨辨分也崔憬曰今以牀言之則辨當在第足之間是牀梐也未有與者言至三則應故二未有與也六三剝之無咎象曰剝之無咎失上下也荀爽曰衆皆剝陽三獨應上無剝害意是以無咎故曰失上下也六四剝牀以膚凶虞翻曰辨上稱膚艮為膚以隂變陽至四乾毁故剝牀以膚臣弒君子弒父故凶矣王肅曰在下而安人者牀也在上而處牀者人也坤以象牀艮以象人牀剝盡以及人身為敗滋深害莫甚焉故曰剝牀以膚凶也象曰剝牀以膚切近災也崔憬曰牀之膚謂薦席若獸之有皮毛也牀以剝盡次及其膚剝以大臣之象言近身與君也六五貫魚以宫人寵無不利虞翻曰剝消觀五巽為魚為繩艮手持繩貫巽故貫魚也艮為宮室人謂乾五以隂代陽五貫乾為寵人隂得麗之故以宮人寵動得正成觀故無不利也何妥曰夫剝之為卦下比五隂駢頭相次似貫魚也魚為隂物以喻衆隂也夫宮人者后夫人嬪妾各有次序不相瀆亂此則貴賤有章寵御有序六五既為衆隂之主能有貫魚之次第故得無不利矣象曰以宫人寵終無尤也崔憬曰魚與宫人皆隂類以比小人焉魚大小一貫若后夫人嬪婦御女小大雖殊寵御則一故終無尤也上九碩果不食君子得輿小人剝廬虞翻曰艮為碩果謂三已復位有頤象頤中無物故不食也夬乾為君子為德坤為車為民乾在坤故以德為車小人謂坤艮為廬上變滅艮坤隂迷亂故小人剝廬也象曰君子得輿民所載也小人剝廬終不可用也侯果曰艮為果為廬坤為輿處剝之上有剛直之德羣小人不能傷害也故果至碩大不被剝食矣君子居此萬姓賴安若得乘其車輿也小人處之則庶方無控被剝其廬舍故曰剝廬終不可用矣周易集解卷五
