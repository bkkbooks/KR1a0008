body:
  text: 周易集解卷六唐李鼎祚撰序卦曰物不可以終盡剥窮上反下故受之以復也崔憬曰夫易窮則有變物極則反於初故剥之為道不可終盡而受之於復也震下坤上復亨何妥曰復者歸本之名羣隂剥陽至於幾盡一陽來下故稱反復陽氣復反而得交通故云復亨也出入无疾朋來无咎虞翻曰謂出震成乾入巽成坤坎為疾十二消息不見坎象故出入无疾兌為朋在内稱來五隂從初初陽正息而成兌故朋來无咎矣反復其道七日來復案易軌一歲十二月三百六十五日四分日之一以坎震離兌四方正卦卦别六爻爻生一氣其餘六十卦三百六十爻爻主一日當周天之數餘五日四分日之一以通閏餘者也剥卦陽氣盡於九月之終至十月末純坤用事坤卦將盡則復陽來隔坤之一卦六爻為六日復來成震一陽爻生為七日故言反復其道七日來復是其義也天道𤣥邈理絶希慕先儒已論雖各指於日月後學尋討猶未測其端倪今舉約文略陳梗概以候來哲如積薪者也利有攸往虞翻曰陽息臨成乾小人道消君子道長故利有攸往矣彖曰復亨虞翻曰陽息坤與姤旁通剛反交初故亨剛反動而以順行虞翻曰剛從艮入坤從反震故曰反動坤順震行故而以順行陽不從上來反初故不言剛自外來是以眀不遠之復入坤出震義也是以出入无疾朋來无咎侯果曰陽上出君子道長也隂下入小人道消也動而以行故出入无疾朋來无咎矣反復其道七日來復天行也虞翻曰謂乾成坤反出於震而來復陽為道故復其道剛為晝日消乾六爻為六日剛來反初故七日來復天行也侯果曰五月天行至午陽復而陰升也十一月天行至子陰復而陽升也天地運往陰陽升復凡厯七月故曰七日來復此天之運行也豳詩曰一之日觱𤼵二之日栗烈一之日周之正月也二之日周之二月也則古人呼月為日明矣利有攸往剛長也荀爽曰利往居五剛道浸長也復其見天地之心乎虞翻曰坤為腹謂三復位時離為見坎為心陽息臨成泰乾天坤地故見天地之心也荀爽曰復者冬至之卦陽起初九為天地心萬物所始吉凶之先故曰見天地之心矣象曰雷在地中復先王以至日閉關商旅不行后不省方虞翻曰先王謂乾初至日冬至之日坤闔為閉關巽為商旅為近利市三倍姤巽伏初故商旅不行姤象曰后以施命誥四方今隱復下故后不省方復為陽始姤則隂始天地之始隂陽之首已言先王又更言后后君也六十四卦唯此重耳宋衷曰商旅不行自天子至公侯不省四方之事將以輔遂陽體成致君道也制之者王者之事奉之者為君之業也故上言先王而下言后也初九不遠復无祇悔元吉崔憬曰從坤反震而變此爻不遠復也復而有應故獲元吉也象曰不遠之復以修身也侯果曰祇大也往被隂剥所以有悔覺非遠復故无大咎以此修身顔子之分矣六二休復吉象曰休復之吉以下仁也王弼曰得位居中比初之上而附順之下仁之謂也旣處中位親仁善鄰復之休也六三頻復厲无咎虞翻曰頻蹙也三失位故頻復厲動而之正故无咎也象曰頻復之厲義无咎也侯果曰處震之極以隂居陽懼其將危頻蹙而復履危反道義亦无咎也六四中行獨復象曰中行獨復以從道也虞翻曰中謂初震為行初一陽爻故稱獨四得正應初故曰中行獨復以從道也俗説以四位在五隂之中而獨應復非也四在外體又非内象不在二五何得稱中行耳六五敦復无悔象曰敦復无悔中以自考也侯果曰坤為厚載故曰敦復體柔居剛无應失位所以有悔能自考省動不失中故曰无悔矣上六迷復凶有災眚虞翻曰坤㝠為迷高而无應故凶五變正時坎為災眚故有災眚也用行師終有大敗以其國君凶虞翻曰三復位時而體師象故用行師隂逆不順坤為死喪坎流血故終有大敗姤乾為君滅藏於坤坤為異邦故國君凶矣荀爽曰坤為衆故曰行師也謂上行師而距於初陽息上升必消羣隂故終有大敗國君謂初也受命復道當從下升今上六行師王誅必加故以其國君凶也至于十年不克征虞翻曰坤為至為十年隂逆坎臨故不克征謂五變設險故帥師敗喪君而无征也何妥曰理國之道須進善納諫迷而不復安可牧民以此行師必敗績矣敗乃思復失道已遠雖復十年乃征无所克矣案坤為先迷故曰迷復坤又為師象故曰行師坤數十十年之象也象曰迷復之凶反君道也虞翻曰姤乾為君坤隂滅之以國君凶故曰反君道也序卦曰復則不妄矣故受之以无妄崔憬曰物復其本則為成實故言復則无妄矣震下乾上无妄何妥曰乾上震下天威下行物皆絜齊不敢虚妄也元亨利貞遯上之初此所謂四陽二隂非大壯則遯來也剛來交初體乾故元亨三四失位故利貞也其匪正有眚不利有攸往虞翻曰非正謂上也四已之正上動成坎故有眚變而逆乘天命不祐故不利有攸往矣彖曰无妄剛自外來而為主於内蜀才曰此本遯卦案剛自上降為主於初故動而健剛中而應也於是乎邪妄之道消大通以正矣无妄大亨乃天道恒命也動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往虞翻曰動震也健大亨謂乾剛中謂五而應二大亨以正變四承五乾為天巽為命故曰大亨以正天之命也无妄之往何之矣虞翻曰謂四已變上動體屯坎為泣血漣如故何之矣天命不祐行矣哉虞翻曰天五也巽為命祐助也四已變成坤天道助順上動逆乘巽命故天命不祐行矣哉言不可行也馬君云天命不祐行非矣象曰天下雷行物與无妄九家易曰天下雷行陽氣普徧無物不與故曰物與也物受之以生无有災妄故曰物與无妄也虞翻曰與謂舉妄亡也謂雷以動之震為反生萬物出震无妄者也故曰物與无妄序卦曰復則不妄矣故受之以无妄而京氏及俗儒以為大旱之卦萬物皆死无所復妄失之遠矣有无妄然後可畜不死眀矣若物皆死將何畜聚以此疑也先王以茂對時育萬物虞翻曰先王謂乾乾盈為茂艮為對時體頤養象萬物出震故以茂對時育萬物言物皆死違此甚矣侯果曰雷震天下物不敢妄威震驚洽无物不與故先王以茂養萬物乃對時而育矣時泰則威之以无妄時否則利之以嘉遯是對時而化育也初九无妄往吉虞翻曰謂應四也四失位故命變之正四變得位承五應初故往吉矣在外稱往矣象曰无妄之往得志也虞翻曰四變應初夫妻體正故徃得志矣六二不耕穫不菑畬則利有攸往虞翻曰有益耕象无坤田故不耨震為禾稼艮為手禾在手中故稱穫田在初一歲曰菑在二三歲曰畬初爻非坤故不菑而畬也得位應五利四變之益則坤體成有耒耨之利故利有攸往往應五也象曰不耕穫未富也虞翻曰四動坤虚故未富也六三无妄之災或繋之牛行人之得邑人之災象曰行人得牛邑人災也虞翻曰上動體坎故稱災也四動之正坤為牛艮為鼻為止巽為桑為繩繋牛鼻而止桑下故或繋之牛也乾為行人坤為邑人乾四據三故行人之得三係於四故邑人之災或説以四變則牛應初震坤為死喪故曰行人得牛邑人災也九四可貞无咎虞翻曰動則正故可貞承五應初故无咎也象曰可貞无咎固有之也虞翻曰動隂承陽故固有之也九五无妄之疾勿藥有喜虞翻曰四已之正上動體坎坎為疾病故曰无妄之疾也巽為木艮為石故稱藥矣坎為多眚藥不可試故勿藥有喜康子饋藥丘未達故不嘗此之謂也象曰无妄之藥不可試也侯果曰位正居尊為无妄貴主百姓有過在予一人三四妄處五乃憂疾非乖攝則藥不可試若下皆不妄則不治自愈故曰勿藥有喜也上九无妄行有眚无攸利虞翻曰動而成坎故行有眚乘剛逆命故无攸利天命不祐行矣哉象曰无妄之行窮之災也崔憬曰居无妄之中有妄者也妄而應三上下非正窮而反妄故為災也序卦曰有无妄然後可畜也故受之以大畜崔憬曰有誠實則可以中心藏之故言有无妄然後可畜也乾下艮上大畜利貞虞翻曰大壯初之上其德剛上也與萃旁通二五失位故利貞此萃五之復二成臨臨者大也至上有頤養之象故名大畜也不家食吉利涉大川虞翻曰二稱家謂二五易位成家人家人體噬嗑食故利涉大川應乎天也彖曰大畜剛健篤實輝光日新虞翻曰剛健謂乾篤實謂艮二已之五利涉大川互體離坎離為日故輝光日新也其德剛上而尚賢蜀才曰此本大壯卦案剛自初升為主於外剛陽居上尊尚賢也能止健大正也虞翻曰健乾止艮也二五易位故大正舊讀言能止健誤也不家食吉養賢也虞翻曰二五易位成家人今體頤養象故不家食吉養賢也案乾為賢人也艮為宮闕也令賢人居於闕下不家食之象利涉大川應乎天也京房曰謂二變五體坎故利涉大川五天位故曰應乎天象曰天在山中大畜向秀曰止莫若山大莫若天天在山中大畜之象天為大器山則極止能止大器故名大畜也君子以多識前言往行以畜其德虞翻曰君子謂乾乾為言震為行坎為志識乾知大始震在乾前故識前言往行有頤養象故以畜其德矣初九有厲利己王弼曰四乃畜己未可犯也進則災危有厲則止故利己象曰有厲利己不犯災也虞翻曰謂二變正四體坎故稱災也九二輿説輹虞翻曰萃坤為車為輹坤消乾成故車説腹腹或作輹也象曰輿説輹中无尤也盧氏曰乾為輿案輹車之鉤心夾軸之物處失其正上應於五五居畜盛止不我升故且説輹停留待時而進退得正故无尤也九三良馬逐利艱貞日閑輿衛虞翻曰乾為良馬震為驚走故稱逐也謂二已變三在坎中故利艱貞吉離為日二至五體師象坎為閑習坤為車輿乾人在上震為驚衛講武閑兵故曰日閑輿衛也利有攸往象曰利有攸往上合志也虞翻曰謂上應也五已變正上動成坎坎為志故利有攸往與上合志也六四童牛之牿元吉虞翻曰艮為童五已之正萃坤為牛牿謂以木楅其角大畜畜物之家惡其觸害艮為手為小木巽為繩繩縛小木横著牛角故曰童牛之牿得位承五故元吉而喜喜謂五也象曰六四元吉有喜也侯果曰坤為輿故有牛矣牿楅也以木為之横施於角止其觝之威也初欲上進而四牿之角旣被牿則不能觸四是四童初之角也四能牿初與无角同所以元吉而有喜矣童牛无角之牛也封人職曰設其楅衡注云楅設於角衡設於鼻止其觝觸也六五豶豕之牙吉虞翻曰二變時坎為豕劇豕稱豶令不害物三至上體頤象五變之剛巽為白震為出剛曰從頤中出牙之象也動而得位豶豕之牙吉象曰六五之吉有慶也虞翻曰五變得正故有慶也崔憬曰説文豶劇豕今俗猶呼劇豬是也然以豕本剛突劇乃性和雖有其牙不足害物是制於人也以喻九二之剛健失位若豕之劇不足畏也而六五應止之易故吉有慶矣案九二坎爻坎為豕也以陽居隂而失其位若豕被劇之象也上九何天之衢亨虞翻曰何當也衢四交道乾為天震艮為道以震交艮故何天之衢亨上變坎為亨也王弼曰處畜之極畜極則亨何辭也猶云何畜乃天之衢亨道大行也象曰何天之衢道大行也虞翻曰謂上據二隂乾為天道震為行故道大行矣序卦曰物畜然後可養故受之以頤頤者養也崔憬曰大畜剛健輝光日新可以觀其所養故言物畜然後可養震下艮上頤貞吉虞翻曰晉四之初與大過旁通養正則吉謂三爻之正五上易位故頤貞吉反覆不衰與乾坤坎離大過小過中孚同義故不從臨觀四隂二陽之例或以臨二之上兌為口故有口實也觀頤虞翻曰離為目故觀頤觀其所養也自求口實虞翻曰或以大過兌為口或以臨兑為口坤為目艮為求口實頤中物謂其自養鄭𤣥曰頤者口車輔之名也震動於下艮止於上口車動而上因輔嚼物以養人故謂之頤頤養也能行養則其幹事故吉矣二五離爻皆得中離為目觀象也觀頤觀其養賢與不肖也頤中有物曰口實自二至五有二坤坤載養物而人所食之物皆存焉觀其求可食之物則貪廉之情可别也彖曰頤貞吉養正則吉也姚信曰以陽養隂動於下止於上各得其正則吉也宋衷曰頤者所由飲食自養也君子割不正不食況非其食乎是故所養必得賢眀自求口實必得體宜是謂養正也觀頤觀其所養也侯果曰王者所養養賢則吉也自求口實觀其自養也侯果曰此本觀卦初六升五九五降初則成頤也是自求口實觀其自養案口實謂頤口中也實事可言震聲也實物可食艮其成也天地養萬物翟𤣥曰天上地初也萬物衆隂也天地以元氣養萬物聖人以正道養賢及萬民此其聖也聖人養賢以及萬民虞翻曰乾為聖人艮為賢人頤下養上故聖人養賢坤隂為民皆在震上以貴下賤大得民故以及萬民頤之時大矣哉天地養物聖人養賢以及萬民人非頤不生故大矣象曰山下有雷頤劉表曰山止於上雷動於下頤之象也君子以愼言語節飲食荀爽曰雷為號令今在山中閉藏故愼言語雷動於上以陽食隂艮以止之故節飲食也言出乎身加乎民故愼言語所以養人也飲食不節殘賊羣生故節飲食以養物初九舍爾靈龜觀我朶頤凶虞翻曰晉離為龜四之初故舍爾靈龜艮為我震為動謂四失離入坤遠應多懼故凶矣象曰觀我朶頤亦不足貴也侯果曰初本五也五互體艮艮為山龜自五降初則為頤矣是舍爾靈龜之德來觀朶頤之饌貪禄致凶故不足貴案朶頤垂下動之貌也六二顚頤拂經于丘頤征凶王肅曰養下曰顚拂違也經常也丘小山謂六五也二宜應五反下養初豈非顚頤違常於五也故曰拂經于丘矣拂丘雖阻常理養下故謂養賢上旣无應征必凶矣故曰征凶象曰六二征凶行失類也侯果曰正則失養之類六三拂頤貞凶十年勿用无攸利虞翻曰三失位體剥不正相應弑父弑君故貞凶坤為十年動无所應故十年勿用无攸利也象曰十年勿用道大悖也虞翻曰弑父弑君故大悖也六四顚頤吉虎視眈眈其欲逐逐无咎王弼曰履得其位而應於初以上養下得頤之義故曰顚頤吉下交近瀆則咎矣故虎視眈眈威而不猛其欲逐逐而尚敦實修此二者乃得全其吉而无咎矣觀其自養則養正察其所養則養賢頤爻之貴斯為盛矣象曰顚頤之吉上施光也虞翻曰晉四之初謂三已變故顛頤與屯四乘坎馬同義坤為虎離為目眈眈下眩貌逐逐心煩類坤為吝嗇坎水為欲故其欲逐逐得位應初故无咎謂上已反三成離故上施光也六五拂經居貞吉不可涉大川虞翻曰失位故拂經无應順上故居貞吉艮為居也涉上成坎承陽无應故不可涉大川矣象曰居貞之吉順以從上也王弼曰以隂居陽拂頤之義也无應於下而比於上故宜居貞順而從上則吉上九由頤厲吉虞翻曰由自從也體剝居上衆隂順承故由頤失位故厲以坤艮自輔故吉也利涉大川象曰由頤厲吉大有慶也虞翻曰失位厲危之五得正成坎坎為大川故利涉大川變陽得位故大有慶也序卦曰不養則不可動故受之以大過崔憬曰養則可動動則過厚故受之以大過也巽下兌上大過棟橈虞翻曰大壯五之三或兌三之五棟橈謂三巽為長木稱棟初上隂柔本末弱故棟橈也利有攸往亨虞翻曰謂二也剛過而中失位无應利變應五之外稱往故利有攸往乃亨也彖曰大過大者過也虞翻曰陽稱大謂二也二失位故大者過也棟橈本末弱也向秀曰棟橈則屋壞主弱則國荒所以橈由於初上兩隂爻也初為善始末是令終始終皆弱所以棟橈王弼曰初為本而上為末也侯果曰本君也末臣也君臣俱弱棟橈者也剛過而中巽而説行利有攸往乃亨虞翻曰剛過而中謂二説兌也故利有攸往大壯震五之初故亨與遯而同義大過之時大矣哉虞翻曰國之大事在祀與戎藉用白茅女妻有子繼世承祀故大矣哉象曰澤滅木大過案兑澤也巽木漫也凡木生近水者楊也遇澤太過木則漫滅焉二五枯楊是其義君子以獨立不懼遯世无悶虞翻曰君子謂乾初陽伏巽中體復一爻潛龍之德故稱獨立不懼憂則違之乾初同義故遯世无悶也初六藉用白茅无咎虞翻曰位在下稱藉巽柔白為茅故藉用白茅失位咎也承二過四應五士夫故无咎矣象曰藉用白茅柔在下也侯果曰以柔處下履非其正咎也茍能絜誠肅恭不怠雖置羞於地可以薦奉況藉用白茅重愼之至何咎之有矣九二枯楊生稊老夫得其女妻无不利虞翻曰稊穉也楊葉未舒稱稊巽為楊乾為老老楊故枯楊在二也十二月時周之二月兑為雨澤枯楊得澤復生稊二體乾老故稱老夫女妻謂上兌兑為少女故曰女妻大過之家過以相與老夫得其女妻故无不利象曰老夫女妻過以相與也虞翻曰謂二過初與五五過上與二獨大過之爻得過其應故過以相與也九三棟橈凶象曰棟橈之凶不可以有輔也虞翻曰本末弱故橈輔之益橈故不可以有輔陽以隂為輔也九四棟隆吉有它吝虞翻曰隆上也應在於初己與五意在於上故棟隆吉失位動入險而陷於井故有他吝象曰棟隆之吉不橈乎下也虞翻曰乾為動直遠初近上故不橈下也九五枯楊生華老婦得其士夫无咎无譽虞翻曰陽在五也夬三月時周之五月枯楊得澤故生華矣老婦謂初巽為婦乾為老故稱老婦也士夫謂五大壯震為夫兌為少故稱士夫五過二使應上二過五使取初五得位故无咎隂在二多譽今退伏初故无譽體姤淫女故過以相與使應少夫象曰亦可醜也舊説以初為女妻上為老婦誤矣馬君亦然荀公以初隂失正當變數六為女妻二陽失正數九為老夫以五陽得正位不變數七為士夫上隂得正數八為老婦此何異俗説也悲夫學之難而以初本為小反以上末為老後之達者詳其義焉象曰枯楊生華何可久也老婦士夫亦可醜也虞翻曰乾為久枯而生華故不可久也婦體姤淫故可醜也上六過涉滅頂凶无咎虞翻曰大壯震為足兌為水澤震足没水故過涉也頂首也乾為頂頂没兑水中故滅頂凶乘剛咎也得位故无咎與滅耳同義也象曰過涉之凶不可咎也九家易曰君子以禮義為法小人以畏愼為宜至於大過之世不復遵常故君子犯義小人犯刑而家家有誅絶之罪不可咎也大過之世君子遜遯不行禮義謂當不義則爭之若比干諫而死是也桀紂之民可比屋而誅上化致然亦不可咎曾子曰上失其道民散久矣如得其情則哀矜而勿喜是其義也序卦曰物不可以終過故受之以坎坎者陷也崔憬曰大過不可以極極則過涉滅頂故曰物不可以終過故受之以坎也坎下坎上習坎有孚虞翻曰乾二五之坤與離旁通於爻觀上之二習常也孚信謂二五水行往來朝宗于海不失其時如月行天故習坎為孚也維心亨虞翻曰坎為心乾二五旁行流坤隂陽會合故亨也行有尚虞翻曰行謂二尚謂五也二位震為行動得正應五故行有尚往有功也彖曰習坎重險也虞翻曰兩象也天險地險故曰重險也水流而不盈荀爽曰陽動隂中故流陽䧟隂中故不盈也陸績曰水性趨下不盈溢崖岸也月者水精月在天滿則虧不盈溢之義也行險而不失其信荀爽曰謂陽來為險而不失中中稱信也虞翻曰信謂二也震為行水性有常消息與月相應故不失其信矣維心亨乃以剛中也侯果曰二五剛而居中則心亨也行有尚往有功也虞翻曰功謂五二動應五故往有功也天險不可升也虞翻曰謂五在天位五從乾來體屯難故天險不可升也地險山川丘陵也虞翻曰坤為地乾二之坤故曰地險艮為山坎為川半山稱丘丘下稱陵故曰地險山川丘陵也王公設險以守其國虞翻曰王公大人謂乾五坤為邦乾二之坤成坎險震為守有屯難象故王公設險以守其國離言王用出征以正邦是也案九五王也六三三公也艮為山城坎為水也王公設險之象也險之時用大矣哉王肅曰守險以德據險以時成功大矣象曰水洊至習坎君子以常德行習教事陸績曰洊再重習也水再至而益通流不舎晝夜重重習相隨以為常有似於習故君子象之以常習教事如水不息也虞翻曰君子謂乾五在乾稱大人在坎為君子坎為習為常乾為德震為行巽為教令坤為事故以常德行習教事也初六習坎入于坎窞凶干寳曰窞坎之深者也江河淮濟百川之流行乎地中水之正也及其為災則泛溢平地而入于坎窞是水失其道也刑獄之用必當于理刑之正也及其不平則枉濫无辜是法失其道也故曰入于坎窞凶矣象曰習坎入坎失道凶也虞翻曰習積也位下故習坎為入坎中小穴稱窞上无其應初二失正故曰失道凶矣九二坎有險求小得虞翻曰陽陷隂中故有險據隂有實故求小得也象曰求小得未出中也荀爽曰處中而比初三未足為援雖求小得未出於險中六三來之坎坎險且枕入于坎窞勿用虞翻曰坎在内稱來在坎終坎故來之坎坎枕止也艮為止三失位乘二則險承五隔四故險且枕入于坎窞體師三輿故勿用象曰來之坎坎終无功也干寳曰坎十一月卦也又失其位喻殷之執法者失中之象也來之坎者斥周人觀釁於殷也枕安也險且枕者言安忍以㬥政加民而无哀矜之心淫刑濫罰百姓无所措手足故曰來之坎坎終无功也六四樽酒簋貳用缶虞翻曰震主祭器故有樽簋坎為酒簋黍稷器三至五有頤口象震獻在中故為簋坎為木震為足坎酒在上樽酒之象貳副也坤為缶禮有副樽故貳用缶耳納約自牖終无咎虞翻曰坎為納也四隂小故約艮為牖坤為戸艮小光照戸牖之象貳用缶故納約自牖得位承五故无咎崔憬曰於重險之時居多懼之地近三而得位比五而承陽修其絜誠進其忠信則雖祭祀省薄眀德惟馨故曰樽酒簋貳用缶納約文王於紂時行此道從羑里納約卒免於難故曰自牖終无咎也象曰樽酒簋貳剛柔際也虞翻曰乾剛坤柔震為交故曰剛柔際也九五坎不盈祗旣平无咎虞翻曰盈溢也艮為止謂水流而不盈坎為平祇安也艮止坤安故祇旣平得位正中故无咎象曰坎不盈中未光大也虞翻曰體屯五中故未光大也上六係用徽纆寘于叢棘三歲不得凶虞翻曰徽纆黑索也觀巽為繩艮為手上變入坎故係用徽繩寘置也坎多心故叢棘獄外種九棘故稱叢棘二變則五體剥剥傷坤殺故寘于叢棘也不得謂不得出獄艮止坎獄乾為歲五從乾來三非其應故曰三歲不得凶矣象曰上六失道凶三歲也九家易曰坎為叢棘又為法律案周禮王之外朝左九棘右九棘面三槐司宼公卿議獄於其下害人者加眀刑任之以事上罪三年舍中罪二年而舍下罪一年而舍也案坎於木堅而多心叢棘之象也坎下巽爻巽為繩直係用徽纆也馬融云徽纆索也劉表云三股為徽兩股為纆皆索名以繫縛其罪人矣序卦曰陷必有所麗故受之以離離者麗也崔憬曰物極則反坎雖陷於地必有所麗於天而受之以離也離下離上離利貞亨虞翻曰坤二五之乾與坎旁通於爻遯初之五柔麗中正故利貞亨畜牝牛吉虞翻曰畜養也坤為牝牛乾二五之坤成坎體頤養象故畜牝牛吉俗説皆以離為牝牛失之矣彖曰離麗也荀爽曰隂麗於陽相附麗也亦為别離以隂隔陽也離者火也託於木是其附麗也煙燄飛升炭灰降滯是其别離也日月麗乎天虞翻曰乾五之坤成坎為月離為日日月麗天也百穀草木麗乎土虞翻曰震為百穀巽為草木坤為地乾二五之坤成坎震體屯屯者盈也盈天地之間者唯萬物萬物出震故百穀草木麗乎土重眀以麗乎正乃化成天下虞翻曰兩象故重眀正謂五陽陽變之坤來化乾以成萬物謂離日化成天下也柔麗乎中正故亨虞翻曰柔謂五隂中正謂五伏陽出在坤中畜牝牛故中正而亨也是以畜牝牛吉也荀爽曰牛者土也生土於火離者隂卦牝者隂性故曰畜牝牛吉矣象曰眀兩作離虞翻曰兩謂日與月也乾五之坤成坎坤二之乾成離離坎日月之象故眀兩作離作成也日月在天動成萬物故稱作矣或以日與火為眀兩作也大人以繼眀照于四方虞翻曰陽氣稱大人則乾五大人也乾二五之光繼日之眀坤為方二五之坤震東兑西離南坎北故曰照于四方初九履錯然敬之无咎荀爽曰火性炎上故初欲履錯於三二為三所據故敬之則无咎矣象曰履錯之敬以辟咎也王弼曰錯然敬愼之貌也處離之始將進其盛故宜愼所履以敬為務辟其咎也六二黄離元吉象曰黄離元吉得中道也侯果曰此本坤爻故云黄離來得中道所以元吉也九三日昃之離荀爽曰初為日出二為日中三為日昃以喻君道衰也不鼔缶而歌則大耋之嗟凶九家易曰鼓缶者以目下視離為大腹瓦缶之象謂不取二也歌者口仰向上謂兑為口而向上取五也日昃者向下也今不取二而上取五則上九耋之陽稱大也嗟者謂上被三奪五憂嗟窮凶也火性炎上故三欲取五也象曰日昃之離何可久也九家易曰日昃當降何可久長三當據二以為鼔缶而今與四同取於五故曰不鼓缶而歌也九四突如其來如焚如死如棄如荀爽曰陽升居五光炎宣揚故突如也隂退居四灰炭降墜故其來如也隂以不正居尊乘陽厯盡數終天命所誅位喪民畔下離所害故焚如也以離入坎故死如也火息灰損故棄如也象曰突如其來如无所容也九家易曰在五見奪在四見棄故无所容也六五出涕沱若荀爽曰六五隂柔退居於四出離為坎故出涕沱若而下以順隂陽也戚嗟若吉虞翻曰坎為心震為聲兑為口故戚嗟若動而得正尊麗陽故吉也象曰六五之吉離王公也九家易曰戚嗟順陽附麗於五故曰離王公也陽當居五隂退還四五當為王三則三公也四處其中附上下矣上九王用出征有嘉折首獲匪其醜无咎虞翻曰王謂乾乾二五之坤成坎體師象震為出故王用出征首謂坤二來折乾故有嘉折首醜類也乾征得坤隂類乾陽物故獲非其醜无咎矣象曰王用出征以正邦也虞翻曰乾五出征坤故正邦也周易集解卷六
