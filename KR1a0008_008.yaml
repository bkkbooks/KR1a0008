body:
  text: 周易集解卷八唐李鼎祚撰序卦曰傷於外者必反於家故受之以家人韓康伯曰傷於外者必反諸內也離下巽上家人利女貞虞翻曰遁初之四也女謂離巽二四得正故利女貞也馬融曰家人以女為奧主長女中女各得其正故特曰利女貞矣彖曰家人女正位乎內男正位乎外王弼曰謂二五也家人之義以內為本者也故先説女矣男女正天地之大義也虞翻曰遁乾為天三動坤為地男得天正於五女得地正於二故天地之大義也家人有嚴君焉父母之謂也荀爽曰離巽之中有乾坤故曰父母之謂也王肅曰凡男女所以能各得其正者由家人有嚴君也家人有嚴君故父子夫婦各得其正家家咸正而天下之治大定矣案二五相應為卦之主五陽在外二隂在內父母之謂也父父子子兄兄弟弟虞翻曰遁乾為父艮為子三五位正故父父子子三動時震為兄艮為弟初位正故兄兄弟弟夫夫婦婦虞翻曰三動時震為夫巽四為婦初四位正故夫夫婦婦也而家道正正家而天下定矣荀爽曰父謂五子謂四兄謂三弟謂初夫謂五婦謂二也各得其正故天下定矣陸績曰聖人教先從家始家正而天下化之修已以安百姓者也象曰風自火出家人馬融曰木生火火以木為家故曰家人火生於木得風而盛猶夫婦之道相須而成君子以言有物而行有恆荀爽曰風火相與必附於物物大火大物小火小君子之言必因其位位大言大位小言小不在其位不謀其政故言有物也大暑爍金火不增其烈大寒凝冰火不損其熱故曰行有恆矣初九間有家悔亡象曰間有家志未變也荀爽曰初在潛位未干國政間習家事而已未得治官故悔居家理治可移於官守之以正故悔亡而未變從國之事故曰志未變也六二無攸遂在中饋貞吉荀爽曰六二處和得正得正有應有應有實隂道之至美者也坤道順從故無所得遂供肴中饋酒食是議故曰中饋居中守正永貞其志則吉故曰貞吉也象曰六二之吉順以巽也九家易曰謂二居貞巽順於五則吉矣九三家人嗃嗃悔厲吉婦子嘻嘻終吝王弼曰以陽居陽剛嚴者也處下體之極為一家之長行與其慢也寧過乎恭家與其瀆也寧過乎嚴是以家雖嗃嗃悔厲猶得吉也婦子嘻嘻失家節也侯果曰嗃嗃嚴也嘻嘻笑也象曰家人嗃嗃未失也婦子嘻嘻失家節也九家易曰别體異家隂陽相據喜樂過節也别體異家謂三五也隂陽相據三五各相據隂故言婦子也六四富家大吉象曰富家大吉順在位也虞翻曰三變體艮艮為篤實坤為大業得位應初順五乘三比據三陽故曰富家大吉順在位也謂順於五矣九五王假有家勿恤吉陸績曰假大也五得尊位據四應二以天下為家故曰王大有家天下正之故無所憂則吉象曰王假有家交相愛也虞翻曰乾為愛也二稱家三動成震五得交二初得交四故交相愛震為交也上九有孚威如終吉虞翻曰謂三已變與上易位成坎坎為孚故有孚乾為威如自上之坤故威如易則得位故終吉也象曰威如之吉反身之謂也虞翻曰謂三動坤為身上之三成既濟定故反身之謂此家道正正家而天下定矣序卦曰家道窮必乖故受之以睽睽者乖也崔憬曰婦子嘻嘻過在失節失節則窮窮則乖故曰家道窮必乖兌下離上睽小事吉虞翻曰大壯上之三在繫蓋取無妄二之五也小謂五隂稱小得中應剛故吉鄭玄曰睽乖也火欲上澤欲下猶人同居而志異也故謂之睽二五相應君隂臣陽君而應臣故小事吉彖曰睽火動而上澤動而下虞翻曰離火炎上澤水潤下也二女同居其志不同行虞翻曰二女離兌也坎為志離上兌下無妄震為行巽為同艮為居二五易位震巽象壞故二女同居其志不同行也説而麗乎眀柔進而上行得中而應乎剛虞翻曰説兌麗離也眀謂乾當言大眀以麗於晉柔謂五無妄巽為進從二之五故上行剛謂應乾五伏陽非應二也與鼎五同義也是以小事吉荀爽曰小事者臣事也百官異體四民殊業故睽而不同剛者君也柔得其中而進於君故言小事吉也天地睽而其事同也王肅曰高卑雖異同育萬物虞翻曰五動乾為天四動坤為地故天地睽坤為事也五動體同人故事同矣男女睽而其志通也侯果曰出處雖殊情通志合虞翻曰四動艮為男兌為女故男女睽坎為志為通故其志通也萬物睽而其事類也崔憬曰萬物雖睽於形色而生性事類言亦同也虞翻曰四動萬物出乎震區以别矣故萬物睽坤為事為類故其事類也睽之時用大矣哉九家易曰乖離之卦於義不大而天地事同共生萬物故曰用大盧氏曰不言義而言用者眀用睽之義至大矣象曰上火下澤睽荀爽曰火性炎上澤性潤下故曰睽也君子以同而異荀爽曰大歸雖同小事當異百官殊職四民異業文武並用威德相反共歸於治故曰君子以同而異也初九悔亡喪馬勿逐自復見惡人無咎象曰見惡人以避咎也虞翻曰無應悔也四動得位故悔亡應在于坎坎為馬四而失位之正入坤坤為喪坎象不見故喪馬震為逐艮為止故勿逐坤為自二至五體復象故自復四動震馬來故勿逐自復也離為見惡人謂四動入坤初四復正故見惡人以避咎矣九二遇主于巷無咎虞翻曰二動體震震為主為大塗艮為徑路大道而有徑路故稱巷變而得正故無咎而未失道也象曰遇主于巷未失道也虞翻曰動得正故未失道崔憬曰處睽之時與五有應男女雖隔其志終通而三比焉近不相得遇者不期而會主者三為下卦之主巷者出門近遇之象言二遇三眀非背五未為失道也九三見輿曳其牛􅯒虞翻曰離為見坎為車為曳故見輿曳四動坤為牛為類牛角一低一仰故稱􅯒離上而坎下其牛􅯒也其人天且劓無初有終虞翻曰其人謂四惡人也黥額為天割鼻為劓無妄乾為天震二之乾五以隂墨其天乾五之震二毁艮割其鼻也兌為刑人故其人天且劓失位動得正成乾故無初有終象曰遇剛是其義也象曰見輿曵位不當也無初有終遇剛也虞翻曰動正成乾故遇剛九四睽孤遇元夫交孚厲無咎虞翻曰孤顧也在兩隂間睽五顧三故曰睽孤震為元夫謂二已變動而應震故遇元夫也震為交坎為孚動而得正故交孚厲無咎矣象曰交孚無咎志行也虞翻曰坎動成震故志行也六五悔亡厥宗噬膚往何咎虞翻曰往得位悔亡也動而之乾乾為宗二體噬嗑故曰噬四變時艮為膚故曰厥宗噬膚也變得正成乾乾為慶故往無咎而有慶矣象曰厥宗噬膚往有慶也王弼曰非位悔也有應故悔亡厥宗謂二也噬膚者齧柔也三雖比二二之所噬非妨已應者也以斯而往何咎之有往必見合故有慶也案二兌為口五爻隂柔噬膚之象也上九睽孤見豕負塗載鬼一車虞翻曰睽三顧五故曰睽孤也離為見坎為豕為雨四變時坤為土土得雨為泥塗四動艮為背豕背有泥故見豕負塗矣坤為鬼坎為車變在坎上故載鬼一車也先張之弧後説之壺虞翻曰謂五已變乾為先應在三坎為弧離為矢腹張弓之象也故先張之弧四動震為後説猶置也兌為口離為大腹坤為器大腹有口坎酒在中壺之象也之應歷險以與兌故後説之壺矣匪寇婚媾往遇雨則吉虞翻曰匪非坎為寇之三歷坎故匪寇隂陽相應故婚媾三在坎下故遇雨與上易位坎象不見各得其正故則吉也象曰遇雨之吉羣疑亡也虞翻曰物三稱羣坎為疑三變坎敗故羣疑亡矣序卦曰乖必有難故受之以蹇蹇者難也崔憬曰二女同居其志乖而難生故曰乖必有難也艮下坎上蹇利西南虞翻曰觀上反三也坤西南卦五在坤中坎為月月生西南故利西南往得中謂西南得朋也不利東北虞翻曰謂三也艮東北之卦月消於艮喪乙滅癸故不利東北其道窮也則東北喪朋矣利見大人虞翻曰離為見大人謂五二得位應五故利見大人往有功也貞吉虞翻曰謂五當位正邦故貞吉也彖曰蹇難也險在前也見險而能止知矣哉虞翻曰離見坎險艮為止觀乾為智故知矣哉蹇利西南往得中也荀爽曰西南謂坤升二往居坤五故得中也不利東北其道窮也荀爽曰東北艮也艮在坎下見險而止故其道窮也利見大人往有功也虞翻曰大人謂五二往應五五多功故往有功也當位貞吉以正邦也荀爽曰謂五當尊位正居是羣隂順從故能正邦國蹇之時用大矣哉虞翻曰謂坎月生西南而終東北震象出庚兌象見丁乾象盈甲巽象退辛艮象消丙坤象窮乙喪滅於癸終則復始以生萬物故用大矣象曰山上有水蹇崔憬曰山上至險加之以水蹇之象也君子以反身修德虞翻曰君子謂觀乾坤為身觀上反三故反身陽在三進德修業故以反身修德孔子曰德之不修是吾憂也初六往蹇來譽虞翻曰譽謂二二多譽也失位應隂往歷坎險故往蹇變而得位以陽承二故來而譽矣象曰往蹇來譽宜待也虞翻曰艮為時謂變之正以待四也六二王臣蹇蹇匪躬之故虞翻曰觀乾為王坤為臣為躬坎為蹇也之應涉坤二五俱坎故王臣蹇蹇觀上之三折坤之體臣道得正故匪躬之故象曰終無尤也象曰王臣蹇蹇終無尤也侯果曰處艮之二上應於五五在坎中險而又險志在匡弼匪惜其躬故曰王臣蹇蹇匪躬之故輔君以此終無尤也九三往蹇來反虞翻曰應正歷險故往蹇反身據二故來反也象曰往蹇來反內喜之也虞翻曰內喜謂二隂也六四往蹇來連虞翻曰連輦蹇難也在兩坎間進則無應故往蹇退初介三故來連也象曰往蹇來連當位實也荀爽曰蹇難之世不安其所欲往之三不得承陽故曰往蹇也來還承五則與至尊相連故曰來連也處正承陽故曰當位實也九五大蹇朋來虞翻曰當位正邦故大蹇睽兌為朋故朋來也象曰大蹇朋來以中節也干寶曰在險之中而當王位故曰大蹇此蓋以託文王為紂所囚也承上據四應三衆隂並至此蓋以託四臣能以權智相救也故曰以中節也上六往蹇來碩吉利見大人虞翻曰隂在險上變失位故往蹇碩謂三艮為碩退來之三故來碩得位有應故吉也離為見大人謂五故利見大人矣象曰往蹇來碩志在內也利見大人以從貴也侯果曰處蹇之極體猶在坎水無所之故曰往蹇來而復位下應於三三德碩大故曰來碩三為內主五為大人若志在內心附於五則利見大人也案三互體離離為眀目五為大人利見大人之象也序卦曰物不可以終難故受之以解解者緩也崔憬曰蹇終則來碩吉利見大人故言物不可以終難故受之以解坎下震上解利西南虞翻曰臨初之四坤西南卦初之四得坤衆故利西南往得衆也無所往其來復吉虞翻曰謂四本從初之四失位於外而無所應宜來反初故無所往復得正位故其來復吉也二往之五四來之初成屯體復象故稱來復吉矣有攸往夙吉虞翻曰謂二也夙早也離為日為甲日出甲上故早也九二失正早往之五則吉故有攸往夙吉往有功也象曰解險以動動而免乎險解虞翻曰險坎動震解二月雷以動之雨以潤之物咸孚甲萬物生震震出險上故免乎險也解利西南往得衆也荀爽曰乾動之坤而得衆西南衆之象也無所往荀爽曰隂處尊位陽無所往也其來復吉乃得中也荀爽曰來復居二處中成險故曰復吉也有攸往夙吉往有功也荀爽曰五位無君二陽又卑往居之者則吉據五解難故有功也天地解而雷雨作荀爽曰謂乾坤交通動而成解卦坎下震上故雷雨作也雷兩作而百果草木皆甲坼荀爽曰解者震世也仲春之月草木萌牙雷以動之雨以潤之日以烜之故甲坼也解之時大矣哉王弼曰無所而不釋也難解之時非治難時也故不言用也體盡於解之名無有幽隱故不曰義也象曰雷雨作解君子以赦過宥罪虞翻曰君子謂三伏陽出成大過坎為罪入則大過象壞故以赦過二四失位皆在坎獄中三出體乾兩坎不見震喜兌悅罪人皆出故以宥罪謂三入則赦過出則宥罪公用射隼以解悖是其義也初六無咎虞翻曰與四易位體震得正故無咎也象曰剛柔之際義無咎也虞翻曰體屯初震剛柔始交故無咎也九二田獲三狐得黃矢貞吉虞翻曰二稱田田獵也變之正艮為狐坎為弓離為黃矢矢貫狐體二之五歷三爻故田獲三狐得黃矢之正得中故貞吉象曰九二貞吉得中道也虞翻曰動得正故得中道六三負且乘虞翻曰負倍也二變時艮為背謂三以四艮倍五也五來寇三時坤為車三在坤上故負且乘小人而乘君子之器故象曰亦可醜也致寇至貞吝虞翻曰五之二成坎坎為寇盜上位慢五下暴於二慢藏誨盜故致寇至貞吝象曰自我致戎又誰咎也象曰負且乘亦可醜也自我致戎又誰咎也虞翻曰臨坤為醜也坤為自我以離兵伐三故轉寇為戎艮手招盜故誰咎也九四解而拇朋至斯孚虞翻曰二動時艮為指四變之坤為拇故解而拇臨兌為朋坎為孚四陽從初故朋至斯孚矣象曰解而拇未當位也王弼曰失位不正而比於三故三得附之為其拇也三為之拇則失初之應故解其拇然後朋至斯孚而信矣案九四體震震為足三在足下拇之象六五君子維有解吉有孚于小人虞翻曰君子謂二之五得正成坎坎為心故君子維有解吉小人謂五隂為小人君子升位則小人退在二故有孚于小人坎為孚也象曰君子有解小人退也虞翻曰二陽上之五五隂小人退之二也上六公用射隼于高墉之上獲之無不利虞翻曰上應在三公謂三伏陽也離為隼三失位動出成乾貫隼入大過故公用射隼于髙墉之上獲之無不利也案二變時體艮艮為山為宮闕三在山半髙墉之象也象曰公用射隼以解悖也虞翻曰坎為悖三出成乾而坎象壞故解悖也九家易曰隼鷙鳥也今捕食雀者其性疾害喻暴君也隂盜陽位萬事悖亂今射去之故曰以解悖也序卦曰緩必有所失故受之以損崔憬曰宥罪緩死失之於僥幸有損於政刑故言緩必有所失故受之以損者也兌下艮上損鄭玄曰艮為山兌為澤互體坤坤為地山在地上澤在地下澤以自損增山之髙也猶諸侯損其國之富以貢獻於天子故謂之損矣有孚元吉無咎可貞利有攸往虞翻曰泰初之上損下益上以據二隂故有孚元吉無咎艮男居上兌女在下男女位正故可貞利有攸往矣曷之用二簋可用享崔憬曰曷何也言其道上行將何所用可用二簋而享也以喻損下益上惟在乎心何必竭於不足而補有餘者也彖曰損損下益上其道上行蜀才曰此本泰卦案坤之上九下處乾三乾之九三上升坤六損下益上者也陽德上行故曰其道上行矣損而有孚荀爽曰謂損乾之三居上孚二隂也元吉無咎荀爽曰居上據隂故元吉無咎以未得位嫌於咎也可貞荀爽曰少男在下少女雖年尚糿必當相承故曰可貞利有攸往荀爽曰謂陽利往居上損者損下益上故利往居上曷之用二簋可用享荀爽曰二簋謂上體二隂也上為宗廟簋者宗廟之器故可享獻也二簋應有時虞翻曰時謂春秋也損二之五震二月益正月春也損七月兌八月秋也謂春秋祭祀以時思之艮為時震為應故應有時也損剛益柔有時虞翻曰謂冬夏也二五已易成益坤為柔謂損益上之三成既濟坎冬離夏故損剛益柔有時損益盈虛與時偕行虞翻曰乾為盈坤為虛損剛益柔故損益盈虛謂泰初之上損二之五益上之時變通趨時故與時偕行象曰山下有澤損君子以懲忿窒欲虞翻曰君子泰乾乾陽剛武為忿坤隂吝嗇為欲損乾之初成兌説故懲忿初上據坤艮為山故欲窒也初九祀事遄往無咎酌損之虞翻曰祀祭祀坤為事謂二也遄速酌取也二失正初利二速往合志於五得正無咎已得之應故遄往無咎酌損之故象曰上合志也祀舊作已也象曰祀事遄往尚合志也虞翻曰終成既濟謂二上合志於五也九二利貞征凶弗損益之虞翻曰失位當之正故利貞征行也震為征失正毁折故不征之五則凶二之五成益小損大益故弗損益之矣象曰九二利貞中以為志也虞翻曰動體離中故為志也六三三人行則損一人虞翻曰泰乾三爻為三人震為行故三人行損初之上故則損一人一人行則得其友虞翻曰一人謂泰初之上損剛益柔故一人行兌為友初之上據坤應兌故則得其友言致一也象曰一人行三則疑也虞翻曰坎為疑上益三成坎故三則疑荀爽曰一陽在上則教令行三陽在下則民衆疑也六四損其疾使遄有喜無咎虞翻曰四謂二也四得位遠應初二疾上五已得承之謂二之五三上復坎為疾也陽在五稱喜故損其疾使遄有喜二上體觀得正承五故無咎矣象曰損其疾亦可喜也蜀才曰四當承上而有初應必上之所疑矣初四之疾也宜損去其初使上遄喜虞翻曰二上之五體大觀象故可喜也六五或益之十朋之龜弗克違元吉虞翻曰謂二五已變成益故或益之坤數十兊為朋三上失位三動離為龜十謂神靈攝寶文筮山澤水火之龜也故十朋之龜三上易位成既濟故弗克違元吉矣象曰六五元吉自上祐也侯果曰內柔外剛龜之象也又體兌艮互有坤震兌為澤龜艮為山龜坤為地龜震為木龜坤數又十故曰十朋朋類也六五處尊損已奉上人謀允叶龜墨不違故能延上九之祐而來十朋之益所以大吉也崔憬曰或之者疑之也故用元龜價直二十大貝龜之最神貴者以決之不能違其益之義故獲元吉雙貝曰朋也上九弗損益之無咎貞吉虞翻曰損上益三也上失正之三得位故弗損益之無咎貞吉動成既濟故大得志利有攸往得臣無家虞翻曰謂三往之上故利有攸往二五已動成益坤為臣三變據坤成家人故曰得臣動而應三成既濟則家人壞故曰無家王肅曰處損之極損極則益故曰不損益之非無咎也為下所益故無咎據五應三三隂上附外內相應上下交接正之吉也故利有攸往矣剛陽居上羣下共臣故曰得臣矣得臣則萬方一軌故無家也象曰弗損益之大得志也虞翻曰謂二五已變上下益三成既濟定離坎體正故大得志序卦曰損而不已必益故受之以益崔憬曰損終則弗損益之故言損而不已必益也震下巽上益利有攸往虞翻曰否上之初也損上益下其道大光二利往坎應五故利有攸往中正有慶也利涉大川虞翻曰謂三失正動成坎體渙坎為大川故利涉大川渙舟楫象木道乃行也鄭玄曰隂陽之義陽稱為君隂稱為臣今震一陽二隂臣多於君矣而四體巽之不應初是天子損其所有以下諸侯也人君之道以益下為德故謂之益也震為雷巽為風雷動風行二者相成猶人君出教令臣奉行之故利有攸往坎為大川利涉大川矣彖曰益損上益下蜀才曰此本否卦案乾之上九下處坤初坤之初六上升乾四損上益下者也民説無疆虞翻曰上之初坤為無疆震為喜笑以貴下賤大得民故説無疆矣自上下下其道大光虞翻曰乾為大眀以乾照坤故其道大光或以上之三離為大光矣利有攸往中正有慶虞翻曰中正謂五而二應之乾為慶也利涉大川木道乃行虞翻曰謂三動成渙渙舟楫象巽木得水故木道乃行也益動而巽日進無疆虞翻曰震三動為離離為日巽為進坤為疆日與巽俱進故日進無疆也天施地生其益無方虞翻曰乾下之坤震為出生萬物出震故天施地生陽在初坤為無方日進無疆故其益無方也凡益之道與時偕行虞翻曰上來益三四時象正艮為時震為行與損同義故與時偕行也象曰風雷益君子以見善則遷有過則改虞翻曰君子謂乾也上之三離為見乾為善坤為過坤三進之乾四故見善則遷乾上之坤初改坤之過體復象復以自知故有過則改也初九利用為大作元吉無咎虞翻曰大作謂耕播耒耨之利蓋取諸此也坤為用乾為大震為作故利用為大作體復初得正朋來無咎故元吉無咎震三月卦日中星鳥敬授民時故以耕播也象曰元吉無咎下不厚事也侯果曰大作為耕植也處益之始居震之初震為稼穡又為大作益之大者莫大耕植故初九之利利為大作若能不厚勞於下民不奪時於農畯則大吉無咎矣六二或益之十朋之龜弗克違永貞吉虞翻曰謂上從外來益三故或益之二得正遠應利三之正已得承之坤數十損兌為朋謂三變離為龜故十朋之龜坤為永上之三得正故永貞吉王用享于帝吉虞翻曰震稱帝王謂五否乾為王體觀象艮為宗廟三乾折坤牛體噬嗑食故王用享于帝得位故吉干寶曰聖王先成其民而後致力于神故王用享于帝在巽之宮處震之象是則蒼精之帝同始祖矣象曰或益之自外來也虞翻曰乾上稱外來益三也六三益之用凶事無咎虞翻曰坤為事三多凶上來益三得正故益用凶事無咎有孚中行告公用圭虞翻曰公謂三伏陽也三動體坎故有孚震為中行為告位在中故曰中行三公位乾為圭乾之三故告公用圭圭桓圭也九家易曰天子以尺二寸玄圭事天以九寸事地也上公執桓圭九寸諸侯執信圭七寸諸伯執躬圭七寸諸子執穀璧五寸諸男執蒲璧五寸五等諸侯各執之以朝見天子也象曰益用凶事固有之矣虞翻曰三上失正當變是固有之干寶曰固有如桓文之徒罪近篡弒功實濟世六三失位而體姦邪處震之動懷巽之權是矯命之士爭奪之臣桓文之爻也故曰益之用凶事在益之家而居坤中能保社稷愛撫人民故曰無咎既乃中行近仁故曰有孚中行然後俯列盟會仰致錫命故曰告公用圭六四中行告公從虞翻曰中行謂正位在中震為行為從故曰中行公謂三三上失位四利三之正已得以為實故曰告公從矣利用為依遷國虞翻曰坤為國遷徙也三動坤從故利用為依遷國也象曰告公從以益志也虞翻曰坎為志三之上有兩坎象故以益志也崔憬曰益其勤王之志也居益之時履當其位與五近比而四上公得藩屏之寄為依從之國若周平王之東遷晉鄭是從也五為天子益其忠志以勑之故言中行告公從利用為依遷國矣九五有孚惠心勿問元吉虞翻曰謂三上也震為問三上易位三五體坎已成既濟坎為心故有孚惠心勿問元吉故象曰勿問之矣有孚惠我德虞翻曰坤為我乾為德三之上體坎為孚故惠我德象曰大得志象曰有孚惠心勿問之矣惠我德大得志也崔憬曰居中履尊當位有應而損上之時自一以損己為念雖有孚于國惠心及下終不言以彰已功故曰有孚惠心勿問問猶言也如是則獲元吉且為下所信而懷已德故曰有孚惠我德君雖不言人惠其德則我大得志也上九莫益之虞翻曰莫無也自非上無益三者唯初當無應故莫益之矣或擊之虞翻曰謂上不益初則以剝滅乾艮為手故或擊之立心勿恆凶虞翻曰上體巽為進退故勿恆動成坎心以隂乘陽故立心勿恆凶矣象曰莫益之遍辭也虞翻曰遍周匝也三體剛凶故至上應乃益之矣或擊之自外來也虞翻曰外謂上上來之三故曰自外來也周易集解卷八
