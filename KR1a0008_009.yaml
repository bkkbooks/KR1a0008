body:
  text: 周易集解卷九唐李鼎祚撰序卦曰益而不已必決故受之以夬夬者決也韓康伯曰益而不已則盈故必決矣乾下兌上夬揚于王庭虞翻曰陽決隂息卦也剛決柔與剝旁通乾為陽為王剝艮為庭故揚于王庭矣鄭玄曰夬決也陽氣浸長至於五五尊位也而隂先之是猶聖人積德説天下以漸消去小人至於受命為天子故謂之決揚越也五互體乾乾為君又居尊位王庭之象也隂爻越其上小人乘君子罪惡上聞於聖人之朝故曰夬揚于王庭也孚號有厲虞翻曰陽在二五稱孚孚謂五也二失位動體巽巽為號離為光不變則危故孚號有厲其危乃光也告自邑不利即戎虞翻曰陽息動復剛長成夬震為告坤為自邑夬從復升坤逆在上民衆消滅二變時離為戎故不利即戎所尚乃窮也利有攸往虞翻曰陽息隂消君子道長故利有攸往剛長乃終彖曰夬決也剛決柔也虞翻曰乾決坤也健而説決而和虞翻曰健乾説兌也以乾陽獲隂之和故決而和也揚于王庭柔乘五剛也王弼曰剛德浸長一柔為逆衆所同誅而無忌者也故可揚于王庭孚號有厲其危乃光也荀爽曰信其號令於下衆陽危去上六陽乃光眀也干寶曰夬九五則飛龍在天之爻也應天順民以發號令故曰孚號以柔決剛以臣伐君君子危之故曰有厲德大即心小功髙而意下故曰其危乃光也告自邑翟玄曰坤稱邑也干寶曰殷民告周以紂無道不利即戎所尚乃窮也荀爽曰不利即尚兵戎而與陽爭必困窮利有攸往剛長乃終也虞翻曰乾體大成以決小人終乾之剛故乃以終也象曰澤上於天夬陸績曰水氣上天決降成雨故曰夬君子以施祿及下居德則忌虞翻曰君子謂乾乾為施祿下謂剝坤坤為衆臣以乾應坤故施祿及下乾為德艮為居故居德則忌陽極隂生謂陽忌隂初九壯于前趾往不勝為咎虞翻曰夬變大壯大壯震為趾位在前故壯于前剛以應剛不能克之往如失位故往不勝為咎象曰不勝而往咎也虞翻曰往失位應陽故咎矣九二惕號莫夜有戎勿恤虞翻曰惕懼也二失位故惕變成巽故號剝坤為莫夜二動成離離為戎變而得正故有戎四變成坎坎為憂坎又得正故勿恤謂成既濟定也象曰有戎勿恤得中道也虞翻曰動得正應五故得中道九三壯于頄有凶翟玄曰頄面也謂上處乾首之前稱頄頄頰間骨三往壯上故有凶也君子夬夬獨行遇雨荀爽曰九三體乾乾為君子三五同功二爻俱欲決上故曰君子夬夬也獨行謂一爻獨上與隂相應為隂所施故遇雨也若濡有愠無咎荀爽曰雖為隂所濡能愠不説得無咎也象曰君子夬夬終無咎也王弼曰頄面顴也謂上六矣最處體上故曰頄也剝之六三以應陽為善夫剛長則君子道興隂盛則小人道長然則處隂長而助陽則善處剛長而助柔則凶矣而三獨應上助小人是以凶也君子處之必能棄夫情纍決之不疑故曰夬夬也若不與陽為羣而獨行殊志應於小人則受其困焉遇雨若濡有愠而終無所咎也九四臀無膚其行次且虞翻曰二四已變坎為臀剝艮為膚毁滅不見故臀無膚大壯震為行坎為破為曵故其行次且也牽羊悔亡聞言不信虞翻曰兌為羊二變巽為繩剝艮手持繩故牽羊謂四之正得位承五故悔亡震為言坎為耳震坎象不正故聞言不信也象曰其行次且位不當也聞言不信聰不眀也虞翻曰坎耳離目折入於兌故聰不眀矣案兌為羊四五體兌故也凡卦初為足二為腓三為股四為臀當隂柔今反剛陽故曰臀無膚九四震爻震為足足既不正故行次且矣九五莧陸夬夬荀爽曰莧謂五陸謂三兩爻決上故曰夬夬也莧者葉柔而根堅且赤以言隂在上六也陸亦取葉柔根堅也去隂遠故言陸言差堅於莧莧根小陸根大五體兌柔居上莧也三體乾剛在下根深故謂之陸也中行無咎虞翻曰莧説也莧讀夫子莞爾而笑之莧陸和睦也震為笑言五得正位兌為説故莧陸夬夬大壯震為行五在上中動而得正故中行無咎舊讀言莧陸字之誤也馬君茍氏皆從俗言莧陸非也象曰中行無咎中未光也虞翻曰在坎隂中故未光也王弼曰莧草之柔脆者也夬之至易故曰夬夬也夬之為義以剛決柔以君子除小人也而五處尊位最比小人躬自決者也夫以至尊而敵於至賤雖其克勝未足多也處中而行足以免咎而已未為光益也上六無號終有凶虞翻曰應在於三三動時體巽巽為號令四已變坎之應歷險巽象不見故無號位極乘陽故終有凶矣象曰無號之凶終不可長也虞翻曰隂道消滅故不可長也序卦曰決必有遇故受之以姤姤者遇也崔憬曰君子夬夬獨行遇雨故言決必有遇也巽下乾上姤女壯虞翻曰消卦也與復旁通巽長女女壯傷也隂傷陽柔消剛故女壯也勿用取女虞翻曰隂息剝陽以柔變剛故勿用取女不可與長也彖曰姤遇也柔遇剛也勿用取女鄭玄曰姤遇也一隂承五陽一女當五男茍相遇耳非禮之正故謂之姤女壯如是壯健以淫故不可取婦人以婉娩為其德也不可與長也王肅曰女不可取以其不正不可與長久也天地相遇品物咸章也荀爽曰謂乾成於巽而舍於離坤出於離與乾相遇南方夏位萬物章明也九家易曰謂陽起子運行至四月六爻成乾巽位在已故言乾成於巽既成轉舍於離萬物皆盛大坤從離出與乾相遇故言天地遇也剛遇中正天下大行也翟玄曰剛謂九五遇中處正教化大行於天下也姤之時義大矣哉陸績曰天地相遇萬物亦然故其義大也象曰天下有風姤翟玄曰天下有風風無不周布故君以施令告化四方之民矣后以施命誥四方虞翻曰后繼體之君姤隂在下故稱后與泰稱后同義也乾為施巽為命為誥復震二月東方姤五月南方巽八月西方復十一月北方皆總在初故以誥四方也孔子行夏之時經用周家之月夫子傳彖象以下皆用夏家月是故復為十一月姤為五月矣初九繫于金柅貞吉虞翻曰柅謂二也巽為繩故繫柅乾為金巽木入金柅之象也初四失正易位乃吉故貞吉矣有攸往見凶九家易曰絲繫於柅猶女繫於男故以喻初宜繫二也若能專心順二則吉故曰貞吉今既為二所據不可往應四往則有凶故曰有攸往見凶也羸豕孚蹢躅虞翻曰以隂消陽往謂成坤遁子弒父否臣弒君夬時三動離為見故有攸往見凶矣三夬之四在夬動而體坎坎為豕為孚巽繩操之故稱羸也巽為舞為進退操而舞故羸豕孚蹢躅以喻姤女望於五陽如豕蹢躅也宋衷曰羸大索所以繫豕者也巽為股又為進退股而進退則蹢躅也初應於四為二所據不得從應故不安矣體巽為風動搖之貌也象曰繫于金柅柔道牽也虞翻曰隂道柔巽為繩牽於二也九二包有魚無咎不利賔虞翻曰巽為白茅在中稱包詩云白茅包之魚謂初隂巽為魚二雖失位隂陽相承故包有魚無咎賔謂四乾尊稱賓二據四應故不利賓或以包為庖厨也象曰包有魚義不及賓也王弼曰初隂而窮下故稱魚也不正之隂處遇之始不能逆近者也初自樂來應己之厨非為犯應故無咎也擅人之物以為已惠義所不為故不及賔九三臀無膚其行次且厲無大咎虞翻曰夬時動之坎為臀艮為膚二折艮體故臀無膚復震為行其象不正故其行次且三得正位雖則危厲故無大咎矣案巽為股三居上臀也爻非柔無膚行次且也象曰其行次且行未牽也虞翻曰在夬失位故牽羊在姤得正故未牽也九四包無魚起凶王弼曰二有其魚四故失之也無民而動失應而作是以凶矣象曰無魚之凶遠民也崔憬曰雖與初應而失其位二有其魚而賔不及若起於競涉遠必難終不遂心故曰無魚之凶遠民也謂初六矣九五以把包瓜含章虞翻曰把把柳木名也巽為把為包乾圓稱瓜故以把包瓜矣含章謂五也五欲使初四易位以隂含陽已得乘之故曰含章初之四體兌口故稱含也干寶曰初二體巽為草木二又為田田中之果柔而蔓者瓜之象也有隕自天虞翻曰隕落也乾為天謂四隕之初初上承五故有隕自天矣象曰九五含章中正也有隕自天志不舍命也虞翻曰巽為命也欲初之四承已故不舍命矣上九姤其角吝無咎虞翻曰乾為首位在首上故稱角動而得正故無咎象曰姤其角上窮吝也王弼曰進之於極無所復遇遇角而已故曰姤其角也進而無遇獨恨而已不與物牽故曰上窮吝也序卦曰物相遇而後聚故受之以萃萃者聚也崔憬曰天地相遇品物咸章故言物相遇而後聚坤下兌上萃亨王假有廟虞翻曰觀上之四也觀乾為王假至也艮為廟體觀享祀上之四故假有廟致孝享矣利見大人亨利貞虞翻曰大人謂五三四失位利之正變成離離為見故利見大人亨利貞聚以正也用大牲吉利有攸往虞翻曰坤為牛故曰大牲四之三折坤得正故用大牲吉三往之四故利有攸往順天命也鄭玄曰萃聚也坤為順兌為悅臣下以順道承事其君説德居上待之上下相應有事而和通故曰萃亨也假至也互有艮巽巽為木艮為闕木在闕上宮室之象也四本震爻震為長子五本坎爻坎為隱伏居尊而隱伏鬼神之象長子入闕升堂祭祖禰之禮也故曰王假有廟二本離爻也離為目居正應五故利見大人矣大牲牛也言大人有嘉會時可幹事必殺牛而盟既盟則可以往故曰利往案坤為牛巽木下剋坤土殺牛之象也彖曰萃聚也順以説剛中而應故聚也荀爽曰謂五以剛居中羣隂順説而從之故能聚衆也王假有廟陸績曰王五廟上也王者聚百物以祭其先諸侯助祭于廟中假大也言五親奉上矣致孝享也虞翻曰享享祀也五至初有觀象謂享坤牛故致孝享矣利見大人亨聚以正也虞翻曰坤為聚坤三之四故聚以正也利貞九家易曰五以正聚陽故曰利貞用大牲吉利有攸往順天命也虞翻曰坤為順巽為命三往之四故順天命也觀其所聚而天地萬物之情可見矣虞翻曰三四易位成離坎坎月離日日以見天月以見地故天地之情可見也與大壯咸恆同義也象曰澤上於地萃荀爽曰澤者卑下流潦歸之萬物生焉故謂之萃也君子以除戎器戒不虞虞翻曰君子謂五除修戎兵也詩曰修爾車馬弓矢戎兵陽在三四為修坤為器三四之正離為戎兵甲胄飛矢坎為弓弧巽為繩艮為石謂􅰴甲胄鍛厲矛矢故除戎器也坎為寇坤為亂故戒不虞也初六有孚不終乃亂乃萃虞翻曰孚謂五也初四易位五坎中故有孚失正當變坤為終故不終萃聚也坤為亂為聚故乃亂乃萃失位不變則相聚為亂故象曰其志亂也若號一握為笑勿恤往無咎虞翻曰巽為號艮為手初稱一故一握初動成震震為笑四動成坎坎為恤故若號一握為笑勿恤初之四得正故往無咎矣象曰乃亂乃萃其志亂也虞翻曰坎為志初不之四其志亂也六二引吉無咎虞翻曰應巽為繩艮為手故引吉得正應五故無咎利引四之初使避己巳得之五也孚乃利用禴虞翻曰孚謂五禴夏祭也體觀象故利用禴四之三故用大牲離為夏故禴祭詩曰禴祠蒸嘗是其義象曰引吉無咎中未變也虞翻曰二得正故不變也王弼曰居萃之時體柔當位處坤之中已獨履正與衆相殊異操而聚民之多僻獨正者危未能變體以遠於害故必待五引然後乃吉而無咎禴殷春祭名四時之祭省者也居聚之時處於中正而行以忠信可以省薄於鬼神矣六三萃如嗟如無攸利往無咎小吝虞翻曰坤為萃故萃如巽為號故嗟如失正故無攸利動得位故往無咎小吝謂往之四象曰往無咎上巽也虞翻曰動之四故上巽九四大吉無咎象曰大吉無咎位不當也虞翻曰以陽居隂故位不當動而得正承五應初故大吉而無咎矣九五萃有位無咎匪孚元永貞悔亡虞翻曰得位居中故有位無咎匪孚謂四也四變之正則五體皆正故元永貞與比彖同義四動之初故悔亡象曰萃有位志未光也虞翻曰陽在坎中故志未光與屯五同義上六齎咨涕洟無咎虞翻曰齎持資賻也貨財喪稱賻自目曰涕自鼻稱洟坤為財巽為進故齎資也三之四體離坎艮為鼻涕淚流鼻目故涕洟得位應三故無咎上體大過死象故有齎資涕洟之哀象曰齎􅢻涕洟未安上也虞翻曰乘剛遠應故未安上也荀爽曰此本否卦上九陽爻見滅遷移以喻夏桀殷紂以上六隂爻代之若夏之後封東婁公於把殷之後封微子於宋去其骨肉臣服異姓受人封土未安居位故曰齎􅢻涕洟未安上也序卦曰聚而上者謂之升故受之以升也崔憬曰用大牲而致孝享故順天子而升為王矣故言聚而上者謂之升也巽下坤上升鄭玄曰升上也坤地巽木木生地中日長而上猶聖人在諸侯之中眀德日益髙大也故謂之升升進益之象矣元亨虞翻曰臨初之三又有巽象剛中而應故元亨也用見大人勿恤虞翻曰謂二當之五為大人離為見坎為恤二之五得正故用見大人勿恤有慶也南征吉虞翻曰離南方卦二之五成離故南征吉志行也彖曰柔以時升虞翻曰柔謂五坤也升謂二坤邑無君二當升五虛震兑為春秋二升坎離為冬夏四時象正故柔以時升也巽而順剛中而應是以大亨荀爽曰謂二以剛居中而來應五故能大亨上居尊位也用見大人勿恤有慶也荀爽曰大人天子謂升居五見為大人羣隂有主無所復憂而有慶也南征吉志行也虞翻曰二之五坎為志震為行象曰地中生木升荀爽曰地謂坤木謂巽地中生木以微至著升之象也君子以順德積小以髙大虞翻曰君子謂三小謂陽息復時復小為德之本至二成臨臨者大也臨初之三巽為髙二之五艮為順坤為積故順德積小成髙大初六允升大吉荀爽曰謂一體相隨允然俱升初欲與巽一體升居坤上位尊得正故大吉也象曰允升大吉上合志也九家易曰謂初失正乃與二陽允然合志俱升五位上合志也九二孚乃利用禴無咎虞翻曰禴夏祭也孚謂二之五成坎為孚離為夏故乃利用禴無咎矣象曰九二之孚有喜也虞翻曰升五得位故有喜干寶曰剛中而應故孚也又言乃利用禴於春時也非時而祭曰禴然則文王儉以恤民四時之祭皆以禴禮神享德與信不求備也故既濟九五曰東鄰殺牛不如西鄰之禴祭實受其福九五坎坎為豕然則禴祭以豕而已不奢盈於禮故曰有喜矣九三升虛邑荀爽曰坤稱邑也五虛無君利二上居之故曰升虛邑無所疑也象曰升虛邑無所疑也虞翻曰坎為疑上得中故無所疑也六四王用享于岐山吉無咎荀爽曰此本升卦也巽升坤上據三成艮巽為岐艮為山王謂五也通有兩體位正衆服故吉也四能與衆隂退避當升者故無咎也象曰王用享于岐山順事也崔憬曰為順之初在升當位近比於五乘剛於三宜以進德可修守此象太王為狄所逼徙居岐山之下一年成邑二年成都三年五倍其初通而王矣故曰王用享于岐山以其用通避於狄難順於時事故吉無咎六五貞吉升階虞翻曰二之五故貞吉巽為高坤為土震升髙故升階也象曰貞吉升階大得志也荀爽曰隂正居中為陽作階使升居五已下降二與陽相應故吉而得志上六冥升利于不息之貞荀爽曰坤性暗昧今升在上故曰冥升也隂用事為消陽用事為息隂正在上陽道不息隂之所利故曰利于不息之貞象曰冥升在上消不富也荀爽曰隂升失實故消不富也序卦曰升而不已必困故受之以困崔憬曰冥升在上以消不富則窮故言升而不已必困也坎下兌上困亨鄭玄曰坎為月互體離離為日兌為暗昧日所入也今上掩日月之眀猶君子處亂代為小人所不容故謂之困也君子雖困居險能悅是以通而無咎也虞翻曰否二之上乾坤交故通也貞大人吉無咎虞翻曰貞大人吉謂五也在困無應宜靜則無咎故貞大人吉無咎有言不信虞翻曰震為言折入兑故有言不信尚口乃窮彖曰困剛掩也荀爽曰謂二五為隂所掩也險以説荀爽曰此本否卦陽降為險隂升為悅也困而不失其所亨其唯君子乎荀爽曰謂二雖掩隂陷險猶不失中與正隂合故通也喻君子雖陷險中不失中和之行也貞大人吉以剛中也荀爽曰謂五雖掩於隂近無所據遠無所應體剛得中正居五位則吉無咎也有言不信尚口乃窮也虞翻曰兌為口上變口滅故尚口乃窮荀爽曰隂從二升上六成兌為有言失中為不信動而乘陽故曰尚口乃窮也象曰澤無水困王弼曰澤無水則水在澤下也水在澤下困之象也處困而屈其志者小人也君子固窮道可忘乎君子以致命遂志虞翻曰君子謂三伏陽也否坤為致巽為命坎為志三入隂中故致命遂志也初六臀困于株木九家易曰臀謂四株木三也三體為木澤中無水兑金傷木故枯為株也初者四應欲進之四四困於三故曰臀困于株木干寶曰兌為孔穴坎為隱伏隱伏在下而漏孔穴臀之象也入于幽谷三歲不覿九家易曰幽谷二也此本否卦謂陽來入坎與初同體故曰入幽谷三者陽數謂陽陷險中為隂所掩終不得見故曰三歲不覿也象曰入于幽谷幽不眀也荀爽曰為隂所掩故不眀九二困于酒食朱紱方來案二本隂位中饋之職坎為酒食上為宗廟今二隂升上則酒食入廟故困于酒食也上九降二故朱紱方來朱紱宗廟之服乾為大赤朱紱之象也利用亨祀征凶無咎荀爽曰二升在廟五親奉之故利用享祀隂動而上失中乘陽陽下而陷為隂所掩故曰征凶陽降來二雖位不正得中有實隂雖去中上得居正而皆免咎故曰無咎也象曰困于酒食中有慶也翟玄曰陽從上來居中得位富有二隂故中有慶也六三困于石據于蒺藜虞翻曰二變正時三在艮山下故困于石蒺藜木名坎為蒺藜二變艮手據坎故據蒺藜者也入于其宮不見其妻凶虞翻曰巽為入二動艮為宮兌為妻謂上無應也三在隂下離象毁壞隱在坤中死期將至故不見其妻凶也象曰據于蒺藜乘剛也案三居坎上坎為藂棘而木多心蒺藜之象入于其宮不見其妻不祥也九家易曰此本否卦二四同功為艮艮為門闕宮之象也六三居困而位不正上困於民內無仁恩親戚叛逆誅將加身入宮無妻非常之困故曰不祥也九四來徐徐困于金車吝有終虞翻曰來欲之初徐徐舒遲也見險故來徐徐否乾為金坤為車之應厯險故困于金車易位得正故吝有終矣象曰來徐徐志在下也王弼曰下謂初雖不當位有與也崔憬曰位雖不當故吝也有與於援故有終也九五劓刖困于赤紱虞翻曰割鼻曰劓斷足曰刖四動時震為足艮為鼻離為兵兌為刑故劓刖也赤紱謂二否乾為朱故赤坤為紱二未變應五故困于赤紱也乃徐有説虞翻曰兌為説坤為徐二動應已故乃徐有説也利用祭祀崔憬曰劓刖刑之小者也於困之時不崇柔德以剛遇剛雖行其小刑而失其大柄故言劓刖也赤紱天子祭服之飾所以稱困者被奪其政唯得祭祀若春秋傳曰政由寧氏祭則寡人故曰困于赤紱居中以直在困思通初雖暫窮終則必喜故曰乃徐有説所以險而能説窮而能通者在困於赤紱乎故曰利用祭祀也案五應在二二互體離離為文眀赤紱之象也象曰劓刖志未得也陸績曰無據無應故志未得也二言朱紱此言赤紱二言享祀此言祭祀傳互言耳無他義也謂二困五三困四五初困上斯乃迭困之義也乃徐有説以中直也崔憬曰以其居中當位故有悅利用祭祀受福也荀爽曰謂五爻合同據國當位而主祭祀故受福也上六困于葛藟于臲卼虞翻曰巽為草莽稱葛藟謂三也兌為刑人故困于葛藟于臲卼也曰動悔有悔征吉虞翻曰乘陽故動悔變而失正故有悔三已變正已得應之故征吉也象曰困于葛藟未當也虞翻曰謂三未變當位應上故也動悔有悔吉行也虞翻曰行謂三變乃得當位之應故吉行者也周易集解卷九
