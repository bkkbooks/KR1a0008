body:
  text: 周易集解卷十唐李鼎祚撰序卦曰困于上必反下故受之以井崔憬曰困極於劓刖則反下以求安故言困乎上必反下也巽下坎上井鄭玄曰坎水也巽木桔槹也互體離兌離外堅中虛瓶也兌為暗澤泉口也言桔槔引瓶下入泉口汲水而出井之象也井以汲人水無空竭猶人君以政教養天下惠澤無窮也改邑不改井虞翻曰泰初之五也坤為邑乾初之五折坤故改邑初為舊井四應甃之故不改井無喪無得往來井井虞翻曰無喪泰初之五坎象毁壞故無喪五來之初失位無應故無得坎為通故往來井井往謂之五來謂之初也汔至亦未繘井虞翻曰巽繩為繘汔幾也謂二也幾至初改未繘井未有功也羸其瓶凶虞翻曰羸鉤羅也艮為手巽為繘離為瓶手繘折其中故羸其瓶體兑毁缺瓶缺漏故凶矣干寶曰水殷德也木周德也夫井德之地也所以養民性命而清潔之主者也自震化行至於五世改殷紂比屋之亂俗而不易成湯昭假之法度也故曰改邑不改井二代之制各因時宜損益雖異括囊則同故曰無喪無得往來井井也當殷之末井道之窮故曰汔至周德雖興未及革正故曰亦未繘井井泥為穢百姓無聊比者之間交受塗炭故曰羸其瓶凶矣彖曰巽乎水而上水井荀爽曰巽乎水謂隂下謂巽也而上水謂陽上為坎也木入水出井之象也井養而不窮也虞翻曰兌口飲水坎為通往來井井故養不窮也改邑不改井乃以剛中也荀爽曰剛得中故為改邑柔不得中故為不改井也無喪無得荀爽曰隂來居初有實為無喪失中為無得也往來井井荀爽曰此本泰卦陽往居五得坎為井隂來在下亦為井故曰往來井井也汔至亦未繘井荀爽曰汔至者隂來居初下至汔竟也繘者所以出水通井道也今乃在初未得應五故未繘也繘者綆汲之具也未有功也虞翻曰謂二未變應五故未有功也羸其瓶是以凶也荀爽曰井謂二瓶謂初初欲應五今為二所拘羸故凶也孔穎達曰計覆一瓶之水何足言凶但此喻人德行不恆不能善始令終故就人言之凶也象曰木上有水井王弼曰木上有水上水之象也水以養而不窮也君子以勞民勸相虞翻曰君子謂泰乾也坤為民初上成坎為勸故勞民勸相相助也謂以陽助坤矣初六井泥不食舊井無禽干寶曰在井之下體本土爻故曰泥也井而為泥則不可食故曰不食此託紂之穢政不可以養民也舊井謂殷之未喪師也亦皆清潔無水禽之穢又况泥土乎故舊井無禽矣象曰井泥不食下也舊井無禽時舍也虞翻曰食用也初下稱泥巽為木果無噬嗑食象下而多泥故不食也乾為舊位在隂下故舊井無禽時舍也謂時舍於初非其位也與乾二同義崔憬曰處井之下無應於上則是所用之井不汲以其多塗久廢之井不獲以其時舍故曰井泥不食舊井無禽禽古擒字禽猶獲也九二井谷射鮒甕敝漏虞翻曰巽為谷為鮒鮒小鮮也離為甕甕瓶毁缺羸其瓶凶故甕敝漏也象曰井谷射鮒無與也崔憬曰唯得於鮒無與於人也井之為道上汲者也今與五非應與初比則是若谷水不注唯及於魚故曰井谷射鮒也甕敝漏者取其水下注不汲之義也案魚隂蟲也初處井下體又隂爻魚之象也九三井泄不食為我心惻荀爽曰泄去穢濁清潔之意也三者得正故曰井泄不得據隂喻不得用故曰不食道既不行故我心惻可用汲王眀並受其福荀爽曰謂五可用汲三則王道眀而天下並受其福象曰井泄不食行惻也求王眀受福也干寶曰此託殷之公侯時有賢者獨守成湯之法度而不見任謂微箕之倫也故曰井泄不食為我心惻惻傷悼也民乃外附故曰可用汲周德來被故曰王眀王得其民民得其主故曰求王眀受福也六四井甃無咎荀爽曰坎性下降嫌於從三能自修正以甃輔五故無咎也象曰井甃無咎修井也虞翻曰修治也以瓦甓壘井稱甃坤為土初之五成離離火燒土為瓦治象故曰井甃無咎修井也九五井冽寒泉食虞翻曰泉自下出稱井周七月夏之五月隂氣在下二已變坎十一月為寒泉初二已變體噬嗑食故冽寒泉食矣象曰寒泉之食中正也崔憬曰冽清潔也居中得正而比於上則是井泄水清既寒且潔汲上可食於人者也上六井收勿幕有孚元吉虞翻曰幕蓋也收謂以轆轤收繘也坎為車應巽繩為繘故井收勿幕有孚謂五坎坎為孚故元吉也象曰元吉在上大成也虞翻曰謂初二已變成既濟定故大成也干寶曰處井上位在瓶之水也故曰井收幕覆也井以養生政以養德無覆水泉而不惠民無蘊典禮而不興教故曰井收勿幕勿幕則教信於民民服教則大化成也序卦曰井道不可不革也故受之以革韓康伯曰井久則濁穢宜革易其故也離下兑上革鄭玄曰革改也水火相息而更用事猶王者受命改正朔易服色故謂之革也已日乃孚元亨利貞悔亡虞翻曰遁上之初與蒙旁通悔亡謂四也四失正動得位故悔亡離為日孚謂坎四動體離五在坎中故已日乃孚以成既濟乾道變化各正性命保合太和乃利貞故元亨利貞悔亡矣與乾彖同義也彖曰革水火相息虞翻曰息長也離為火兊為水繫曰潤之以風雨風巽雨兌也四革之正坎見故獨於此稱水也二女同居其志不相得曰革虞翻曰二女離兌體同人象蒙艮為居故二女同居四變體兩坎象二女有志離火志上兌水志下故其志不相得坎為志也已日乃孚革而信之干寶曰天命已至之日也乃孚大信著也武王陳兵孟津之上諸侯不期而會者八百國皆曰紂可伐矣武王曰爾未知天命未可也還歸二年紂殺比干囚箕子爾乃伐之所謂已日乃孚革而信也文眀以説大亨以正革而當其悔乃亡虞翻曰文眀謂離説兌也大亨謂乾四動成既濟定故大亨以正革而當位故悔乃亡也天地革而四時成虞翻曰謂五位成乾為天蒙坤為地震春兑秋四之正坎冬離夏則四時具坤革而成乾故天地革而四時成也湯武革命順乎天而應乎人虞翻曰湯武謂乾乾為聖人天謂五人謂三四動順五應三故順天應人巽為命也革之時大矣哉虞翻曰革天地成四時誅二叔除民害天下定武功成故大矣哉也象曰澤中有火革崔憬曰火就燥澤資溼二物不相得終宜易之故曰澤中有火革也君子以治厯眀時虞翻曰君子遁乾也厯象謂日月星辰也離為眀坎為月離為日蒙艮為星四動成坎離日月得正天地革而四時成故君子以治厯眀時也初九鞏用黃牛之革干寶曰鞏固也離為牝牛離爻本坤黃牛之象也在革之初而無應據未可以動故曰鞏用黃牛之革此喻文王雖有聖德天下歸周三分有二而服事殷其義也象曰鞏用黃牛不可以有為也虞翻曰得位無應動而必凶故不可以有為也六二已日乃革之征吉無咎荀爽曰日以喻君也謂五已居位為君二乃革意去三應五故曰已日乃革之上行應五去卑事尊故曰征吉無咎也象曰已日革之行有嘉也崔憬曰得位以正居中有應則是湯武行善桀紂行惡各終其日然後革之故曰已日乃革之行此有嘉虞翻曰嘉謂五乾為嘉四動承五故行有嘉矣九三征凶貞厲荀爽曰三應於上欲往應之為隂所乘故曰征凶若正居三而據二隂則五來危之故曰貞厲也革言三就有孚翟玄曰言三就上二陽乾得共有信據於二隂故曰革言三就有孚於二矣象曰革言三就又何之矣崔憬曰雖得位以正而未可頓革故以言就之夫安者有其危也故受命之君雖誅元惡未改其命者以即行改命習俗不安故曰征凶猶以正自危故曰貞厲是以武王克紂不即行周命乃反商政一就也釋箕子囚封比干墓式商容閭二就也散鹿臺之財發巨橋之粟大賚于四海三就也故曰革言三就虞翻曰四動成既濟定故又何之矣九四悔亡有孚改命吉虞翻曰革而當其悔乃亡孚謂五也巽為命四動五坎改巽故改命吉四乾為君進退無恆在離焚棄體大過死傳以比桀紂湯武革命順天應人故改命吉也象曰改命之吉信志也虞翻曰四動成坎故信志也干寶曰爻入上象喻紂之郊也以逆取而四海順之動凶器而前歌後舞故曰悔亡也中流而白魚入舟天命信矣故曰有孚甲子夜陳雨甚至水德賔服之祥也故曰改命之吉信志也九五大人虎變未占有孚虞翻曰乾為大人謂五也蒙坤為虎變傳論湯武以坤臣為君占視也離為占四未之正五未在坎故未占有孚也馬融曰大人虎變虎變威德折衝萬里望風而信以喻舜舞干羽而有苖自服周公修文德越裳獻雉故曰未占有孚矣象曰大人虎變其文炳也宋衷曰陽稱大五以陽居中故曰大人兌為白虎九者變爻故曰大人虎變其文炳也虞翻曰乾為大眀動成離故其文炳也上六君子豹變虞翻曰蒙艮為君子為豹從乾而更故君子豹變也小人革面征凶居貞吉虞翻曰隂稱小人也面謂四革為離以順承五故小人革面乘陽失正故征凶得位故居貞吉蒙艮為居也象曰君子豹變其文蔚也陸績曰兊之陽爻稱虎隂爻稱豹豹虎類而小者也君子小於大人故曰豹變其文蔚也虞翻曰蔚蔇也兊小故其文蔚也小人革面順以從君也虞翻曰乾君謂五也四變順五故順以從君也干寶曰君子大賢次聖之人謂若大公周召之徒也豹虎之屬蔚炳之次也君聖臣賢殷之頑民皆改志從化故曰小人革面天下既定必倒載干戈包之以虎皮將卒之士使為諸侯故曰征凶居貞吉得正有應君子之象也案兌為口乾為首今口在首上面之象也乾為大人虎變也兌為小人革面也序卦曰革物者莫若鼎故受之以鼎韓康伯曰革去故鼎取新以去故則宜制器立法以治新也鼎所和齊生物成新之器也故取象焉巽下離上鼎鄭玄曰鼎象也卦有木火之用互體乾兌乾為金兌為澤澤鍾金而含水爨以木火鼎亨孰物之象鼎亨孰以養人猶聖君興仁義之道以教天下也故謂之鼎矣元吉亨虞翻曰大壯上之初與屯旁通天地交柔進上行得中應乾五剛故元吉亨也彖曰鼎象也以木巽火亨飪也荀爽曰震入離下中有乾象木火在外金在其內鼎鑊烹飪之象也虞翻曰六十四卦皆觀繫辭而獨於鼎言象何也象事知器故獨言象也九家易曰鼎言象者卦也木火互有乾兌乾金兌澤澤者水也爨以木火是鼎鑊烹飪之象亦象三公之位上則調和隂陽下而撫育百姓鼎能熟物養人故云象也牛鼎受一斛天子飾以黃金諸侯白金三足以象三台足上皆作鼻目為飾也羊鼎五斗天子飾以黃金諸侯白金大夫以銅豕鼎三斗天子飾以黃金諸侯白金大夫銅士鐵三鼎形同烹飪煮肉上離隂爻為肉也聖人亨以享上帝而大亨以養聖賢虞翻曰聖人謂乾初四易位體大畜震為帝在乾天上故曰上帝體頤象三動噬嗑食故以享上帝也大亨謂天地養萬物聖人養賢以及萬民賢之能者稱聖人矣巽而耳目聰眀虞翻曰謂三也三在巽上動成坎離有兩坎兩離象乃稱聰眀日月相推而眀生焉故巽而耳目聰眀眇能視不足以有眀聞言不信聰不眀皆有一離一坎象故也柔進而上行得中而應乎剛是以元亨虞翻曰柔謂五得上中應乾五剛巽為進震為行非謂應二剛與睽五同義也象曰木上有火鼎荀爽曰木火相因金在其間調和五味所以養人鼎之象也君子以正位凝命虞翻曰君子謂三也鼎五爻失正獨三得位故以正位凝成也體姤謂隂始凝初巽為命故君子以正位凝命也初六鼎顚趾虞翻曰趾足也應在四大壯震為足折入大過大過顚也故鼎顚趾也利出否得妾以其子無咎虞翻曰初隂在下故否利出之四故曰利出兑為妾四變得正成震震為長子繼世守宗廟而為祭主故得妾以其子無咎矣象曰鼎顚趾未悖也荀爽曰以隂乘陽故未悖也利出否以從貴也虞翻曰出初之四承乾五故以從貴也九二鼎有實我仇有疾不我能即吉虞翻曰二為實故鼎有實也坤為我謂四也二據四婦故相與為仇謂三變時四體坎坎為疾故我仇有疾四之二歷險二動得正故不我能即吉象曰鼎有實愼所之也虞翻曰二變之正艮為慎我仇有疾終無尤也虞翻曰不我能即吉故終無尤也九三鼎耳革其行塞雉膏不食虞翻曰動成兩坎坎為耳而革在乾故鼎耳革初四變時震為行鼎以耳行伏坎震折而入乾故其行塞離為雉坎為膏初四已變三動體頤頤中無物離象不見故雉膏不食方雨虧悔終吉虞翻曰謂四已變三動成坤坤為方坎為雨故曰方雨三動虧乾而失位悔也終復之正故方雨虧悔終吉也象曰鼎耳革失其義也虞翻曰鼎以耳行耳革行塞故失其義也九四鼎折足覆公餗其形渥凶虞翻曰謂四變時震為足足折入兊故鼎折足兌為形渥大形也鼎足折則公餗覆言不勝任象入大過死凶故鼎足折覆公餗其形渥凶九家易曰鼎者三足一體猶三公承天子也三公謂調隂陽鼎謂調五味足折餗覆猶三公不勝其任傾敗天子之美故曰覆餗也案餗者雉膏之屬公者四為諸侯上公之位故曰公餗象曰覆公餗信如何也九家易曰渥者厚大言罪重也既覆公餗信有大罪刑罰當加無可如何也六五鼎黃耳金鉉利貞虞翻曰離為黃三變坎為耳故鼎黃耳鉉謂三貫鼎兩耳乾為金故金鉉動而得正故利貞干寶曰凡舉鼎者鉉也尚三公者王也金喻可貴中之美也故曰金鉉鉉鼎得其物施令得其道故曰利貞也象曰鼎黃耳中以為實也陸績曰得中承陽故曰中以為實宋衷曰五當耳中色黃故曰鼎黃耳兌為金又正秋故曰金鉉公侯謂五也上尊故玉下卑故金金和良可柔屈喻諸侯順天子上九鼎玉鉉大吉無不利虞翻曰鉉謂三乾為玉鉉體大有上九自天祐之位貴據五三動承上故大吉無不利謂三虧悔應上成未濟雖不當位六位相應故剛柔節彖曰巽耳目聰眀為此九三發也干寶曰玉又貴於金者凡烹飪之事自鑊升於鼎載於俎自俎入於口馨香上達動而彌貴故鼎之義上爻愈吉也鼎主烹飪不失其和金玉鉉之不失其所公卿仁賢天王聖眀之象也君臣相臨剛柔得節故曰吉無不利也象曰玉鉉在上剛柔節也宋衷曰以金承玉君臣之節上體乾為玉故曰玉鉉雖非其位隂陽相承剛柔之節也序卦曰主器者莫若長子故受之以震震者動也崔憬曰鼎所以烹飪享於上帝主此器者莫若冡嫡以為其祭主也故言主器者莫若長子也震下震上震亨鄭玄曰震為雷雷動物之氣也雷之發聲猶人君出政教以動中國之人也故謂之震人君有善聲教則嘉會之禮通矣震來虩虩虞翻曰臨二之四天地交故通虩虩謂四也來應初命四變而來應已四失位多懼故虩虩之內曰來也笑言啞啞虞翻曰啞啞笑且言謂初也得正有則故笑言啞啞後有則也震驚百里不喪七鬯虞翻曰謂陽從臨二隂為百二十舉其大數故當震百里也坎為棘七上震為鬯坤為喪二上之坤成震體坎得其匕鬯故不喪七鬯也鄭玄曰雷發聲聞于百里古者諸侯之象諸侯出教令能警戒其國內則守其宗廟社稷為之祭主不亡七與鬯也人君於祭之禮匕牲體薦鬯而已其餘不親也升牢於俎君七之臣載之鬯秬酒芬芳修鬯因名焉彖曰震亨震來虩虩恐致福也虞翻曰懼變承五應初故恐致福也笑言啞啞後有則也虞翻曰則法也坎為則也震驚百里驚遠而懼邇也虞翻曰遠謂四近謂初震為百謂四出驚遠初應懼近也出可以守宗廟社稷以為祭主也虞翻曰為五出之正震為守艮為宗廟社稷長子主祭器故以為祭主也干寶曰周木德震之正象也為殷諸侯殷諸侯之制其地百里是以文王小心翼翼昭事上帝聿懷多福厥德不回以受方國故以百里而臣諸侯也為諸侯故主社稷為長子而為祭主也祭禮薦陳甚多而經獨言不喪匕鬯者匕牲體薦鬯酒人君所自親也象曰洊雷震君子以恐懼修省虞翻曰君子謂臨二二出之坤四體以修身坤為身二之四以陽照坤故以恐懼修省老子曰修之身德乃真也初九震來虩虩後笑言啞啞吉虞翻曰虩虩謂四也初位在下故言後笑啞啞得位吉故也干寶曰得震之正首震之象者震來虩虩羑里之厄也笑言啞啞後受方國也象曰震來虩虩恐致福也虞翻曰陽稱福笑言啞啞後有則也虞翻曰得正故有則也六二震來厲億喪貝躋于九陵勿逐七日得虞翻曰厲危也乘剛故厲億惜辭也坤為喪三動離為螺蚌故稱貝在艮山下故稱陵震為足足乘初九故躋于九陵震為逐謂四已體復象故喪且勿逐三動時離為日震數七故七日得者也象曰震來厲乘剛也干寶曰六二木爻震之身也得位無應而以乘剛為危此託文王積德纍功以被囚為禍也故曰震來厲億歎辭也貝寶貨也産乎東方行乎大塗也此以喻紂拘文王閎夭之徒乃於江淮之浦求盈箱之貝而以賂紂也故曰億喪貝貝水物而方升于九陵今雖喪之猶外府也故曰勿逐七日得七日得者七年之日也故書曰誕保文武受命惟七年是也六三震蘇蘇震行無眚象曰震蘇蘇位不當也虞翻曰死而復生稱蘇三死坤中動出得正震為生故蘇蘇坎為眚三出得正坎象不見故無眚春秋傳曰晉獲秦諜六日而蘇也九四震遂泥虞翻曰坤土得雨為泥位在坎中故遂泥也象曰震遂泥未光也虞翻曰在坎隂中與屯五同義故未光也六五震往來厲虞翻曰往謂乘陽來謂應隂失位乘剛故往來厲也億無喪有事虞翻曰坤為喪也事謂祭祀之事出而體隨王享于西山則可以守宗廟社稷為祭主故無喪有事也象曰震往來厲危行也虞翻曰乘剛山頂故危行也其事在中大無喪也虞翻曰動出得正故無喪上六震索索視矍矍虞翻曰上謂四也欲之三隔坎故震索索三已動應在離故矍矍者也征凶震不于其躬于其鄰無咎婚媾有言虞翻曰上得位震為征故征凶四變時坤為躬鄰謂五也四上之五震東兊西故稱鄰之五得正故不於其躬於其鄰無咎謂三已變上應三震為言故婚媾有言象曰震索索中未得也虞翻曰四未之五故中未得也雖凶無咎畏鄰戒也虞翻曰謂五正位已乘之逆畏鄰戒也序卦曰物不可以終動動必止之故受之以艮艮者止也崔憬曰震極則征凶婚媾有言當須止之故言物不可以終動止之矣艮下艮上艮其背鄭玄曰艮為山山立峙各於其所無相順之時猶君在上臣在下恩敬不相與通故謂之艮也不獲其身行其庭不見其人無咎虞翻曰觀五之三也艮為多節故稱背觀坤為身觀五之三折坤為背故艮其背坤象不見故不獲其身震為行人艮為庭坎為隱伏故行其庭不見其人三得正故無咎案艮為門闕今純艮重其門闕兩門之間庭中之象也彖曰艮止也虞翻曰位窮於上故止也時止則止時行則行虞翻曰時止謂上陽窮止故止時行謂三體處震為行也動靜不失其時其道光眀虞翻曰動謂三靜謂上艮止則止震行則行故不失時五動成離故其道光眀艮其止止其所也虞翻曰謂兩象各止其所上下敵應不相與也虞翻曰艮其背背也兩象相背故不相與也是以不獲其身行其庭不見其人無咎也案其義已見繇辭也象曰兼山艮君子以思不出其位虞翻曰君子謂三也三君子位震為出坎為隱伏為思故以思不出其位也初六艮其趾無咎利永貞虞翻曰震為趾故艮其趾矣失位變得正故無咎永貞也象曰艮其趾未失正也虞翻曰動而得正故未失正也六二艮其腓不拯其隨其心不快虞翻曰巽長為股艮小為腓拯取也隨謂下二隂艮為止震為動故不拯其隨坎為心故其心不快象曰不拯其隨未退聽也虞翻曰坎為耳故未退聽也九三艮其限裂其夤厲閽心虞翻曰限腰帶處也坎為腰五來之三故艮其限夤脊肉艮為背坎為脊艮為手震起艮止故裂其夤坎為心厲危也艮為閽閽守門人坎盜動門故厲閽心古閽作熏字馬因言熏灼其心未聞易道以坎水熏灼人也荀氏以熏為勳或誤作動皆非也象曰艮其限危閽心也虞翻曰坎為心坎盜動門故危閽心也六四艮其身無咎虞翻曰身腹也觀坤為身故艮其身得位承五故無咎或謂妊身也五動則四體離婦離為大腹孕之象也故艮其身得正承五而受陽施故無咎詩曰大任有身生此文王也象曰艮其身止諸躬也虞翻曰艮為止五動乘四則任身故止諸躬也六五艮其輔言有孚悔亡虞翻曰輔面頰骨上頰車者也三至上體頤象艮為止在坎車上故艮其輔謂輔車相依震為言五失位悔也動得正故言有孚悔亡也象曰艮其輔以中正也虞翻曰五動之中故以正中也上九敦艮吉虞翻曰無應靜止下據二隂故敦艮吉也象曰敦艮之吉以厚終也虞翻曰坤為厚陽上據坤故以厚終也周易集解卷十
