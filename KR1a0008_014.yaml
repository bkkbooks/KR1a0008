body:
  text: 周易集解卷十四唐李鼎祚撰大衍之數五十其用四十有九干寶曰衍合也崔憬曰案說卦云昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數既言蓍數則是說大衍之數也明倚數之法當參天兩地參天者謂從三始順數而至五七九不取於一也兩地者謂從二起逆數而至十八六不取於四也此因天地致上以配八卦而取其數也艮為少陽其數三坎為中陽其數五震為長陽其數七乾為老陽其數九兑為少隂其數二離為中隂其數十巽為長隂其數八坤為老隂其數六八卦之數總有五十故云大衍之數五十也不取天數一地數四者此數八卦之外大衍所不管也其用四十有九者法長陽七七之數也六十四卦既法長隂八八之數故四十九蓍則法長陽七七之數焉蓍圓而神象天卦方而智象地隂陽之别也捨一不用者以象太極虛而不用也且天地各得其數以守其位故太一亦為一數而守其位也王輔嗣云演天地之數所賴者五十其用四十有九其一不用也不用而用以之通非數而數以之成即易之太極也四十有九數之極者但言所賴五十不釋其所從來則是億度而言非有實據其一不用將為法象太極理縱可通以為非數而成義則未允何則不可以有對無五稱五十也孔疏釋賴五十以為萬物之策凡有萬一千五百二十其用此策大推演天地之數唯用五十策也又釋其用四十九則有其一不用以為策申其所揲蓍者唯四十有九其一不用以其虛無非所用也故不數矣又引顧歡同王弼所說而顧歡云立此五十數以數神神雖非數而著故虛其一數以明不可言之義也案崔氏探𤣥病諸先達及乎自料未免小疵既將八卦隂陽以配五十之數餘其天一地四無所禀承而云八卦之外在衍之所不管者斯乃談何容易哉且聖人之言連環可解約文申義須窮指歸即此章云天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神是結大衍之前義也既云五位相得而各有合即將五合之數配屬五行也故云大衍之數五十也其用四十有九者更減一以并五備設六爻之位蓍卦兩兼終極天地五十五之數也自然窮理盡性神妙無方藏往知來以前民用斯之謂矣分而為二以象兩崔憬曰四十九數合而未分是象太極也今分而為二以象兩儀矣掛一以象三孔頴達曰就兩儀之中分掛其一於最小指間而配兩儀以象三才揲之以四以象四時崔憬曰分揲其蓍皆以四為數一策一時故四策以象四時也歸竒於扐以象閏虞翻曰竒所掛一策扐所揲之餘不一則二不三則四也取竒以歸扐扐并合掛左手之小指為一扐則以閏月定四時成嵗故歸竒於扐以象閏者也五嵗再閏故再扐而後掛虞翻曰謂巳一扐復分掛如初揲之歸竒於初扐并掛左手次小指間為再扐則再閏也又分扐揲之如初而掛左手第三指間成一變則布掛之一爻謂巳二扐又加一為三并重合前二扐為五嵗故五嵗再閏再扐而後掛此參伍以變據此為三扐不言三閏者閏嵗餘十日五嵗閏六十日盡矣後扐閏餘分不得言三扐二閏故從言再扐而後掛者也天數五地數五虞翻曰天數五謂一三五七九地數五謂二四六八十也五位相得而各有合虞翻曰五位謂五行之位甲乾乙坤相得合木謂天地定位也丙艮丁兑相得合火山澤通氣也戊坎已離相得合土水火相逮也庚震辛巽相得合金雷風相薄也天壬地癸相得合水言隂陽相薄而戰於乾故五位相得而各有合或以一六合水二七合木三八合火四九合金五十合土也天數二十有五虞翻曰一三五七九故二十五也地數三十虞翻曰二四六八十故三十也凡天地之數五十有五虞翻曰天二十五地三十故五十有五天地數見於此故大衍之數略其竒五而言五十也此所以成變化而行鬼神也荀爽曰在天為變在地為化在地為鬼在天為神姚信曰此天地之數五十有五分為爻者故能成就乾坤之變化能知鬼神之所為也侯果曰夫通變化行鬼神莫近於數故老𣆀謂子曰汝何求道對曰吾求諸數明數之妙通於鬼神矣乾之策二百一十有六荀爽曰陽爻之策三十有六乾六爻皆陽三六一百八十六六三十六合二百一十有六也陽爻九合四時四九三十六是其義也坤之策百四十有四荀爽曰隂爻之策二十有四坤六爻皆隂二六一百二十四六二十四合一百四十有四也隂爻六合二十四氣四六二百四十也凡三百有六十當期之日陸績曰日月十二交會積三百五十四日有竒為一會今云三百六十當期則入十三月六日也十三月為一期故云當期之日也二篇之策萬有一千五百二十當萬物之數也侯果曰二篇謂上下經也共六十四卦合三百八十四爻隂陽各半則陽爻一百九十二每爻三十六策合六千九百一十二策隂爻亦一百九十二每爻二十四策合四千六百八策則二篇之策合萬一千五百二十當萬物之數也是故四營而成易荀爽曰營者謂七八九六也陸績曰分而為二以象兩一營也掛一以象三二營也揲之以四以象四時三營也歸竒於扐以象閏四營也謂四度營為方成易之一爻者也十有八變而成卦荀爽曰二揲策掛左手一指間三指間滿而成一爻又六爻三六十八故十有八變而成卦也八卦而小成侯果曰謂三畫成天地雷風日月山澤之象此八卦未盡萬物情理故曰小成也引而伸之觸類而長之虞翻曰引謂庖犧引信三才兼而兩之以六畫觸動也謂六畫以成六十四卦故引而信之觸類而長之其取類也大則發揮剛柔而生爻也天下之能事畢矣虞翻曰謂乾以簡能能說諸心能研諸侯之慮故能事畢顯道神德行虞翻曰顯道神德行乾二五之坤成離日坎月日月在天運行照物故顯道神德行默而成之不言而信存於德行者也是故可與酬酢可與祐神矣九家易曰陽往為酬隂來為酢隂陽相配謂之祐神也孔子言大衍以下至于能事畢矣此足以顯明易道又神易德行可與經義相斟酌也故喻以賓主酬酢之禮所以助前聖發見其神祕矣禮飲酒主人酌賓為獻賓酌主人為酢主人飲之又酌賓為酬也先舉為酢答報為酬酬取其報以象陽唱隂和變化相配是助天地明其鬼神者也子曰知變化之道者其知神之所為乎虞翻曰在陽稱變乾五之坤在隂稱化坤二之乾隂陽不測之謂神知變化之道者故知神之所為諸儒皆上子曰為章首而荀馬又從之甚非者矣易有聖人之道四焉崔憬曰聖人德合天地智周萬物故能用此易道大略有四謂尚辭尚變尚象尚占也以言者尚其辭虞翻曰聖人之情見於辭繫辭焉以盡辭也以動者尚其變陸績曰變謂爻之變化當議之而後動矣以制器者尚其象荀爽曰結繩為網罟蓋取諸離此類是也以卜筮者尚其占虞翻曰乾為蓍蓍稱筮離為龜龜稱卜動則玩其占故尚其占者也是故君子將有為也將有行也問焉而以言虞翻曰有為謂建侯有行謂行師也乾二五之坤成震有師象震為行為言問故有為有行凡應九筮之法則筮之謂問於蓍龜以言其吉凶爻象動內吉凶見外蓍德圓神卦德方智故史擬神智以斷吉凶也其受命也如響虞翻曰言神不疾而速不行而至不言善應乾二五之坤成震巽巽為命震為響故受命同聲相應故如響也無有逺近幽深遂知來物虞翻曰逺謂天近謂地隂謂幽深謂陽來物謂乾坤神以知來感而遂通謂幽贊神明而生蓍也非天下之至精其孰能與于此至精謂乾純粹精也參伍以變錯綜其數虞翻曰逆上稱錯綜理也謂五嵗再閏再扐而後掛以成一爻之變而倚六畫之數卦從下升故錯綜其數則三天兩地而倚數者也通其變遂成天地之文虞翻曰變而通之觀變隂陽始立卦乾坤相親故成天地之文物相雜故曰文極其數遂定天下之象虞翻曰數六畫之數六爻之動三極之道故定天下吉凶之象也非天下之至變其孰能與於此虞翻曰謂參伍以變故能成六爻之義六爻之義易以貢也易無思也無為也虞翻曰天下何思何慮同歸而殊塗一致而百慮故無所為謂其靜也専寂然不動虞翻曰謂隱藏坤初機息矣専故不動者也感而遂通天下之故虞翻曰感動也以陽變隂通天下之故謂發揮剛柔而生爻者也非天下之至神其孰能與於此虞翻曰至神謂易隱初入微知幾其神乎韓康伯曰非忘象者則無以制象非遺數者則無以極數至精者無籌策而不可亂至變者體一而無不周至神者寂然而無不應斯蓋功用之母象數所由立故曰非至精至變至神則不能與於此也夫易聖人之所以極深而研幾也荀爽曰謂伏羲畫卦窮極易幽深文王繫辭研盡易幾微者也唯深也故能通天下之志虞翻曰深謂幽贊神明無有逺近幽深遂知來物故通天下之志謂蓍也唯幾也故能成天下之務虞翻曰務事也謂易研幾開物故成天下之務謂卦者也唯神也故不疾而速不行而至虞翻曰神謂易也謂日月斗在天日行一度月行十三度從天西轉故不疾而速星寂然不動隨天右周感而遂通故不行而至者也子曰易有聖人之道四焉者此之謂也侯果曰言易唯深唯神藴此四道因聖人以章故曰聖人之道矣天一水甲地二火乙天三木丙地四金丁天五土戊地六水巳天七火庚地八木辛天九金壬地十土癸此則大衍之數五十有五蓍龜所從生聖人以通神明之德以類萬物之情此上虞翻義也子曰夫易何為而作也虞翻曰夫易何為取天地之數也夫易開物成務陸績曰開物謂庖犧引伸八卦重以為六十四觸長爻策至於萬一千五百二十以當萬物之數故曰開物聖人觀象而制網罟耒耜之屬以成天下之務故曰成務也冒天下之道如斯而已者也虞翻曰以陽闢坤謂之開物以隂翕乾謂之成務冒觸也觸類而長之如此也是故聖人以通天下之志九家易曰凡言是故者承上之辭也謂以動者尚其變變而通之以通天下之志也以定天下之業九家易曰謂以制器者尚其象也凡事業之未立以易道決之故言以定天下之業以斷天下之疑九家易曰謂卜筮者尚其占也占事知來故定天下之疑是故蓍之德圓而神卦之德方以智崔憬曰蓍之數七七四十九象陽圓其為用也變通不定因之以知來物是蓍之德圓而神也卦之數八八六十四象隂方其為用也爻位有分因之以藏往知事是卦之德方以知也六爻之義易以貢韓康伯曰貢告也六爻之變易以告吉凶也聖人以此洗心韓康伯曰洗濯萬物之心者也退藏於密陸績曰受蓍龜之報應決而藏之於心也吉凶與民同患虞翻曰聖人謂庖犧以蓍神知來故以洗心陽動入巽巽為退伏坤為閉户故藏密謂齊於巽以神明其德陽吉隂凶坤為民故吉凶與民同患謂作易者其有憂患也神以知來知以藏往虞翻曰乾神知來坤知藏往來謂出見往謂藏密也其孰能與於此哉虞翻曰誰乎能為此哉謂古之聰明睿知之君也古之聰明睿知神武而不殺者夫虞翻曰謂大人也庖犧在乾五動而之坤與天地合聰明在坎則聰在離則明神武謂乾睿知謂坤乾坤坎離反復不衰故而不殺者夫是以明於天之道而察於民之故虞翻曰乾五之坤以離日照天故明天之道以坎月照坤故察民之故坤為民是興神物以前民用陸績曰神物蓍也聖人興蓍以别吉凶先民而用之民皆從焉故曰以前民用也聖人以此齊戒韓康伯曰洗心曰齊防患曰戒以神明其德夫陸績曰聖人以蓍能逆知吉凶除害就利清潔其身故曰以此齊戒也吉而後行舉不違失其德富盛見稱神明故曰神明其德也是故闔户謂之坤虞翻曰闔閉翕也謂從巽之坤坤柔象夜故以閉户者也闢户謂之乾虞翻曰闢開也謂從震之乾乾剛象晝故以開户也一闔一闢謂之變虞翻曰陽變闔隂隂變闢陽剛柔相推而生變化也往來不窮謂之通荀爽曰謂一冬一夏隂陽相變易也十二消息隂陽往來無窮已故通也見乃謂之象形乃謂之器荀爽曰謂日月星辰光見在天而成象也萬物生長在地成形可以為器用者也制而用之謂之法荀爽曰謂觀象於天觀形於地制而用之可以為法利用出入民咸用之謂之神陸績曰聖人制器以周民用用之不遺故曰利用出入也民皆用之而不知所由來故謂之神也是故易有太極是生兩儀干寶曰發初言是故總衆篇之義也虞翻曰太極太一也分為天地故生兩儀也兩儀生四象虞翻曰四象四時也兩儀謂乾坤也乾二五之坤成坎離震兑震春兑秋坎冬離夏故兩儀生四象歸妹卦備故彖獨稱天地之大義也四象生八卦虞翻曰乾二五之坤則生震坎艮坤二五之乾則生巽離兑故四象生八卦乾坤生春艮兑生夏震巽生秋坎離生冬者也八卦定吉凶虞翻曰陽生則吉隂生則凶謂方以類聚物以羣分吉凶生矣已言於上故不言生而獨言定吉凶也吉凶生大業荀爽曰一消一息萬物豐殖富有之謂大業是故法象莫大乎天地翟𤣥曰見象立法莫過天地也變通莫大乎四時荀爽曰四時相變終而復始也懸象著明莫大乎日月虞翻曰謂日月懸天成八卦象三日暮震象出庚八日兑象見丁十五日乾象盈甲十七日旦巽象退辛二十三日艮象消丙三十日坤象滅乙晦夕朔旦坎象流戊日中則離離象就已戊巳土位象見於中日月相推而明生焉故懸象著明莫大乎日月者也崇髙莫大乎富貴虞翻曰謂乾正位於五五貴坤富以乾通坤故髙大富貴也備物致用立成器以為天下利莫大乎聖人虞翻曰神農黃帝堯舜也民多否閉取乾之坤謂之備物以坤之乾謂之致用乾為物坤為器用否四之初耕稼之利否五之初市井之利否四之二舟楫之利否上之初牛馬之利謂十三蓋取以利天下通其變使民不倦神而化之使民宜之聖人作而萬物覩故莫乎聖人者也探賾索隱鈎深致逺以定天下之吉凶成天下之亹亹者莫大乎蓍龜虞翻曰探取賾初也初隱未見故探賾索隱則幽贊神明而生蓍初深故曰鈎深致逺謂乾乾為蓍乾五之坤大有離為龜乾生知吉坤殺知凶故定天下之吉凶莫大於蓍龜也侯果曰亹勉也夫幽隱深逺之情吉凶未兆之事物皆勉勉然願知之然不能也及蓍成卦龜成兆也雖神道之幽密未然之吉凶坐可觀也是蓍龜成天下勉勉之聖也是故天生神物聖人則之孔頴達曰謂生蓍龜聖人法則之以為卜筮者也天地變化聖人效之陸績曰天有晝夜四時變化之道聖人設三百八十四爻以效之矣天垂象見吉凶聖人象之荀爽曰謂在璇璣玉衡以齊七政也宋衷曰天垂隂陽之象以見吉凶謂日月薄蝕五星亂行聖人象之亦著九六爻位得失示人所以有吉凶之占也河出圖洛出書聖人則之鄭𤣥曰春秋緯云河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書成河圖有九篇洛書有六篇也孔安國曰河圖則八卦也洛書則九疇也侯果曰聖人法河圖洛書制厯象以示天下也易有四象所以示也侯果曰四象謂上下神物也變化也垂象也圖書也四者治人之洪範易有此象所以示人也繫辭焉所以告也虞翻曰謂繫彖象之辭八卦以象告也定之以吉凶所以斷也繫辭焉以斷其吉凶八卦定吉凶以斷天下之疑也易曰自天祐之吉無不利侯果曰此引大有上九辭以證之義也大有上九履信思順自天祐之言人能依四象所示繫辭所告又能思順則天及人皆共祐之吉無不利者也子曰祐者助也虞翻曰大有兑為口口助稱祐天之所助者順也虞翻曰大有五以隂順上故為天所助者順也人之所助者信也虞翻曰信謂二也乾為人為信庸言之信也履信思乎順又以尚賢也虞翻曰大有五應二而順上故履信思順比坤為順坎為思乾為賢人坤伏乾下故又以尚賢者也是以自天祐之吉無不利也崔憬曰言上九履五厥孚履人事以信也比五而不應三思天道之順也崇四匪彭明辨於五又以尚賢也以自天祐之吉無不利重引易文以證成其義子曰書不盡言言不盡意虞翻曰謂書易之動九六之變不足以盡易之所言言之則不足以盡庖犧之意也然則聖人之意其不可見乎侯果曰設疑而問也欲明立象可以盡聖人言意也子曰聖人立象以盡意崔憬曰言伏羲仰觀俯察而立八卦之象以盡其意設卦以盡情僞崔憬曰設卦謂因而重之為六十四卦之情僞盡在其中矣繫辭焉以盡其言崔憬曰文王作卦爻之辭以繫伏羲立卦之象象既盡意故辭以盡言也變而通之以盡利陸績曰變三百八十四爻使相交通以盡天下之利鼓之舞之以盡神虞翻曰神易也陽息震為鼓隂消巽為舞故鼓之舞之以盡神荀爽曰鼓者動也舞者行也謂三百八十四爻動行相反其卦所以盡易之神也乾坤其易之緼耶虞翻曰緼藏也易麗乾藏坤故為易之緼也乾坤成列而易立乎其中矣侯果曰緼淵隩也六子因之而生故云立乎其中矣乾坤毁則無以見易荀爽曰毁乾坤之體則無以見隂陽之交易也易不可見則乾坤或幾乎息矣侯果曰乾坤者動用之物也物既動用則不能無毁息矣天動極復靜靜極復動雖天地至此不違變化也是故形而上者謂之道形而下者謂之器崔憬曰此結上文兼明易之形器變通之事業也凡天地萬物皆有形質就形質之中有體有用體者即形質也用者即形質上之妙用也言有妙理之用以扶其體則是道也其體比用若器之於物則是體為形之下謂之為器也假令天地圓蓋方軫為體為器以萬物資始資生為用為道動物以形軀為體為器以靈識為用為道植物以枝幹為器為體以生性為道為用化而裁之謂之變翟𤣥曰化變剛柔而則之故謂之變也推而行之謂之通翟𤣥曰推行隂陽故謂之通也舉而措之天下之民謂之事業陸績曰變通盡利觀象制器舉而措之於天下民咸用之亦為事業九家易曰謂聖人畫卦為萬民事業之象故天下之民尊之得為事業矣是故夫象聖人有以見天下之賾崔憬曰此重明易之緼更引易象及辭以釋之言伏羲見天下之深賾即易之緼者也而擬諸其形容象其物宜是故謂之象陸績曰此明說立象盡意設卦盡情僞之意也聖人有以見天下之動而觀其會通以行其典禮侯果曰典禮有時而用有時而去故曰觀其會通也繫辭焉以斷其吉凶是故謂之爻崔憬曰言文王見天下之動所以繫象而為其辭謂之為爻極天下之賾者存乎卦陸績曰言卦象極盡天下之深情也鼓天下之動者存乎辭宋𠂻曰欲知天下之動者在於六爻之辭也化而裁之存乎變推而行之存乎通崔憬曰言易道陳隂陽變化之事而裁成之存乎其變推理達本而行之在乎其通神而明之存乎其人荀爽曰茍非其人道不虛行也崔憬曰言易神無不通明無不照能達此理者存乎其人謂文王述易之聖人默而成之不言而信存乎德行九家昜曰默而成謂隂陽相處也不言而信謂隂陽相應也德者有實行者相應也崔憬曰言伏羲成六十四卦不有言述而以卦象明之而人信之在乎合天地之德聖人之行也周易集解卷十四
