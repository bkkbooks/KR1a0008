body:
  text: 周易集解卷十六唐李鼎祚撰易曰不逺復無祇悔元吉侯果曰復初九爻辭殆近也庶冀也此明知微之難則知微者唯聖人耳顔子亞聖但冀近於知微而未得也在微則昧理彰而悟失在未形故有不善知則速改故無大過天地絪緼萬物化醇虞翻曰謂泰上也先説否否反成泰故不説泰天地交萬物通故化醇孔頴達曰以前章利用安身以崇德也安身之道在於得一若已能得一則可以安身故此章明得一之事也絪緼氣附著之義言天地無心自然得一唯二氣氤氲共相和會感應變化而有精醇之生萬物自化若天地有心為一則不能使萬物化醇者也男女搆精萬物化生虞翻曰謂泰初之上成損良為男兑為女故男女搆精乾為精損反成益萬物出震故萬物化生也干寶曰男女猶隂陽也故萬物化生不言隂陽而言男女者以指釋損卦六三之辭主於人事也易曰三人行則損一人一人行則得其友言致一也侯果曰損六三爻辭也象云一人行三則疑是衆不如寡三不及一此明物情相感當上法絪緼化醇致一之道則無患纍者也子曰君子安其身而後動虞翻曰謂反損成益君子益初也坤為安身震為後動崔憬曰君子將動有所為必自揣安危之理在於己身然後動也易其心而後語虞翻曰乾為易益初體復心震為後語崔憬曰君子恕己及物若於事心雖不可出語必和易其心而後言定其交而後求虞翻曰震専為定為後交謂剛柔始交艮為求也崔憬曰先定其交知其才行若好施與吝然後可以事求之君子修此三者故全也虞翻曰謂否上之初損上益下其道大光自上下下民説無疆故全也危以動則民不與也虞翻曰謂否上九髙而無位故危坤民否閉故弗與也懼以語則民不應也虞翻曰否上窮災故懼來下之初成益故民不應坤為民震為應也無交而求則民不與也虞翻曰上來之初故交坤民否閉故不與震為交莫之與則傷之者至矣虞翻曰上下之初否消滅乾則體剝傷臣弒君子弒父故傷之至矣易曰莫益之或擊之立心勿恆凶侯果曰益上九爻辭也此明先安身易心則羣善自應若危動懼語則物所不與故凶也子曰乾坤其易之門耶荀爽曰隂陽相易出於乾坤故曰門乾陽物也坤隂物也荀爽曰陽物天隂物地也隂陽合德而剛柔有體虞翻曰合德謂天地雜保大和日月戰乾剛以體天坤柔以體地也以體天地之撰九家易曰撰數也萬物形體皆受天地之數也謂九天數六地數也剛柔得以為體矣以通神明之德九家易曰隱藏謂之神著見謂之明隂陽交通乃謂之德其稱名也雜而不越九家易曰隂陽雜也名謂卦名隂陽雖錯而卦象各有次序不相踰越於稽其類其衰世之意耶虞翻曰稽考也三稱盛德上稱末世乾終上九動則入坤坤弒其君父故為亂世陽出復震入坤出坤故衰世之意耶侯果曰於嗟也稽考也易象考其事類但以吉凶得失為主則非淳古之時也故云衰世之意耳言耶示疑不欲切指也夫易彰往而察來而微顯闡幽開而當名虞翻曰神以知來智以藏往微者顯之謂從復成乾是察來也闡者幽之謂從姤之坤是彰往也陽息出初故開而當名辨物正言斷辭則備矣干寶曰辨物類也正言言正義也斷辭斷吉凶也如此則備於經矣其稱名也小虞翻曰謂乾坤與六子俱名八卦而小成故小復小而辨於物者矣其取類也大虞翻曰謂乾陽也為天為父觸類而長之故大也其旨逺其辭文虞翻曰逺謂乾文謂坤也其言曲而中其事肆而隱虞翻曰曲屈肆直也陽曲初震為言故其言曲而中坤為事隱未見故肆而隱也因二以濟民行以明失得之報虞翻曰二謂乾與坤也坤為民乾為行行得則乾報以吉行失則坤報以凶也易之興也其於中古乎虞翻曰興易者謂庖犧也文王書經系庖犧於乾五乾為古五在乾中故興於中古繫以黃帝堯舜為後世聖人庖犧為中古則庖犧以前為上古作易者其有憂患乎虞翻曰謂憂患百姓未知興利逺害不行禮義茹毛飲血衣食不足庖犧則天八卦通為六十四以德化之吉凶與民同患故有憂患是故履德之基也虞翻曰乾為德履與謙旁通坤柔履剛故德之基坤為基侯果曰履禮蹈禮不倦德之基也自下九卦是復道之最故特言矣謙德之柄也虞翻曰坤為柄柄本也凡言德皆陽爻也干寶曰柄所以持物謙所以持禮者也復德之本也虞翻曰復初乾之元故德之本也恆德之固也虞翻曰立不易方守德之堅固損德之修也荀爽曰懲忿窒欲所以修德益德之裕也荀爽曰見善則遷有過則改德之優裕也困德之辨也鄭玄曰辨别也遭困之時君子固窮小人窮則濫德於是别也井德之地也姚信曰井養而不窮德居地也巽德之制也虞翻曰巽風為號令所以制下故曰德之制也孔頴達曰此上九卦各以德為用也履和而至虞翻曰謙與履通謙坤柔和故履和而至禮之用和為貴者也謙尊而光荀爽曰自上下下其道大光也復小而辨於物虞翻曰陽始見故小乾陽物坤隂物以乾居坤故稱别物恆雜而不厭荀爽曰夫婦雖錯居不厭之道也損先難而後易虞翻曰損初之上失正故先難終反成益得位於初故後易易其心而後語益長裕而不設虞翻曰謂天施地生其益無方凡益之道與時偕行故不設也困窮而通虞翻曰陽窮否上變之坤二成坎坎為通故困窮而通也井居其所而遷韓康伯曰改邑不改井井所居不移而能遷其施也巽稱而隱崔憬曰言巽申命行事是稱揚也隂助德化是微隱也自此已下明九卦德之體者也履以和行虞翻曰禮之用和為貴謙震為行故以和行也謙以制禮虞翻曰隂稱禮謙三以一陽制五隂萬民服故以制禮也復以自知虞翻曰有不善未嘗不知故自知也恆以一德虞翻曰恆德之固立不易方從一而終故一德者也損以逺害虞翻曰坤為害泰以初止坤上故逺害乾為逺益以興利荀爽曰天施地生其益無方故興利也困以寡怨虞翻曰坤為怨不弒父與君乾來上拆坤二故寡怨坎水性通故不怨也井以辨義虞翻曰坤為義以乾别坤故辨義也巽以行權九家易曰巽象號令又為近利人君政教進退釋利而為權也春秋傳曰權者反於經然後有善者也此所以説九卦者聖人履憂濟民之所急行也故先陳其德中言其性後敘其用以詳之也西伯勞謙殷紂驕暴臣子之禮有常故創易道以輔濟君父者也然其意義廣逺幽微孔子指撮解此九卦之德合三復之道明西伯之於紂不失上下易之為書也不可逺侯果曰居則觀象動則玩占故不可逺也為道也屢遷虞翻曰遷徙也日月周流上下無常故屢遷也變動不居周流六虛虞翻曰變易動行六虛六位也日月周流終則復始故周流六虛為甲子之旬辰為虛坎戊為月離已為日入在中宫其處空虛故稱六虛五甲如次者也上下無常剛柔相易虞翻曰剛柔者晝夜之象也在天稱上入地為下故上下無常也不可為典要唯變所適虞翻曰典要道也上下無常故不可為典要適乾為晝適坤為夜侯果曰謂六爻剛柔相易逺近恆唯變所適非有典要其出入以度外內使知懼虞翻曰出乾為外入坤為內日行一度故出入以度出陽知生入隂懼死使知懼也韓康伯曰明出入之度使物知外內之戒也出入猶行藏外內猶隱顯遁以逺時為吉豐以幽隱致凶漸以髙顯為美明夷以處昧利貞此外內之戒也又明於憂患與故虞翻曰神以知來故明憂患智以藏往故知事故作易者其有憂患乎無有師保如臨父母虞翻曰臨見也言隂陽施行以生萬物無有師保生成之者萬物出生皆如父母孔子曰父母之道天地乾為父坤為母干寶曰言易道以戒懼為本所謂懼以終始歸無咎也外謂大夫之從王事則夕惕若厲內謂婦人之居室則無攸遂也雖無師保切磋之訓其心敬戒常如父母之臨已者也初率其辭而揆其方虞翻曰初始下也率正也謂修辭立誠方謂坤也以乾通坤故初帥其辭而揆其方侯果曰率修方道也言修易初首之辭而度其終末之道盡有典常非虛設也既有典常茍非其人道不虛行虞翻曰其出入以度故有典常茍誠也其人謂乾為賢人神而明之存乎其人不言而信謂之德行故不虛行也崔憬曰言易道深逺若非其聖人則不能明其道故知易道不虛而自行必文王然後能𢎞也易之為書也干寶曰重發易者别殊旨也原始要終以為質也虞翻曰質本也以乾原始以坤要終謂原始反終以知死生之説崔憬曰質體也言易之書原窮其事之初若初九潛龍勿用是原始也又要會其事之末若上九亢龍有悔是要終也易原始潛龍之勿用要終亢龍之有悔復相明以為體也諸卦亦然若大畜而後通之類是也六爻相雜唯其時物也虞翻曰隂陽錯居稱雜時陽則陽時隂則隂故唯其時物乾陽物坤隂物干寶曰一卦六爻則皆雜有八卦之氣若初九為震爻九二為坎爻也或若見辰戌言艮已亥言兑也或若以甲壬名乾以乙癸名坤也或若以午位名離以子位名坎或若德來為惡物王相為興休廢為衰其初難知其上易知本末也侯果曰本末初上也初則事微故難知上則事彰故易知初辭擬之卒成之終干寶曰初擬議之故難知卒終成之故易知本末勢然也侯果曰失在初微猶可擬議而之福禍在卒成事之終極非擬議所及故曰卒成之終假如乾之九三噬嗑初九猶可擬議而之善至上九則凶災不移是事之卒成之終極凶不變也若夫雜物撰德辨是與非則非其中爻不備虞翻曰撰德謂乾辨别也是謂陽非謂隂也中正乾六爻二四上非正坤六爻初三五非正故雜物因而重之爻在其中故非其中則爻辭不備道有變動故曰爻也崔憬曰上既具論初上二爻次又以明其四爻也言中四爻雜合所主之事撰集所陳之德能辨其是非備在卦中四爻也噫亦要存亡吉凶則居可知矣虞翻曰謂知存知亡要終者也居乾吉則存居坤凶則亡故曰居可知矣崔憬曰噫歎聲也言中四爻亦能要定卦中存亡吉凶之事居然可知矣孔疏扶王弼義以此中爻為二五之爻居中無偏能統一卦之義事必不然矣何則上文云六爻相雜唯其時物言雖錯雜而各獨會於時獨主於物豈可以二五之爻而兼其雜物撰德是非存亡吉凶之事乎且二五之撰德與是要存與吉則可矣若主物與非要亡與凶則非其所象故知其不可也且上論初上二爻則此中總言四爻矣下論二四三五則是重述其功位者也智者觀其彖辭則思過半矣韓康伯曰夫彖舉立象之統論中爻之義約以存博簡以兼衆雜物撰德而一以貫之者也形之所宗者道衆之所歸者一其事彌繁則愈滯乎有其理彌約則轉近乎道彖之為義存乎一也一之為用同乎道矣形而上者可以觀道過乎半之益不亦宜乎二與四同功韓康伯曰同隂功也崔憬曰此重釋中四爻功位所宜也二主士大夫位佐於一國四主三孤三公牧伯之位佐於天子皆同有助理之功也而異位韓康伯曰有外內也崔憬曰二士大夫位卑四孤公牧位尊故有異也其善不同二多譽四多懼近也韓康伯曰二處中和故多譽也四近於君故多懼也柔之為道不利逺者崔憬曰此言二四皆隂位隂之為道近比承陽故不利逺矣其要無咎其用柔中也崔憬曰言二是隂逺陽雖則不利其要或有無咎者以二柔居中異於四也三與五同功而異位韓康伯曰有貴賤也崔憬曰三諸侯之位五天子之位同有理人之功而君臣之位異者也三多凶五多功貴賤之等也崔憬曰三處下卦之極居上卦之下為一國之君有威權之重而上承天子若無含章之美則必致凶五既居中不偏貴乘天位以道濟物廣被寰中故多功也其柔危其剛勝耶侯果曰三五陽位隂柔處之則多凶危剛正居之則勝其任言耶者不定之辭也或有柔居而吉者得其時也剛居而凶私其應也易之為書也廣大悉備荀爽曰以隂易陽謂之廣以陽易隂謂之大易與天地準固悉備也有天道焉有人道焉有地道焉崔憬曰言易之為書明三才廣無不被大無不包悉備有萬物之象者也兼三才而兩之故六六者非他也三才之道也崔憬曰言重卦六爻亦兼天地人道兩爻為一才六爻為三才則是兼三才而兩之故六六者即三才之道也道有變動故曰爻陸績曰天道有晝夜日月之變地道有剛柔燥溼之變人道有行止動靜吉凶善惡之變聖人設爻以效三者之變動故謂之爻者也爻有等故曰物干寶曰等羣也爻中之義羣物交集五星四氣六親九族福德刑殺衆形萬類皆來發於爻故總謂之物也象頤中有物曰噬嗑是其義也物相雜故曰文虞翻曰乾陽物坤隂物純乾純坤之時未有文章陽物入坤隂物入乾更相雜成六十四卦乃有文章故曰文文不當故吉凶生焉干寶曰其辭為文也動作云為必考其事令與爻義相稱也事不稱義雖有吉凶則非今日之吉凶故元亨利貞而穆薑以死黃裳元吉南蒯以敗是所謂文不當也故於經則有君子吉小人否於占則王相之氣君子以遷官小人以遇罪也易之興也其當殷之末世周之盛德耶當文王與紂之事耶虞翻曰謂文王書易六爻之辭也末世乾上盛德乾三也文王三分天下而有其二以服事殷周德其可謂至德矣故周之盛德紂窮否上知存而不知亡知得而不知喪終以焚死故殷之末世也而馬荀鄭君從俗以文王為中古失之逺矣是故其辭危虞翻曰危謂乾三夕惕若厲故辭危也危者使平陸績曰文王在紂世有危亡之患故於易辭多趨危亡本自免濟建成王業故易爻辭危者使平以象其事否卦九五其亡繫于包桑之屬是也易者使傾陸績曰易平易也紂安其位自謂平易而反傾覆故易爻辭易者使傾以象其事明夷上六初登于天後入于地之屬是也其道甚大百物不廢虞翻曰大謂乾道乾三爻三十六物故百物不廢略其竒八與大衍之五十同義懼以終始其要無咎此之謂易之道也虞翻曰乾稱易道終日乾乾故無咎危者使平易者使傾惡盈福謙故易之道者也夫乾天下之至健也德行恆易以知險虞翻曰險謂坎也謂乾二五之坤成坎離日月麗天天險不可升故知險者也夫坤天下之至順也德行恆簡以知阻虞翻曰阻險阻也謂坤二五之乾艮為山陵坎為水巽髙兑下地險山川邱陵故以知險也能悅諸心虞翻曰乾五之坤坎為心兑為説故能説諸心謂説諸心物之有心者也能研諸侯之慮虞翻曰坎為心慮乾初之坤為震震為諸侯故能研諸侯之慮定天下之吉凶成天下之亹亹者虞翻曰謂乾二五之坤成離日坎月則八卦象具八卦定吉凶故能定天下之吉凶亹亹者謂莫善蓍龜也荀爽曰亹亹者隂陽之微可成可敗也順時者成逆時者敗也是故變化云為吉事有祥虞翻曰祥幾祥也吉之先見者也陽出變化云為吉事為祥謂復初乾元者也象事知器占事知來虞翻曰象事謂坤坤為器乾五之坤成象故象事知器也占事謂乾以知來乾五動成離則玩其占故知來侯果曰易之云為唯變所適為善則吉事必應觀象則用器可為求吉則未形可覩者也天地設位聖人成能虞翻曰天尊五地卑二故設位乾為聖人成能謂能説諸心能研諸侯之慮故成能也崔憬曰言易擬天地設乾坤二位以明重卦之義所以成聖人伏羲文王之能事者也人謀鬼神百姓與能虞翻曰乾為人坤為鬼乾二五之坤坎為謀乾為百坤為姓故人謀鬼謀百姓與能朱仰之曰人謀謀及卿士鬼謀謀及卜筮也又謀及庶民故曰百姓與能也八卦以象告虞翻曰在天成象乾二五之坤則八卦象成兑口震言故以象告也爻彖以情言崔憬曰伏羲始畫八卦因而重之以備萬物而告於人也爻謂爻下辭彖謂卦下辭皆是聖人之情見乎繫辭而假爻彖以言故曰爻彖以情言剛柔雜居而吉凶可見矣虞翻曰乾二之坤成坎坤五之乾成離故剛柔雜居艮為居離有巽兑坎有震艮八卦體備故吉凶可見也崔憬曰言文王以六爻剛柔相推而物雜居得理則吉失理則凶故吉凶可見也變動以利言虞翻曰乾變之坤成震震為言故變動以利言也吉凶以情遷虞翻曰乾吉坤凶六爻發揮旁通情也故以情遷是以愛惡相攻而吉凶生虞翻曰攻摩也乾為愛坤為惡謂剛柔相摩以愛攻惡生吉以惡攻愛生凶故吉凶生也逺近相取而悔吝生虞翻曰逺陽謂乾近隂謂坤陽取隂生悔隂取陽生吝悔吝言小疵崔憬曰逺謂應與不應近謂比與不比或取逺應而捨近比或取近比而捨逺應由此逺近相取所以生悔吝於繫辭矣情偽相感而利害生虞翻曰情陽偽隂也情感偽生利偽感情生害乾為利坤為害凡易之情近而不相得則凶韓康伯曰近况比爻也易之情剛柔相摩變動相逼者也近而不相得必有乖違之患也或有相違而無患者得其應也相須而偕凶乖於時也隨事以考之義可見矣或害之悔且吝荀爽曰謂屯六三往吝之屬也虞翻曰坤為害以隂居陽以陽居隂為悔且吝也將叛者其辭慚虞翻曰坎人之辭也近而不得故叛坎為隱伏將叛坎為心故慚也侯果曰凡心不相得將懷叛逆者辭必慚恧中心疑者其辭枝荀爽曰或從王事無成之屬也虞翻曰離人之辭也火性枝分故枝疑也侯果曰中心疑二則失得無從故枝分不一也吉人之辭寡虞翻曰艮人之辭也躁人之辭多荀爽曰謂睽上九之屬也虞翻曰震人之辭也震為決躁恐懼虩虩笑言啞啞故多辭侯果曰躁人煩急故辭多誣善之人其辭遊荀爽曰遊逸之屬也虞翻曰兌人之辭也兌為口舌誣乾乾為善人也崔憬曰妄稱有善故自敘其美而辭必浮遊不實失其守者其辭屈荀爽曰謂泰上六城復于隍之屬也侯果曰失守則沮辱而不申故其辭屈也爻有此象故占辭亦從矣虞翻曰巽人之辭也巽詰詘陽在初守巽初陽入伏隂下故其辭詘此六子也離上坎下震起艮止兌見巽伏上經終坎離則下經終既濟未濟上系終乾坤則下系終六子此易之大義者也周易集解卷十六
