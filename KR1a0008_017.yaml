body:
  text: 周易集解卷十七唐李鼎祚撰昔者聖人之作易也孔頴達曰據今而稱上代謂之昔者聰明睿智謂之聖人即伏羲也案下繫云古者庖犧氏之王天下始作八卦今言作易明是伏羲非謂文王也幽贊於神明而生蓍荀爽曰幽隱也贊見也神者在天明者在地神以夜光明以晝照蓍者策也謂陽爻之策三十有六隂爻之策二十有四二篇之策萬有一千五百二十上配列宿下副物數生蓍者謂蓍從爻中生也干寶曰幽昧人所未見也贊求也言伏羲用明於昧冥之中以求萬物之性爾乃得自然之神物能通天地之精而管御百靈者始為天下生用蓍之法者也參天兩地而倚數虞翻曰倚立參三也謂分天象為三才以地兩之立六畫之數故倚數也崔憬曰參三也謂於天數五地數五中以八卦配天地之數起天三配艮而立三數天五配坎而立五數天七配震而立七數天九配乾而立九數此從三順配陽四卦也地從二起以地兩配兑而立二數以地十配離而立十數以地八配巽而立八數以地六配坤而立六數此從兩逆配隂四卦也其天一地四之數無卦可配故虛而不用此聖人取八卦配天地之數總五十而為大衍案此説不盡已釋在大衍章中詳之明矣觀變於隂陽而立卦虞翻曰謂立天之道曰隂與陽乾坤剛柔立本者卦謂六爻陽變成震坎艮隂變成巽離兑故六卦六爻三變三六十八則有十八變而成卦八卦而小成是也繫曰陽一君二民隂二君一民不道乾坤者也發揮於剛柔而生爻虞翻曰謂立地之道曰柔與剛發動揮變變剛生柔爻變柔生剛爻以三為六也因而重之爻在其中故生爻和順於道德而理於義虞翻曰謂立人之道曰仁與義和順謂坤道德謂乾以乾通坤謂之理義也窮理盡性以至於命虞翻曰以乾推坤謂之窮理以坤變乾謂之盡性性盡理窮故至於命巽為命也昔者聖人之作易也虞翻曰重言昔者明謂庖犧也將以順性命之理虞翻曰謂乾道變化各正性命以陽順性以隂順命是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義崔憬曰此明一卦立爻有三才二體之義故先明天道既立隂陽地道又立剛柔人道亦立仁義以明之也何則在天雖剛亦有柔德在地雖柔亦有剛德故書曰沈潛剛克髙明柔克人稟天地豈可不兼仁義乎所以易道兼之矣兼三才而兩之故易六畫而成卦虞翻曰謂參天兩地乾坤各三爻而成六畫之數也分隂分陽迭用柔剛虞翻曰迭遞也分隂為柔以象夜分陽為剛以象晝剛柔者晝夜之象晝夜更用故迭用剛柔矣故易六位而成章章謂文理乾三畫成天文坤三畫成地理天地定位謂乾坤五貴三賤故定位也山澤通氣謂艮兑同氣相求故通氣雷風相薄謂震巽同聲相應故相薄水火不相射謂坎離射厭也水火相通坎戊離已月三十日一會於壬故不相射也八卦相錯錯摩則剛柔相摩八卦相蕩也數往者順謂坤消從五至亥上下故順也知來者逆謂乾息從子至已上下故逆也是故易逆數也易謂乾故逆數此上虞義雷以動之荀爽曰謂建卯之月震卦用事天地和合萬物萌動也風以散之謂建巳之月萬物上達布散田野雨以潤之謂建子之月含育萌芽也日以烜之休逺反謂建午之月太陽欲長者也艮以止之謂建丑之月消息畢止也兑以説之謂建酉之月萬物成熟也乾以君之謂建亥之月乾坤合居君臣位得也此上荀義坤以藏之九家易曰謂建申之月坤在乾下包藏萬物也乾坤交索既生六子各任其才往生物也又雷與風雨變化不常而日月相推迭有來往是以四卦以義言之天地山澤恆在者也故直説名矣孔頴達曰此又重明八物八卦之功用也上四舉象下四舉卦者王肅以為互相備也則明雷風與震巽同用乾坤與天地同功也帝出乎震崔憬曰帝者天之王氣也至春分則震王而萬物出生齊乎巽立夏則巽王而萬物潔齊相見乎離夏至則離王而萬物皆相見也致役乎坤立秋則坤王而萬物致養也説言乎兑秋分則兑王而萬物所説戰乎乾立冬則乾王而隂陽相薄勞乎坎冬至則坎王而萬物之所歸也成言乎艮立春則艮王而萬物之所成終成始也以其周王天下故謂之帝此崔新義也萬物出乎震震東方也虞翻曰出生也震初不見東故不稱東方卦也齊乎巽巽東南也齊也者言萬物之潔齊也巽陽隱初又不見東南亦不稱東南卦與震同義巽陽藏室故潔齊離也者明也萬物皆相見南方之卦也離為日為火故明日出照物以日相見離象三爻皆正日中正南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也離南方故南面乾為治乾五之坤坎為耳離為明故以聽天下向明而治也坤也者地也萬物皆致養焉故曰致役乎坤坤隂無陽故道廣布不主一方含𢎞光大養成萬物兑正秋也萬物之所説也故曰説言乎兑兑三失位不正故言正秋兑象不見西故不言西方之卦與坤同義兑為雨澤故説萬物震為言震二動成兑言從口出故説言也戰乎乾乾西北之卦也言隂陽相薄也乾剛正五月十五日晨象西北故西北之卦薄入也坤十月卦乾消剝入坤故隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎歸藏也坎二失位不正故言正北方之卦與兑正秋同義坎月夜中故正北方此上虞義崔憬曰以坎是正北方之卦立冬已後萬物歸藏於坎又陽氣伏於子潛藏地中未能浸長勞局衆隂之中也艮東北之卦也萬物之所成終而所成始也故曰成言乎艮虞翻曰艮三得正故復稱卦萬物成始乾甲成終坤癸艮東北是甲癸之間故萬物之所成終而成始者也神也者妙萬物而為言者也韓康伯曰於此言神者明八卦運動變化推移莫有使之然者神則無物妙萬物而為言也明則雷疾風行火炎水潤莫不自然相與而為變化故能萬物既成動萬物者莫疾乎雷崔憬曰謂春分之時雷動則草木滋生蟄蟲發起所動萬物莫急於此也橈萬物者莫疾乎風言風能鼓橈萬物春則發散草木枝葉秋則摧殘草木枝條莫急於風者也燥萬物者莫熯乎火言火能乾燥萬物不至潤溼於陽物之中莫過乎火熯亦燥也説萬物者莫説乎澤言光説萬物莫過以澤而成説之也潤萬物者莫潤乎水言滋潤萬物莫過以水而潤之終萬物始萬物者莫盛乎艮言大寒立春之際艮之方位萬物以之始而為今嵗首以之終而為去嵗末此則叶夏正之義莫盛於艮也此言六卦之神用而不言乾坤者以乾坤而發天地無為而無不為能成雷風等有為之神妙也艮不言山獨舉卦名者以動橈燥潤功是雷風水火至於終始萬物於山義則不然故言卦而餘皆稱物各取便而論也此崔新義也故水火相逮孔頴逹曰上章言水火不相入此言水火相逮者既不相入又不相及則無成物之功明性雖不相入而氣相逮及雷風不相悖孔頴達曰上言雷風相薄此言不相悖者二象俱動若相薄而相悖逆則相傷害亦無成物之功明雖相薄而不相逆者也山澤通氣崔憬曰言山澤雖相縣逺而氣交通然後能變化既成萬物矣虞翻曰謂乾變而坤化乾道變化各正性命成既濟定故既成萬物矣乾健也虞翻曰精剛自勝動行不休故健也坤順也純柔承天時行故順震動也陽出動行巽入也乾初入隂坎陷也陽陷隂中離麗也日麗乾剛艮止也陽位在上故止兑説也震為大笑陽息震成兑震言出口故説此上虞義也乾為馬孔頴達曰乾象天行健故為馬坤為牛坤象地任重而順故為牛震為龍震象龍動故為龍此上孔正義巽為雞九家易曰應八風也風應節而變變不失時雞時至而鳴與風相應也二九十八主風精為雞故雞十八日剖而成雛二九順陽厯故雞知時而鳴也坎為豕九家易曰汚辱卑下也六九五十四主時精為豕坎豕懷胎四月而生宣時理節是其義也離為雉孔頴達曰離為文明雉有文章故離為雉艮為狗九家易曰艮止主守禦也艮數三七九六十三三主斗斗為犬故犬懷胎三月而生斗運行十三時日出故犬十三日而開目斗屈故犬卧屈也斗運行四市犬亦夜繞室也犬之精畏水不敢飲但舌舐水耳犬鬬以水灌之則解也犬近奎星故犬淫當路不避人者也兑為羊孔頴達曰兑為説羊者順從之畜故為羊乾為首乾尊而在上故為首坤為腹坤能包藏含容故為腹也震為足震動用故為足巽為股巽為順股順隨於足故巽為股坎為耳坎北方主聽故為耳離為目離南方主視故為目艮為手艮為止手亦止持於物使不動故艮為手兑為口兑為説口所以説言故兑為口此上孔正義乾天也故稱乎父坤地也故稱乎母崔憬曰欲明六子故先説乾稱天父坤稱地母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女孔頴達曰索求也以求乾坤為父母而求其子也得父氣者為男得母氣者為女坤初求得乾氣為震故曰長男坤二得乾氣為坎故曰中男坤三得乾氣為艮故曰少男乾初得坤氣為巽故曰長女乾二得坤氣為離故曰中女乾三得坤氣為兑故曰少女此言所以生六子者也乾為天宋衷曰乾動作不解天亦轉運為圜宋衷曰動作轉運非圜不能故為圜為君虞翻曰貴而嚴也為父虞翻曰成三男取其類大故為父也為玉為金崔憬曰天體清明而剛故為玉為金為寒為氷孔頴達曰取其西北氷寒之地崔憬曰乾主立冬已後冬至已前故為寒為氷也為大赤虞翻曰太陽為赤月望出入時也崔憬曰乾四月純陽之卦故取盛陽色為大赤為良馬虞翻曰乾善故良也為老馬九家易曰言氣衰也息至已必當復消故為老馬也為瘠馬崔憬曰骨為陽肉為隂乾純陽爻骨多故為瘠馬也為駮馬宋衷曰天有五行之色故為駮馬也為木果宋衷曰羣星著天似果實著木故為木果坤為地虞翻曰柔道靜為母虞翻曰成三女能致養故為母為布崔憬曰遍布萬物於致養故坤為布為釜孔頴達曰取其化生成熟故為釜也為吝嗇孔頴達曰取地生物而不轉移故為吝嗇也為均崔憬曰取地生萬物不擇善惡故為均也為子母牛九家易曰土能生育牛亦含養故為子母牛也為大輿孔頴達曰取其能載故為大輿也為文九家易曰萬物相雜故為文也為衆虞翻曰物三稱羣隂為民三隂相隨故為衆也為柄崔憬曰萬物依之為本故為柄其於地也為黑崔憬曰坤十月卦極隂之色故其於色也為黑矣震為雷虞翻曰太陽火得水有聲故為雷也為駹駹蒼色震東方故為駹舊讀作龍上已為龍非也為玄黃天玄地黃震天地之雜物故為玄黃為專陽在初隱靜未出觸坤故專則乾靜也敷延叔堅説以專為敷大布非也此上虞義者也為大塗崔憬曰萬物所出在春故為大塗取其通生性也為長子虞翻曰乾一索故為長子為決躁崔憬曰取其剛在下動故為決躁也為蒼筤竹九家易曰蒼筤青也震陽在下根長堅剛隂交在中使外蒼筤也為萑葦九家易曰萑葦蒹葭也根莖叢生蔓衍相連有似雷行也其於馬也為善鳴虞翻曰為雷故善鳴也為馵足為作足馬白後左足為馵震為左為足為作初陽白故為作足為的顙的白顙額也震體頭在口上白故的顙詩云有馬白顛是也此上虞義也其於稼也為反生宋衷曰隂在上陽在下故為反生謂枲豆之類戴甲而生其究為健為蕃鮮虞翻曰震巽相薄變而至三則下象究與四成乾故其究為健為蕃鮮巽究為躁卦躁卦則震雷巽風無形故卦特變耳巽為木宋衷曰陽動隂靜二陽動於上一隂安靜於下有似於木也為風陸績曰風土氣也巽坤之所生故為風亦取靜於本而動於末也為長女荀爽曰柔在初為繩直翟玄曰上二陽共正一隂使不得邪僻如繩之直孔頴達曰取其號令齊物如繩直也為工荀爽曰以繩木故為工虞翻曰為近利市三倍故為工子夏曰工居肆為白虞翻曰乾陽在上故白孔頴達曰取其風吹去塵故潔白也為長崔憬曰取風行之逺故為長為髙虞翻曰乾陽在上長故髙孔頴達曰取木生而髙上為進退虞翻曰陽初退故進退荀爽曰風行無常故進退為不果荀爽曰風行或東或西故不果為臭虞翻曰臭氣也風至知氣巽二入艮鼻故為臭繫曰其臭如蘭其於人也為宣髮虞翻曰為白故宣髮馬君以宣為寡髮非也為廣顙變至三坤為廣四動成乾為顙在頭口上故為廣顙與震的顙同義震一陽故的顙巽變乾二陽故廣顙為多白眼為白離目上向則白眼見故多白眼為近利市三倍變至三成坤坤為近四動乾乾為利至五成噬嗑故稱市乾三爻為三倍故為近利市三倍動上成震故其究為躁卦八卦諸為唯震巽變耳其究為躁卦變至五成噬嗑為市動上成震故其究為躁卦明震內體為専外體為躁此上虞義坎為水宋衷曰坎陽在中內光明有似於水為溝瀆虞翻曰以陽闢坤水性流通故為溝瀆也為隱伏虞翻曰陽藏坤中故為隱伏也為矯輮宋衷曰曲者更直為矯直者更曲為輮水流有曲直故為矯輮為弓輪虞翻曰可矯輮故為弓輪坎為月月在於庚為弓在甲象輪故弓輪也其於人也為加憂兩隂失心為多眚故加憂為心病為勞而加憂故心病亦以坎為心坎二折坤為心病此上虞義也為耳痛孔頴達曰坎勞卦也又主聽聽勞則耳痛為血卦為赤孔頴達曰人之有血猶地之有水赤血色也案十一月一陽爻生在坎陽氣初生於黃泉其色赤也其於馬也為美脊宋衷曰陽在中央馬脊之象也為亟心崔憬曰取其內陽剛動故為亟心也為下首荀爽曰水之流首卑下也為薄蹄九家易曰薄蹄者在下水又趨下趨下則流散流散則薄故為薄蹄也為曳宋衷曰水摩地而行故曳其於輿也為多眚虞翻曰眚敗也坤為大車坎折坤體故為車多眚也為通水流瀆故通也為月坤為夜以坎陽光坤故為月也為盜水行潛竊故為盜也其於木也為堅多心陽剛在中故堅多心棘棗屬也此上虞義也孔頴達曰乾震坎皆以馬喻乾至健震至動坎至行故皆可以馬為喻坤則順艮則止巽亦順離文明而柔順兑柔説皆無健故不以馬為喻也唯坤卦利牝馬取其行不取其健故曰牝也坎亦取其行不取其健皆外柔故為下首薄蹄曳也離為火崔憬曰取卦陽在外象火之外照也為日荀爽曰陽外光也為電鄭玄曰取火明也久明似日暫明似電也為巾女荀爽曰柔在中也為甲胄虞翻曰外剛故為甲乾為首巽繩貫甲而在首止故為胄胄兜鍪也為戈兵乾為金離火斷乾燥而鍊之故為戈兵也其於人也為大腹象曰常滿如妊身婦故為大腹乾為大也為乾卦火曰熯燥物故為乾卦也為龞為蟹為螺為蚌為龜此五者皆取外剛內柔也其於木也為科上稿巽木在離中體大過死巽蟲食心則折也蠧蟲食口木故上稿或以離火燒巽故折上稿此上虞義宋衷曰隂在內則空中木中空則上科稿也艮為山宋衷曰二隂在下一陽在上隂為土陽為木土積於下木生其上山之象也為徑路虞翻曰艮為山中徑路震陽在初則為大塗艮陽小故為徑路也為小石陸績曰艮剛卦之小故為小石者也為門闕虞翻曰艮為門艮陽在門外故為門闕兩小山闕之象也為果蓏宋衷曰木實謂之果草實謂之蓏桃李瓜瓞之屬皆出山谷也為閽寺宋衷曰閽人主門寺人主巷艮為止此職皆掌禁止者也為指虞翻曰艮手多節故為指為拘虞翻曰指屈伸制物故為拘拘舊作狗上已為狗字之誤為鼠虞翻曰似狗而小在坎穴中故鼠晉九四是也為黔喙之屬馬融曰黔喙肉食之獸謂豺狼之屬黔黑也陽玄在前也其於木也為堅多節虞翻曰陽剛在外故多節松柏之屬兑為澤虞翻曰坎水半見故為澤宋衷曰隂在上令下溼故為澤也為少女虞翻曰坤三索位在末故少也為巫乾為神兑為通與神通氣女故為巫為口舌兑得震聲故為口舌為毁折二折震足故為毁折為附決乾體未圜故附決也其於地也為剛鹵乾二陽在下故剛澤水潤下故鹹此上虞義朱仰之曰取金之剛不生也剛鹵之地不生物故為剛鹵者也為妾三少女位賤故為妾為羔羔女使皆取位賤故為羔舊讀以震駹為龍艮拘為狗兑羔為羊皆已見上此為再出非孔子意也震已為長男又言長子謂以當繼世守宗廟主祭祀故詳舉之三女皆言長中少明女子各當外成故别見之此其大例者也此上虞義周易序卦有天地然後萬物生焉干寶曰物有先天地而生者矣今正取始於天地天地之先聖人弗之論也故其所法象必自天地而還老子曰有物混成先天地生吾不知其名強字之曰道上繫曰法象莫大乎天地莊子曰六合之外聖人存而不論春秋穀梁傳曰不求知所不可知者智也而今後世浮華之學強支離道義之門求入虛誕之域以傷政害民豈非讒説殄行大舜之所疾者也盈天地之間者唯萬物故受之以屯屯者盈也荀爽曰謂陽動在下造生萬物於冥昧之中也屯者物之始生也韓康伯曰屯剛柔始交故為萬物之始生也崔憬曰此仲尼序文王次卦之意不序乾坤之次者以一生二二生三三生萬物則天地次第可知而萬物之先後宜序也萬物之始生者言剛柔始交故萬物資始於乾而資生於坤也物生必蒙故受之以蒙蒙者蒙也物之稚也崔憬曰萬物始生之後漸以長稚故言物生必蒙鄭玄曰蒙幼小之貌齊人謂萌為蒙也物稚不可不養也故受之以需需者飲食之道也荀爽曰坎在乾上中有離象水火交和故為飲食之道鄭玄曰言孩稚不養則不長也飲食必有訟故受之以訟韓康伯曰夫有生則有資有資則爭興也鄭玄曰訟猶爭也言飲食之會恆多爭也訟必有衆起故受之以師師者衆也九家易曰坤為衆物坎為衆水上下皆衆故曰師也凡制軍萬有二千五百人為軍天子六軍大國三軍次國二軍小國一軍軍有將皆命卿也二千五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫也崔憬曰因爭必起相攻故受之以師也衆必有所比故受之以比韓康伯曰衆起而不比則爭無息必相親比而後得寧也比者比也比必有所畜故受之以小畜韓康伯曰比非大通之道則各有所畜以相濟也由比而畜故曰小畜而不能大也物畜然後有禮故受之以履韓康伯曰履禮也禮所以適時用也故既畜則須用有用須禮也履而泰然後安故受之以泰泰者通也荀爽曰謂乾來下降以陽通隂也姚信曰安上治民莫過於禮有禮然後泰泰然後安也物不可以終通故受之以否崔憬曰物極則反故不終泰通而否矣所謂城復于隍物不可以終否故受之以同人韓康伯曰否則思通人人同志故可出門同人不謀而合與人同者物必歸焉故受之以大有崔憬曰以欲從人人必歸已所以成大有有大者不可以盈故受之以謙崔憬曰富貴而自遺其咎故有大者不可盈當須謙退天之道也有大而能謙必豫故受之以豫鄭玄曰言同既大而有謙德則於政事恬逸雷出地奮豫豫行出而喜樂之意豫必有隨故受之以隨韓康伯曰順以動者衆之所隨也以喜隨人者必有事故受之以蠱蠱者事也九家易曰子行父事備物致用而天下治也備物致用立成器以為天下利莫大於聖人子修聖道行父之事以臨天下無為而治有事然後可大故受之以臨臨者大也荀爽曰陽稱大謂二陽動升故曰大也宋衷曰事立功成可推而大也物大然後可觀故受之以觀虞翻曰臨反成觀二陽在上故可觀也崔憬曰言德業大者可以觀政於人也可觀而後有所合故受之以噬嗑嗑者合也虞翻曰頤中有物食故口合也韓康伯曰可觀則異方合會也物不可以茍合而已故受之以賁賁者飾也虞翻曰分剛上文柔故飾韓康伯曰物相合則須飾以修外也致飾而後亨則盡矣故受之以剝剝者剝也荀爽曰極飾反素文章敗故為剝也物不可以終盡剝窮上反下虞翻曰陽四月窮上消姤至坤者也故受之以復崔憬曰夫易窮則有變物極則反於初故剝之為道不可終盡而使之於復也復則不妄矣故受之以無妄崔憬曰物復其本則為誠實故言復則無妄矣有無妄然後可畜故受之以大畜荀爽曰物不妄者畜之大也畜積不敗故大畜也物畜然後可養故受之以頤頤者養也虞翻曰天地養萬物聖人養賢以及萬民崔憬曰大畜剛健輝光日新則可觀其所養故言物畜然後可養也不養則不可動故受之以大過虞翻曰人頤不動則死故受之以大過大過否卦棺槨之象也物不可以終過故受之以坎坎者陷也韓康伯曰過而不已則陷沒也陷必有所麗故受之以離離者麗也韓康伯曰物極則變極陷則反所麗有天地虞翻曰謂天地否也然後有萬物謂否反成泰天地氤氲萬物化醇故有萬物也有萬物然後有男女謂泰已有否否三上反正成咸艮為男兑為女故有男女有男女然後有夫婦咸反成恆震為夫巽為婦故有夫婦也有夫婦然後有父子謂咸上復乾成遁乾為父艮為子故有父子有父子然後有君臣謂遁三復坤成否乾為君坤為臣故有君臣也有君臣然後有上下否乾君尊上坤臣卑下天尊地卑故有上下也有上下然後禮義有所錯錯置也謂天君父夫象尊錯上地婦臣子禮卑錯下坤地道妻道臣道故禮義有所錯者也此上虞義干寶曰錯施也此詳言人道三綱六紀有自來也人有男女隂陽之性則自然有夫婦配合之道有夫婦配合之道則自然有剛柔尊卑之義隂陽化生血體相傳則自然有父子之親以父立君以子資臣則必有君臣之位有君臣之位故有上下之敘有上下之序則必禮以定其體義以制其宜明先王制作蓋取之於情者也上經始於乾坤有生之本也下經始於咸恆人道之首也易之興也當殷之末世有妲己之禍當周之盛德有三母之功以言天不地不生夫不婦不成相須之至王教之端故詩以關雎為國風之始而易於咸恆備論禮義所由生也夫婦之道不可以不久也故受之以恆恆者久也鄭玄曰言夫婦當有終身之義夫婦之道謂咸恆也物不可以久居其所故受之以遁遁者退也韓康伯曰夫婦之道以恆為貴而物之所居不可以不恆宜與時升降有時而遁者也物不可以終遁故受之以大壯韓康伯曰遁君也以逺小人遁而後通何可終耶陽盛隂消君子道勝也物不可以終壯故受之以晉晉者進也崔憬曰不可以終壯於陽盛自取觸藩宜柔進而上行受茲錫馬進必有所傷故受之以明夷夷者傷也九家易曰日在坤下其明傷也言晉極當降復入于地故曰明夷也傷於外者必反於家故受之以家人虞翻曰晉時在外家人在內故反家人韓康伯曰傷於外者必反諸內矣家道窮必乖故受之以暌暌者乖也韓康伯曰室家至親過在失節故家人之義唯嚴與敬樂勝則流禮勝則離家人尚嚴其弊必乖者也乖必有難故受之以蹇蹇者難也崔憬曰二女同居其志乖而難生故曰乖必有難也物不可以終難故受之以解解者緩也崔憬曰蹇終則來碩吉利見大人故言不可終難故受之以解者也緩必有所失故受之以損崔憬曰宥罪緩死失之則僥幸有損於政刑故言緩必有所失受之以損損而不已必益故受之以益崔憬曰損終則弗損益之故言損而不已必益益而不已必決故受之以夬夬者決也韓康伯曰益而不已則盈故必決也決必有所遇故受之以姤姤者遇也韓康伯曰以正決邪必有喜遇物相遇而後聚故受之以萃萃者聚也崔憬曰天地相遇品物咸章故言物相遇而後聚也聚而上者謂之升故受之以升崔憬曰用大牲而致孝享故順天命而升為王矣故言聚而上者謂之升升而不已必困故受之以困崔憬曰冥升在上以消不富則窮故言升而不已必困也困乎上者必反下故受之以井崔憬曰困及于臲卼則反下以求安故言困乎上必反下井道不可不革故受之以革韓康伯曰井久則濁穢宜革易其故革物者莫若鼎故受之以鼎韓康伯曰革去故鼎取新既以去故則宜制器立法以治新也鼎所以和齊生物成新之器也故取象焉主器者莫若長子故受之以震震者動也崔憬曰鼎所烹飪享於上帝主此器者莫若冢嫡以為其祭主也故言主器者莫若長子物不可以終動止之故受之以艮艮者止也崔憬曰震極則征凶婚媾有言當須止之故言物不可以終動故止之也物不可以終止故受之以漸漸者進也虞翻曰否三進之四巽為進也進必有所歸故受之以歸妹虞翻曰震嫁兑兑為妹嫁歸也得其所歸者必大故受之以豐豐者大也崔憬曰歸妹者姪娣媵國三人九女為大援故言得其所歸者必大也窮大者必失其居故受之以旅崔憬曰諺云作者不居况窮大甚而能處乎故必獲罪去邦羈旅於外也旅而無所容故受之以巽巽者入也韓康伯曰旅而無所容以巽則得所入也入而後説之故受之以兑兑者説也虞翻曰兑為講習故學而時習之不亦説乎説而後散之故受之以渙渙者離也虞翻曰風以散物故離也物不可以終離故受之以節韓康伯曰夫事有其節則物之所同守而不散越也節而信之故受之以中孚韓康伯曰孚信也既已有節宜信以守之矣有其信者必行之故受之以小過韓康伯曰守其信者則失貞而不諒之道而以信為過也故曰小過有過物者必濟故受之以既濟韓康伯曰行過乎恭禮過乎儉可以矯世勵俗有所濟也物不可窮也故受之以未濟終焉韓康伯曰有為而能濟者以已窮物物窮則乖功極則亂其可濟乎故受之以未濟周易雜卦韓康伯曰雜卦者雜糅衆卦錯綜其義或以同相類或以異相明矣乾剛坤柔虞翻曰乾剛金堅故剛坤隂和順故柔也比樂師憂虞翻曰比五得位建萬國故樂師三失位輿尸故憂臨觀之意或與或求荀爽曰臨者教思無窮故為與觀者觀民設教故為求也屯見而不失其居蒙雜而著虞翻曰隂出初震故見盤桓利居貞故不失其居蒙二陽在隂位故雜初雜為交故著震起也艮止也震陽動行故起艮陽終止故止損益盛衰之始也損泰初益上衰之始損否上益初盛之始大畜時也無妄災也大畜五之復二成臨時捨坤二故時也無妄上之遁初子弒父故災者也萃聚而升不來也坤衆在內故聚升五不來之二故不來之內曰來也謙輕而豫怠也謙位三賤故輕豫薦樂祖考故怡怡或言怠也噬嗑食也賁無色也頤中有物故食賁離日在上五動巽白故無色也兑見而巽伏也兑陽息二故見則見龍在田巽乾初入隂故伏也隨無故也蠱則飾也否上之初君子弗用故無故也蠱泰初上飾坤故則飾也剝爛也復反也剝生於姤陽得隂熟故爛復剛反初晉晝也明夷誅也誅傷也離日在上故晝也明入地中故誅也此上並虞義干寶曰日上中君道明也明君在上罪惡必刑也井通而困相遇也虞翻曰泰初之五為井故通也困三遇四故相遇也咸速也恆久也相感者不行而至故速也日月久照四時久成故久也渙離也節止也渙散故離節制度數故止解緩也蹇難也雷動出物故緩蹇險在前故難睽外也家人內也離女在上故外也家人女正位乎內故內者也否泰反其類也否反成泰泰反成否故反其類終日乾乾反覆之道大壯則止遁則退也大壯止陽陽故止遁隂息陽陽故退巽為退者也大有衆也同人親也五陽並應故衆也夫婦同心故親也革去故也鼎取新也革更故去鼎烹飪故取新也小過過也中孚信也五以隂過陽故過信及遁魚故信也豐多故也親寡旅也豐大故多旅無容故親寡六十四象皆先言卦及道其指至旅體離四焚棄之行又在旅家故獨先言親寡而後言旅此上虞義離上而坎下也韓康伯曰火炎上水潤下也小畜寡也履不處也虞翻曰乾四之坤初成震一陽在下故寡也乾三之坤上成剝剝窮上失位故不處需不進也訟不親也險在前也故不進天水違行故不親也大過顛也顛殞也頂載澤中故顛也姤遇也柔遇剛也坤遇乾也漸女歸待男行也兑為女艮為男反成歸妹巽成兑故女歸待艮成震乃行故待男行也頤養正也謂養三五五之正為功三出坎為聖故曰頤養正與蒙以養聖功同義也既濟定也濟成六爻得位定也歸妹女之終也歸妹人之終始女終於嫁從一而終故女之終也未濟男之窮也否艮為男位否五之二六爻失正而來下隂未濟主月晦乾道消滅故男之窮也夬決也剛決柔也君子道長小人道憂也以乾決坤故剛決柔也乾為君子坤為小人乾息故君子道長坤體消滅故小人道憂諭武王伐紂自大過至此八卦不復兩卦對説大過死象兩體姤決故次以姤而終於夬言君子之決小人故君子道長小人道憂此上虞義干寶曰凡易既分為六十四卦以為上下經天人之事各有始終夫子又為序卦以明其相承受之義然則文王周公所遭遇之運武王成王所先後之政蒼精受命短長之期備於此矣而夫子又重為雜卦以易其次第雜卦之末又改其例不以兩卦反覆相酬者以示來聖後王明道非常道事非常事也化而裁之存乎變是以終之以決言能決斷其中唯陽德之主也故曰易窮則變通則久總而觀之伏羲黃帝皆繫世象賢欲使天下世有常君也而堯舜禪代非黃農之化朱均頑也湯武逆取非唐虞之迹桀紂之不君也伊尹廢立非從順之節使太甲思愆也周公攝政非湯武之典成王幼年也此皆聖賢所遭遇異時者也夏政尚忠忠之弊野故殷自野以教敬敬之弊鬼故周自鬼以教文文弊薄故春秋閲諸三代而損益之顔回問為邦子曰行夏之時乘殷之輅服周之冕弟子問政者數矣而夫子不與言三代損益以非其任也回則備言王者之佐伊尹之人也故夫子及之焉是以聖人之於天下也同不是異不非百世以俟聖人而不惑一以貫之矣周易集解卷十七
