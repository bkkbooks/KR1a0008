body:
  text: 周易集解卷七唐李鼎祚撰序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯韓康伯曰言咸卦之義也咸柔上而剛下感應以相與夫婦之象莫美乎斯人倫之道莫大夫婦故夫子慇懃深述其義以崇人倫之始而不係之離也先儒以乾至離為上經天道也咸至未濟為下經人事也夫易六畫成卦三材必備錯綜天人以効變化豈有天道人事偏於上下哉斯蓋守文而不求義失之遠矣艮下兌上咸亨利貞取女吉虞翻曰咸感也坤三之上成女乾上之三成男乾坤氣交以相與止而説男下女故通利貞取女吉鄭𤣥曰咸感也艮為山兌為澤山氣下澤氣上二氣通而相應以生萬物故曰咸也其於人也嘉㑹禮通和順於義幹事能正三十之男有此三德以下二十之女正而相親説取之則吉也彖曰咸感也柔上而剛下二氣感應以相與蜀才曰此本否卦案六三升上上九降三是柔上而剛下二氣交感以相與也止而説男下女是以亨利貞取女吉也王肅曰山澤以氣通男女以禮感男而下女初婚之所以為禮也通義正取女之所以為吉也天地感而萬物化生荀爽曰乾下感坤故萬物化生於山澤陸績曰天地因山澤孔竅以通其氣化生萬物也聖人感人心而天下和平虞翻曰乾為聖人初四易位成旣濟坎為心為平故聖人感人心而天下和平此保合太和品物流形也觀其所感而天地萬物之情可見矣虞翻曰謂四之初以離日見天坎月見地縣象著明萬物見離故天地萬物之情可見也象曰山上有澤咸崔憬曰山高而降澤下而升山澤通氣咸之象也君子以虛受人虞翻曰君子謂否乾乾為人坤為虚謂坤虚三受上故以虛受人艮山在地下為謙在澤下為虚初六咸其拇象曰咸其拇志在外也虞翻曰拇足大指也艮為指坤為拇故咸其拇失位遠應之四得正故志在外謂四也六四咸其腓凶居吉象曰雖凶居吉順不害也崔憬曰腓脚膊次於拇上二之象也得位居中於五有應若感應相與失艮止之禮故凶居而承比於三順止而隨於當禮故吉也九三咸其股執其隨往吝崔憬曰股䏶而次於腓上三之象也剛而得中雖欲感上以居艮極止而不前二隨於己志在所隨故執其隨下比二也而遂感上則失其正義故往吝窮也象曰咸其股亦不處也志在隨人所執下也虞翻曰巽為股謂二也巽為隨艮為手故稱執三應於上初四已變歴險故往吝巽為處女也男已下女以艮陽入兌隂故不處也凡士與女未用皆稱處矣志在於二故所執下也九四貞吉悔亡憧憧往來朋從爾思虞翻曰失位悔也應初動得正故貞吉而悔亡矣憧憧懷思慮也之内為來之外為往欲感上隔五感初隔三故憧憧往來矣兌為朋少女也艮初變之四坎心為思故曰朋從爾思也象曰貞吉悔亡未感害也虞翻曰坤為害也今未感坤初體遯弑父故曰夫感害也憧憧往來未光大也虞翻曰未動之離故未光大也九五咸其脢无悔虞翻曰脢夾脊肉也謂四已變坎為脊故咸其脢得正故无悔象曰咸其脢志末也案末猶上也四感於初三隨其二五比於上故咸其脢志末者謂五志感於上也上六咸其輔頰舌虞翻曰耳目之間稱輔頰四變為目坎為耳兌為口舌故曰咸其輔頰舌象曰咸其輔頰舌媵口説也虞翻曰媵送也不得之三山澤通氣故媵口説也序卦曰夫婦之道不可不久也故受之以恒恒者久也鄭𤣥曰言夫婦當有終身之義夫婦之道謂咸者也巽下震上恒亨无咎利貞虞翻曰恒久也與益旁通乾初之坤四剛柔皆應故通无咎利貞矣鄭𤣥曰恒久也巽為風震為雷雷風相須而養物猶長女承長男夫婦同心而成家久長之道也夫婦以嘉㑹禮通故无咎其能和順幹事所行而善矣利有攸往虞翻曰初利往之四終變成益則初四二五皆得其正終則有始故利有攸往也彖曰恒久也剛上而柔下王弼曰剛尊柔卑得其序也雷風相與巽而動蜀才曰此本泰卦案六四降初初九升四是剛上而柔下也分乾與坤雷也分坤與乾風也是雷風相與巽而動也剛柔皆應恒九家易曰初四二五雖不正而剛柔皆應故通无咎矣恒亨无咎利貞久於其道也荀爽曰恒震世也巽來乘之隂陽合會故通无咎長男在上長女在下夫婦道正故利貞久於其道也天地之道恒久而不已也虞翻曰泰乾坤為天地謂終則復始有親則可久也利有攸往終則有始也荀爽曰謂乾氣下終始復升上居四也坤氣上終始復降下居初者也日月得天而能久照虞翻曰動初成乾為天至二離為日至三坎為月故日月得天而能久照也四時變化而能久成虞翻曰春夏為變秋冬為化變至二離夏至三兌秋至四震春至五坎冬至故四時變化而能久成謂乾坤成物也聖人久於其道而天下化成虞翻曰聖人謂乾乾為道初二已正四五復位成旣濟定乾道變化各正性命有兩離象重眀麗正故化成天下觀其所恒而天地萬物之情可見矣虞翻曰以離日照乾坎月照坤萬物出震故天地萬物之情可見矣與咸同義也象曰雷風恒宋衷曰雷以動之風以散之二者常相薄而為萬物用故君子象之以立身守節而不易道也君子以立不易方虞翻曰君子謂乾三也乾為易為立坤為方乾初之坤四三正不動故立不易方也初六浚恒貞凶无攸利侯果曰浚深恒久也初本六四自四居初始求深厚之位者也位旣非正求乃涉邪以此為正凶之道也故曰浚恒貞凶无攸利矣象曰浚恒之凶始求深也虞翻曰浚深也初下稱浚故曰浚恒乾初為淵故深矣失位變之正乾為始故曰始求深也九二悔亡虞翻曰失位悔也動而得正處中多譽故悔亡也象曰九二悔亡能久中也荀爽曰乾為久也能久行中和以陽據隂故曰能久中也九三不恒其德或承之羞貞吝荀爽曰與初同象欲據初隔二與五為兌欲悦之隔四意无所定故不恒其德與上相應欲往承之為隂所乘故或承之羞也貞吝者謂正乘其所不與隂通也无居自容故貞吝矣象曰不恒其德无所容也九家易曰言三取初隔二應上見乘是无所容无居自容故貞吝九四田无禽象曰久非其位安得禽也虞翻曰田為二二地上稱田无禽為五也九四失位利也上之五已變承之故曰田无禽言二五皆非其位故象曰久非其位安得禽也六五恒其德貞婦人吉夫子凶虞翻曰動正成乾故恒其德婦人謂初巽為婦終變成益震四復初婦得歸陽從一而終故貞婦人吉也震乾之子而為巽夫故曰夫子終變成益震四從巽死於坤中故夫子凶也象曰婦人貞吉從一而終也虞翻曰一謂初終變成益以巽應初震故從一而終也夫子制義從婦凶也虞翻曰震沒從巽入坤故從婦凶矣上六震恒凶象曰震恒在上大无功也虞翻曰在震上故震恒五動乘陽故凶終在益上五遠應故无功也序卦曰物不可以久居其所故受之以遯韓康伯曰夫婦之道以恒為貴而物之所居不可以恒宜與世升降有時而遯者也艮下乾上遯亨虞翻曰隂消姤二也艮為山巽為入乾為遠遠山入藏故遯以隂消陽子弑其父小人道長避之乃通故遯而通則當位而應與時行之也小利貞虞翻曰小隂謂二得位浸長以柔變剛故小利貞鄭𤣥曰遯逃去之名也艮為門闕乾有健德互體有巽巽為進退君子出門行有進退逃去之象曰五得位而有應是用正道得禮見召聘始任他國當尚謙謙小其和順之道居小官幹小事其進以漸則遠妒忌之害昔陳敬仲奔齊辭􅀸是也彖曰遯亨遯而亨也侯果曰此本乾卦隂長剛殞君子遯避遯則通也剛當位而應與時行也虞翻曰剛謂五而應二艮為時故與時行矣小利貞浸而長也荀爽曰隂稱小浸而長則將消陽故利正居是與五相應也遯之時義大矣哉陸績曰謂陽氣退隂氣將害隨時遯避其義大矣哉宋衷曰太公遯殷四皓遯秦之時也象曰天下有山遯崔憬曰天喻君子山比小人小人浸長若山之侵天君子遯避若天之遠山故言天下有山遯也君子以遠小人不惡而嚴虞翻曰君子謂乾乾為遠為嚴小人謂隂坤為惡為小人故以遠小人不惡而嚴也侯果曰羣小浸盛剛德殞削故君子避之高尚林野但矜嚴於外亦不憎惡於内所謂吾家耄遜於荒也初六遯尾厲勿用有攸徃陸績曰隂氣已至於二而初在其後故曰遯尾也避難當在前而在後故厲往則與災難㑹故勿用有攸往象曰遯尾之厲不往何災也虞翻曰艮為尾也初失位動而得正故遯尾厲之應成坎為災在艮宜靜若不往於四則无災矣六二執之用黃牛之革莫之勝説虞翻曰艮為手稱執否坤為黃牛艮為皮四變之初則坎水濡皮離日乾之故執之用黃牛之革莫无也勝能説解也乾為堅剛巽為繩艮為手持革縛三在坎中故莫之勝説也象曰執用黃牛固志也侯果曰六二離爻離為黃牛體艮履正上應貴主志在輔時不隨物遯獨守中直堅如革束執此之志莫之勝説殷之父師當此爻矣九三係遯有疾厲畜臣妾吉虞翻曰厲危也巽繩為係四變三體坎坎為疾故有疾厲遯隂剥陽三消成坤與上易位坤為臣兌為妾上來之三據坤應兌故畜臣妾吉也象曰係遯之厲有疾憊也王肅曰三上係于二而獲遯故曰係遯病此係執而獲危懼故曰有疾憊也此於六二畜臣妾之象足以畜其臣妾不可施為大事也畜臣妾吉不可大事也虞翻曰三動入坤坤為事故不可大事也荀爽曰大事謂與五同任天下之政潛遯之世但可居家畜養臣妾不可治國之大事九四好遯君子吉小人否虞翻曰否乾為好為君子隂稱小人動之初故君子吉隂在四多懼故小人否得位承五故无凶咎矣象曰君子好遯小人否也侯果曰不處其位而遯於外好遯者也然有應在初情未能棄君子剛斷故能舍之小人係戀必不能矣故君子吉小人凶矣九五嘉遯貞吉虞翻曰乾為嘉剛當位應二故貞吉謂三已變上來之三成坎象曰以正志也象曰嘉遯貞吉以正志也侯果曰時否德剛雖遯中正嘉遯者也故曰貞吉遯而得正則羣小應命所謂紐以紊之剛正羣小之志則殷之髙宗當此爻矣上九肥遯无不利虞翻曰乾盈為肥二不及上故肥遯无不利故象曰无所疑也象曰肥遯无不利无所疑也侯果曰最處外極无應於内心无疑戀超世髙舉果行育德安時无悶遯之肥也故曰肥遯无不利則潁濱巢許當此爻矣序卦曰物不可以終遯故受之以大壯韓康伯曰遯君子以遠小人遯而後通何可終耶陽盛隂消君子道勝也乾下震上大壯利貞虞翻曰陽息泰也壯傷也大謂四失位為隂所乘兌為毁折傷與五易位乃得正故利貞也彖曰大壯大者壯也侯果曰此卦本坤隂柔消弱剛大長壯故曰大壯也剛以動故壯荀爽曰乾剛震動陽從下升陽氣大動故壯也大壯利貞大者正也虞翻曰謂四進之五乃得正故大者正也正大而天地之情可見矣虞翻曰正大謂四之五成需以離日見天坎月見地故天地之情可見也矣象曰雷在天上大壯崔憬曰乾下震上故曰雷在天上一曰雷陽氣也陽至於上卦能助於天威大壯之象也君子以非禮弗履陸績曰天尊雷卑君子見卑乘尊終必消除故象以為戒非禮不履初九壯于趾征凶有孚虞翻曰趾謂四征行也震足為趾為征初得位四不征之五故凶坎為孚謂四上之五成坎已得應四故有孚象曰壯于趾其孚窮也虞翻曰應在乾終故其孚窮也九二貞吉象曰九二貞吉以中也虞翻曰變得位故貞吉動體離故以中也九三小人用壯君子用罔貞厲虞翻曰應在震也三陽君子小人謂上上逆故用壯謂二已變離離為罔三乘二故君子用罔體乾夕惕故貞厲也羝羊觸藩羸其角荀爽曰三與五同功為兌故曰羊終始陽位故曰羝藩謂四也三欲觸四而危之四反羸其角角謂五也象曰小人用壯君子罔也侯果曰藩謂四也九四體震為竹葦故稱藩也三互乾兌乾壯兌羊故曰羝羊四藩未決三宜勿往用壯觸藩求應於上故角被拘羸矣案自三至五體兌為羊四旣是藩五為羊角卽羝羊觸藩羸其角之象也九四貞吉悔亡藩決不羸壯于大輿之腹象曰藩決不羸尚往也虞翻曰失位悔也之正得中故貞吉而悔亡矣體夬象故藩決震四上處五則藩毁壞故藩決不羸坤為大車為腹四之五折坤故壯于大車之腹而象曰尚往者謂上之五六五喪羊于易无悔虞翻曰四動成泰坤為喪也乾為易四上之五兌還屬乾故喪羊於易動各得正而處中和故无悔矣象曰喪羊于易位不當也案謂四五隂陽失正隂陽失正故曰位不當也上六羝羊觸藩不能退不能遂无攸利艱則吉虞翻曰應在三故羝羊觸藩遂進也謂四已之五體坎上能變之巽巽為進退故不能退不能遂退則失位上則乘剛故无攸利坎為艱得位應三利上故艱則吉象曰不能退不能遂不詳也虞翻曰乾善為詳不得三應故不詳也艱則吉咎不長也虞翻曰巽為長動失位為咎不變之巽故咎不長也序卦曰物不可以終壯故受之以晉晉者進也崔憬曰不可以終壯於陽盛自取觸藩當宜柔進而上行受兹錫馬坤下離上晉康侯用錫馬蕃庶晝日三接虞翻曰觀四之五晉進也坤為康康安也初動體屯震為侯故曰康侯震為馬坤為用故用錫馬艮為多坤為衆故繁庶離日在上故晝日三隂在下故三接矣彖曰晉進也眀出地上順而麗乎大眀崔憬曰渾天之義日從地出而升于天故曰眀出地上坤臣道也日君德也臣以功進君以恩接是以順而麗乎大眀雖一卦名晉而五爻為主故言柔進而上行也柔進而上行蜀才曰此本觀卦案九五降四六四進五是柔進是以康侯用錫馬蕃庶荀爽曰隂進居五處用事之位陽中之隂侯之象也隂性安靜故曰康侯馬謂四也五以下羣隂錫四也坤為衆故曰蕃庶矣晝日三接也侯果曰康美也四為諸侯五為天子坤為衆坎為馬天子至眀於上公侯謙順於下美其治物有功故蕃錫車馬一晝三覿也采菽刺幽王侮諸侯詩曰雖無與之路車乘馬大行人職曰諸公三饗三問三勞諸侯三饗再問再勞子男三饗一問一勞卽天子三接諸侯之禮也象曰眀出地上晉君子以自昭眀德鄭𤣥曰地雖生萬物日出於上其功乃著故君子法之而以眀自昭其德虞翻曰君子謂觀乾乾為德坤為自離為眀乾五動已離日自照故以自昭眀德也初六晉如摧如貞吉罔孚裕无咎虞翻曰晉進摧憂愁也應在四故晉如失位故摧如動得位故貞吉應離為罔四坎稱孚坤弱為裕欲四之五成巽初受其命故无咎也象曰晉如摧如獨行正也虞翻曰初動震為行初一稱獨也裕无咎未受命也虞翻曰五未之巽故未受命也六二晉如愁如貞吉虞翻曰坎為應在坎上故愁如得位處中故貞吉也受兹介福于其王母虞翻曰乾為介福艮為手坤為虛故稱受介大也謂五已正中乾為王坤為母故受兹介福于其王母象曰受兹介福以中正也九家易曰五動得正中故二受大福矣大福謂馬與蕃庶之物是也六三衆允悔亡虞翻曰坤為衆允信也土性信故衆允三失正與上易位則悔亡故象曰上行也此則成小過小過故有飛鳥之象焉臼杵之利見鼫鼠出入坎穴蓋取諸此也象曰衆允之志上行也虞翻曰坎為志三之上成震故曰上行也九四晉如鼫鼠貞厲九家易曰鼫鼠喻貪謂四也體離欲升體坎欲降游不度瀆不出坎也飛不上屋不至上也緣不極木不出離也穴不掩身五坤薄也走不先足外震在下也五伎皆劣四爻當之故曰晉如鼫鼠也象曰鼫鼠貞厲位不當也翟𤣥曰鼫鼠晝伏夜行貪猥无已謂雖進承五然潛據下隂久居不正之位故有危厲也六五悔亡矢得勿恤往吉无不利荀爽曰五從坤動而來為離離者射出故曰矢得隂居尊位故有悔也以中盛眀光照四海故悔亡勿恤吉无不利也象曰矢得勿恤往有慶也虞翻曰動之乾乾為慶也矢古誓字誓信也勿无䘏憂也五變得正坎象不見故誓得勿䘏往有慶也上九晉其角虞翻曰五已變之乾為首位在首上稱角故晉其角也維用伐邑厲吉无咎貞吝虞翻曰坤為邑動成震而體師象坎為心故維用伐邑得位乘五故厲吉无咎而貞吝矣象曰維用伐邑道未光也荀爽曰陽雖在上動入㝠逸故道未光也序卦曰進必有所傷故受之以眀夷夷者傷也九家易曰日在坤下其眀傷也言進極當降復入于地故曰眀夷也離下坤上眀夷虞翻曰夷傷也臨二之三而反晉也眀入地中故傷矣利艱貞虞翻曰謂五也五失位變出成坎為艱故利艱貞矣鄭𤣥曰夷傷也日出地上其眀乃光至其入地眀則傷矣故謂之眀夷日之眀傷猶聖人君子有明德而遭亂世抑在下位則宜自艱无幹事政以避小人之害也彖曰眀入地中眀夷蜀才曰此本臨卦也案夷滅也九二升三六三降二眀入地中也眀入地中則眀滅也内文眀而外柔順以蒙大難荀爽曰眀在地下為坤所蔽大難之象大難文王君臣相事故言大難也文王以之虞翻曰以用也三喻文王大難謂坤坤為弑父迷亂荒淫若紂殺比干三幽坎中象文王之拘羑里震為諸侯喻從文王者紂懼出之故以蒙大難得身全矣利艱貞晦其眀也内難而能正其志箕子以之虞翻曰箕子紂諸父故稱内難五乾天位今化為坤箕子之象坤為晦箕子正之出五成坎體離重眀麗正坎為志故正其志箕子以之而紂奴之矣象曰眀入地中眀夷君子以莅衆用晦而眀虞翻曰而如也君子謂三體師象以坎莅坤坤為衆為晦離為眀故用晦如眀也初九眀夷于飛垂其翼君子于行三日不食荀爽曰火性炎上離為飛鳥故曰于飛為坎所抑故曰垂其翼陽為君子三者陽德成也日以喻君不食者不得君禄食也陽未居五隂暗在上初有眀德恥食其禄故曰君子于行三日不食也有攸往主人有言九家易曰四者初應衆隂在上為主人也初欲上居五則衆隂有言言謂震也四五體震為雷聲故曰有攸往主人有言也象曰君子于行義不食也茍爽曰暗昧在上有眀德者義不食禄也六二眀夷于左股用拯馬壯吉九家易曰左股謂初為二所夷也離為飛鳥葢取小過之義鳥飛舒翼而行夷者傷也今初傷垂翼在下故曰眀夷于左股矣九三體坎坎為馬也二應與五三與五同功二以中和應天應天合衆欲升上三以壯於五故曰用拯馬壯吉案初為足二居足上股也二互體坎坎主左方左股之象也象曰六二之吉順以則也九家易曰二欲上三居五為天子坎為法律君有法則衆隂當順從之矣九三眀夷于南狩得其大首不可疾貞九家易曰歲終田獵名曰狩也南者九五大陽之位故稱南也暗昧道終三可升上而獵於五得據大陽首位故曰眀夷于南狩得其大首自暗復眀當以漸次不可卒正故曰不可疾貞也象曰南狩之志乃大得也案冬獵曰狩也三互離坎離南坎北北主於冬故曰南狩五居暗主三處眀終履正順時拯難興衰者也以臣伐君故假言狩旣獲五上之大首而三志乃大得也六四入于左腹獲眀夷之心于出門庭荀爽曰陽稱左謂九三也腹者謂五居坤坤為腹也四得位比三處於順首欲三上居五以陽為腹心也故曰入于左腹獲眀夷之心言三眀當出門庭升五君位干寳曰一為室二為戸三為庭四為門故曰于出門庭矣象曰入于左腹獲心意也九家易曰四欲上三居五為坎坎為心四以坤爻為腹故曰入于左腹獲心意也六五箕子之眀夷利貞馬融曰箕子紂之諸父眀於天道洪範之九疇德可以王故以當五知紂之惡無可奈何同姓恩深不忍棄去被髪佯狂以眀為暗故曰箕子之眀夷卒以全身為武王師名傳無窮故曰利貞矣象曰箕子之貞眀不可息也侯果曰體柔履中内眀外暗羣隂共掩以夷其眀然以正為眀而不可息以爻取象箕子當之故曰箕子之貞眀不可息也上六不眀晦初登于天後入于地虞翻曰應在三離滅坤下故不眀晦晉時在上麗乾故登于天照四國今反在下故後入于地失其則象曰初登于天照四國也後入于地失則也侯果曰最遠于陽故曰不眀晦也初登于天謂眀出地上下照于坤坤為衆國故曰照于四國也喻陽之初興也後入于地謂眀入地中晝變為夜暗晦之甚故曰失則也況紂之亂世也此之二象言晉與眀夷往復不已故見暗則伐取之亂則治取之聖人因象設試也周易集解卷七
