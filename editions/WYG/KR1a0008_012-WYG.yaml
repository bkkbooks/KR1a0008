body:
  text: 周易集解卷十二唐李鼎祚撰序卦曰説而後散之故受之以渙渙者離也崔憬曰人説忘其勞死而後可散之征役離之以家邦故曰説而後散之故受之渙渙者離也坎下巽上渙亨虞翻曰否四之二成坎震天地交故亨也王假有廟虞翻曰乾為王假至也否體觀艮為宗廟乾四之坤二故王假有廟王乃在中也利涉大川利貞虞翻曰坎為大川渙舟檝象故涉大川乘木有功二失正變應五故利居貞也彖曰渙亨剛來而不窮柔得位乎外而上同盧氏曰此本否卦乾之九四來居坤中剛來成坎水流而不窮也坤之六二上升乾四柔得位乎外上承貴王與上同也王假有廟王乃在中也荀爽曰謂陽來居二在坤之中為立廟假大也言受命之王居五大位上體之中上享天帝下立宗廟也利涉大川乘木有功也虞翻曰巽為木坎為水故乘木有功也象曰風行水上渙先王以享于帝立廟虞翻曰謂受命之王收集散民上享天帝下立宗廟也隂上至四承五為享帝陽下至二為立廟也離日上為宗廟而謂天帝宗廟之神所配食者王者所奉故繼於上至於宗廟其實在地地者隂中之陽有似廟中之神虞翻曰否乾為先王享祭也震為帝為祭艮為廟四之二殺坤大牲故以享帝立廟謂成旣濟有噬嗑食象故也初六用拯馬壯吉虞翻曰坎為馬初失正動體大壯得位故拯馬壯吉悔亡之矣象曰初六之吉順也虞翻曰承二故順也九二渙奔其机悔亡虞翻曰震為奔坎為棘為矯輮震為足輮來有足艮肱據之憑机之象也渙宗廟中故設机二二失位變得正故渙奔其机悔亡也象曰渙奔其机得願也虞翻曰動而得位故得願也六三渙其躬无悔荀爽曰體中曰躬謂渙三使承上為志在外故无悔象曰渙其躬志在外也王弼曰渙之為義内險而外安者也散躬志外不固所守與剛合志故得无咎六四渙其羣元吉虞翻曰謂二已變成坤坤三爻稱羣得位順五故元吉也渙有丘匪夷所思虞翻曰位半艮山故稱丘匪非也夷謂震四應在初三變坎為思故匪夷所思也盧氏曰自二居四離其羣侶渙其羣也得位承尊故元吉也互體有艮艮為山丘渙羣雖則光大有丘則非平易故有匪夷之思也象曰渙其羣元吉光大也虞翻曰謂三已變成離故四光大也九五渙汗其大號九家易曰謂五建二為諸侯使下君國故宣布號令百姓被澤若汗之出身不還反也此本否卦體乾為首來下處二成坎水汗之象也陽稱大故曰渙汗其大號也渙王居无咎荀爽曰布其德敎王居其所故无咎矣象曰王居无咎正位也虞翻曰五為王艮為居正位居五四隂順命故王居无咎正位也上九渙其血去逖出无咎虞翻曰應在三坎為血為逖逖憂也二變為觀坎象不見故其血去逖出无咎象曰渙其血遠害也虞翻曰乾為遠坤為害體遯上故遠害也序卦曰物不可以終離故受之以節崔憬曰離散之道不可終行當宜節止之故言物不可以終離受之以節兊下坎上節亨虞翻曰泰三之五天地交也五當位以節中正以通故節亨也苦節不可貞虞翻曰謂上也應在三三變成離火炎上作苦位在火上故苦節雖得位乘陽故不可貞彖曰節亨剛柔分而剛得中盧氏曰此本泰卦分乾九三升坤五分坤六五下處乾三是剛柔分而剛得中也苦節不可貞其道窮也虞翻曰位極於上乘陽故窮也說以行險虞翻曰兌説坎險震為行故説以行險也當位以節中正以通虞翻曰中正謂五坎為通也天地節而四時成虞翻曰泰乾天坤地震春兑秋坎冬三動離為夏故天地節而四時成也節以制度不傷財不害民虞翻曰艮手稱制坤數十為度坤又為害為民為財二動體剥剥為傷三出復位成旣濟定坤剥不見故節以制度不傷財不害民象曰澤上有水節侯果曰澤上有水以堤防為節君子以制數度議德行虞翻曰君子泰乾也艮止為制坤為度震為議為行乾為德故以制數度議德行乾三之五為制數度坤五之乾為議德行也初九不出戸庭无咎虞翻曰泰坤為戸艮為庭震為出初得位應四故不出戸庭无咎矣象曰不出戸庭知通塞也虞翻曰坎為通二變坤土壅初為塞崔憬曰為節之始有應於四四為坎險不通之象以節崇塞雖不通可謂知通塞矣戸庭室庭也愼宻守節故不出焉而无咎也案初九應四四互坎艮艮為門闕四居艮中是為内戸戸庭之象也九二不出門庭凶虞翻曰變而之坤艮為門庭二失位不變出門應五則凶故言不出門庭凶矣象曰不出門庭凶失時極也虞翻曰極中也未變之正失時極矣六三不節若則嗟若无咎虞翻曰三節家君子也失位故節若嗟哀號聲震為音聲為出三動得正而體離坎涕流出目故則嗟若得位乘二故无咎也象曰不節之嗟又誰咎也王弼曰若辭也以隂處陽以柔乘剛違節之道以至哀嗟自己所致无所怨咎故曰又誰咎矣六四安節亨虞翻曰二已變艮止坤安得正承五有應於初故安節亨象曰安節之亨承上道也九家易曰言四得正奉五上通於君故曰承上道也九五甘節吉往有尚虞翻曰得正居中坎為美故甘節吉往謂二二失正變往應五故往有尚也象曰甘節之吉居位中也虞翻曰艮為居五為中故居位中也上六苦節貞凶悔亡虞翻曰二三變在兩離火炎上作苦故苦節乘陽故貞凶得位故悔亡干寳曰彖稱苦節不可貞在此爻也禀險伏之敎懷貪狼之志以苦節之性而遇甘節之主必受其誅華士少正卯之爻也故曰貞凶苦節旣凶甘節志得故曰悔亡象曰苦節貞凶其道窮也荀爽曰乘陽於上无應於下故其道窮也序卦曰節而信之故受之以中孚崔憬曰節以制度不傷財不害民則人信之故言節而信之故受之中孚也兌下巽上中孚虞翻曰訟四之初也坎孚象在中謂二也故稱中孚此當從四陽二隂之例遯隂未及三而大壯陽已至四故從訟來二在訟時體離為鶴在坎隂中故有鳴鶴在隂之義也豚魚吉案坎為豕訟四降初折坎稱豚初隂升四體巽為魚中二孚信也謂二變應五化坤成邦故信及豚魚吉矣虞氏以三至上體遯便以豚魚為遯魚雖生曲象之異見乃失化邦之中信也利涉大川虞翻曰坎為大川謂二已化邦三利出涉坎得正體渙渙舟檝象故利涉大川乘木舟虛也利貞虞翻曰謂二利之正而應五也中孚以利貞乃應於天也彖曰中孚柔在内而剛得中説而巽孚王肅曰三四在内二五得中兌説而巽順故孚也乃化邦也虞翻曰二化應五成坤坤為邦故化邦也豚魚吉信及豚魚也虞翻曰豚魚謂四三也艮為山陸豚所處三為兌澤魚所在豚者卑賤魚者幽隱中信之道皆及之矣利涉大川乘木舟虛也王肅曰中孚之象外實内虛有似可乘虛木之舟也中孚以利貞乃應乎天也虞翻曰訟乾為天二動應乾故乃應乎天也象曰澤上有風中孚崔憬曰流風令於上布澤惠於下中孚之象也君子以議獄緩死虞翻曰君子謂乾也訟坎為獄震為議為緩坤為死乾四之初則二出坎獄兌説震喜坎獄不見故議獄緩死也初九虞吉有它不燕荀爽曰震宴也初應於四宜自安虞无意於四則吉故曰虞吉也四者乘五有它意於四則不安故曰有它不燕也象曰初九虞吉志未變也荀爽曰初位潛藏未得變而應四也九二鳴鶴在隂其子和之我有好爵吾與爾靡之虞翻曰靡共也震為鳴訟離為鶴坎為隂夜鶴知夜半故鳴鶴在隂二動成坤體益互艮為子震巽同聲者相應故其子和之坤為身故稱我吾謂五也離為爵爵位也坤為邦國五在艮閽寺庭闕之象故稱好爵五利二變之正應以故吾與爾靡之矣象曰其子和之中心願也虞翻曰坎為心動得正應五故中心願也六三得敵或鼓或罷或泣或歌荀爽曰三四俱隂故稱得也四得位有位故鼓而歌三失位無實故罷而泣之也象曰或鼓或罷位不當也王弼曰三四俱隂金水巽性敵之謂也以隂居陽自疆而進進而礙敵故或鼔也四履正位非三敵所尅故或罷也不勝而退懼見侵陵故或泣也四履謙巽不報讐敵故或歌也歌泣无恒位不當也六四月幾望馬匹亡无咎虞翻曰訟坎為月離為日兌西震東月在兌二離在震三日月象對故月幾望乾坎兩馬匹初四易位震為奔走體遯山中乾坎不見故馬匹亡初四易位故无咎矣象曰馬匹亡絶類上也虞翻曰訟初之四體與上絶故絶類上也九五有孚攣如无咎虞翻曰孚信也謂二在坎為孚巽繩艮手故攣二使化為邦得正應已故无咎也象曰有孚攣如位正當也案以陽居五有信攣二使變已是位正當也上九翰音登于天貞凶虞翻曰巽為雞應在震震為音翰高也巽為髙乾為天故翰音登于天失位故貞凶禮薦牲雞稱翰音也象曰翰音登于天何可長也侯果曰窮上失位信不由中以此申命有聲無實中實内喪虛華外揚是翰音登天也巽為雞雞曰翰音虛音登天何可久也序卦曰有其信者必行之故受之以小過韓康伯曰守其信者則失貞而不諒之道而以信為過也故曰小過艮下震上小過亨利貞虞翻曰晉上之三當從四隂二陽臨觀之例臨陽未至三而觀四已消也又有飛鳥之象故知從晉來杵臼之利葢取諸此柔得中而應乾剛故亨五失正故利貞過以利貞與時行也可小事虞翻曰小謂五晉坤為事柔得中故可小事也不可大事虞翻曰大事四剛失位而不中故不可大事也飛鳥遺之音不宜上宜下大吉虞翻曰離為飛鳥震為音艮為止晉上之三離去震在鳥飛而音止故飛鳥遺之音上隂乘陽故不宜上下隂順陽故宜下大吉俗説或以卦象二陽在内四隂在外有似飛鳥之象妄矣彖曰小過小者過而亨也過以利貞與時行也荀爽曰隂稱小謂四應初過二而去三應上過五而去五處中見過不見應故曰小者過而亨也柔得中是以小事吉也虞翻曰謂五也隂稱小故小事吉也剛失位而不中是以不可大事也虞翻曰謂四也陽稱大故不可大事也有飛鳥之象焉飛鳥遺之音宋衷曰二陽在内上下各隂有似飛鳥舒翮之象故曰飛鳥震為聲音飛而且鳴鳥去而音止故曰遺之音也不宜上宜下大吉上逆而下順也王肅曰四五失位故曰上逆二三得正故曰下順也象曰山上有雷小過侯果曰山大而雷小山上有雷小過於大故曰小過君子以行過乎恭虞翻曰君子謂三也上貴三賤晉上之三震為行故行過乎恭謂三致恭以順存其位與謙三同義喪過乎哀虞翻曰晉坤為喪離為目艮為鼻坎為涕洟震為出涕洟出鼻目體大過遭死喪過乎哀也用過乎儉虞翻曰坤為財用為吝嗇艮為止兌為小小用止宻雲不雨故用過乎儉也初六飛鳥以凶虞翻曰應四離為飛鳥上之三則四折入大過死故飛鳥以凶象曰飛鳥以凶不可如何也虞翻曰四死大過故不可如何也六二過其祖遇其妣虞翻曰祖謂祖母初也母死稱妣謂三坤為喪為母折入大過死故稱祖也妣二過初故過其祖五變三體姤遇故遇妣也不及其君遇其臣无咎虞翻曰五動為君晉坎為臣二之五隔三艮為止故不及其君止如承三得正體姤遇象故遇其臣无咎也象曰不及其君臣不可過也虞翻曰體大過下止舍巽下故不可過與隨三同義九三弗過防之從或戕之凶虞翻曰防防四也失位從或而欲折之初戕殺也離為戈兵三從離上入坤折四死大過中故從或戕之凶也象曰從或戕之凶如何也虞翻曰三來戕四故凶如何也九四无咎弗過遇之九家易曰以陽居隂行過乎恭今雖失位進則遇五故无咎也四體震動位旣不正當動上居五不復過五故曰弗過遇之矣往厲必戒勿用永貞荀爽曰四往危五戒備於三故曰往厲必戒也勿長居四當動上五故用永貞象曰弗過遇之位不當也往厲必戒終不可長也虞翻曰體否上傾故終不可長矣六五密雲不雨自我西郊虞翻曰密小也晉坎在天為雲墜地成雨上來之三折坎入兑小為密坤為自我兌為西五動乾為郊故密雲不雨自我西郊也公弋取彼在穴虞翻曰公謂三也弋矰繳射也坎為弓彈離為鳥矢弋無矢也巽繩連鳥弋人鳥之象艮為手二為穴手入穴中故公弋取彼在穴也象曰密雲不雨巳上也虞翻曰謂三坎水巳之上六故巳上也上六弗遇過之飛鳥離之凶是謂災眚虞翻曰謂四巳變之坤上得之三故弗遇過之離為飛鳥公弋得之鳥下入艮手而死故飛鳥離之凶晉坎為災眚故是謂災眚矣象曰弗遇過之已亢也虞翻曰飛下稱亢晉上之三故已亢也序卦曰有過物者必濟故受之以旣濟韓康伯曰行過乎恭禮過乎儉可以矯世厲俗有所濟也離下坎上旣濟亨小利貞虞翻曰泰五之二小謂二也柔得中故亨小六爻得位各正性命保合大和故利貞矣初吉虞翻曰初始也謂泰乾乾知大始故稱初坤五之乾二得正處中故初吉柔得中也終亂虞翻曰泰坤稱亂二上之五終止於泰則反成否子弑其父臣弑其君天下无邦終窮成坤故亂其道窮彖曰旣濟亨小者亨也荀爽曰天地旣交陽升隂降故小者亨也利貞剛柔正而位當也侯果曰此本泰卦六五降二九二升五是剛柔正當位也初吉柔得中也虞翻曰中謂二終止則亂其道窮也虞翻曰反否終坤故其道窮也侯果曰剛得正柔得中故初吉也正有終極濟有息止止則窮亂故曰終止則亂其道窮也一曰殷亡周興之卦也成湯應天初吉也商辛毒痡終止也由止故物亂而窮也物不可窮窮則復始周受其未濟而興焉乾鑿度曰旣濟未濟者所以眀戒愼全王道也象曰水在火上旣濟君子以思患而豫防之荀爽曰六爻旣正必當復亂故君子象之思患而豫防之治不忘亂也初九曳其輪濡其尾无咎象曰曳其輪義无咎也宋衷曰離者兩陽一隂隂方陽圓輿輪之象也其一在坎中以火入水必敗故曰曳其輪也初在後稱尾尾濡曳咎也得正有應於義可以危而无咎矣六二婦喪其茀勿逐七日得虞翻曰離為婦泰坤為喪茀髪謂鬒髪也一名婦人之首飾坎為𤣥雲故稱髪詩曰鬒髪如雲乾為首坎為美五取乾二之坤為坎坎為盜故婦喪其髴泰震為七故勿逐七日得與暌喪馬勿逐同義髴或作茀俗説以髴為婦人蔽膝之茀非也象曰七日得以中道也王肅曰體柔應五履順承剛婦人之義也茀首飾坎為盜離為婦喪其茀鄰於盜也勿逐自得履中道也二五相應故七日得也九三髙宗伐鬼方三年克之小人勿用虞翻曰髙宗殷王武丁鬼方國名乾為髙宗坤為鬼方乾二之坤五故高宗伐鬼方坤為年位在三故三年坤為小人二上克五故三年克之小人勿用象曰憊也干寳曰高宗殷中興之君鬼北方國也高宗嘗伐鬼方三年而後克之離為戈兵故稱伐坎當北方故稱鬼在旣濟之家而述先代之功以眀周因於殷有所弗革也象曰三年克之憊也侯果曰伐鬼方者興衰除闇之征也上六闇極九三征之三舉方及故曰三年克之興役動衆聖猶疲憊則非小人能為故曰小人勿用虞翻曰坎為勞故憊也六四繻有衣袽終日戒虞翻曰乾為衣故稱繻袽敗衣也乾二之五衣象裂壞故繻有衣袽離為日坎為盜在兩坎間故終日戒謂伐鬼方三年乃克旅人勤勞衣服皆敗鬼方之民猶或宼竊故終日戒也象曰終日戒有所疑也盧氏曰繻者布帛端末之織也袽者殘幣帛可拂拭器物也繻有為衣袽之道也四處明闇之際貴賤无恒猶或為衣或為袽也履多懼之地上承帝主故終日戒愼有所疑懼也九五東鄰殺牛不如西鄰之禴祭實受其福虞翻曰泰震為東兌為西坤為牛震動五殺坤故東鄰殺牛在坎多眚為隂所乘故不如西鄰之禴祭禴夏祭也離為夏兌動二體離眀得正承五順三故實受其福吉大來也象曰東鄰殺牛不如西鄰之時也崔憬曰居中當位於旣濟之時則當是周受命之日也五坎為月月出西方西鄰之謂也二應在離離為日日出東方東鄰之謂也離又為牛坎水克離火東鄰殺牛之象禴殷春祭之名案尚書克殷之歲厥四月哉生眀王來自商至于豐丁未祀于周廟四月殷之三月春也則眀西鄰之禴祭得其時而受祉福也實受其福吉大來也盧氏曰眀鬼享德不享味也故德厚者吉大來也上六濡其首厲虞翻曰乾為首五從二上在坎中故濡其首厲位極承陽故何可久象曰濡其首厲何可久也荀爽曰居上濡五處高居盛必當復危故何久也序卦曰物不可窮也故受之以未濟終焉崔憬曰夫易之為道窮則變變則通而以未濟終者亦物不可窮也坎下離上未濟亨虞翻曰否二之五也柔得中天地交故亨濟成也六爻皆錯故稱未濟也小狐汔濟虞翻曰否艮為小狐汔幾也濟濟渡狐濟幾度而濡其尾未出中也濡其尾无攸利虞翻曰艮為尾狐獸之長尾者也尾謂二在坎水中故濡其尾失位故无攸利不續終也干寳曰坎為狐説文曰汔涸也案剛柔失正故未濟也五居中應剛故亨也小狐力弱汔乃可濟水旣未涸而乃濟之故尾濡而无所利也彖曰未濟亨柔得中也荀爽曰柔上居五與陽合同故亨也小狐汔濟未出中也虞翻曰謂二未變在坎中也干寳曰狐野獸之妖者以喻禄父中謂二也困而猶處中故也此以記紂雖亡國禄父猶得封矣濡其尾无攸利不續終也虞翻曰否隂消陽至剥終坤終止則亂其道窮也乾五之二坤殺不行故不續終也干寳曰言禄父不能敬奉天命以續旣終之禮謂叛而被誅也雖不當位剛柔應也荀爽曰雖剛柔相應而不以正由未能濟也干寳曰六爻皆相應故微子更得為客也象曰火在水上未濟侯果曰火性炎上水性潤下雖復同體功不相成所以未濟也故君子愼辯物宜居之以道令其功用相得則物咸濟矣君子以慎辯物居方虞翻曰君子否乾也艮為慎辨辯别也物謂乾陽物也坤隂也艮為居坤為方乾别五以居坤二故以愼辯物居方也初六濡其尾吝虞翻曰應在四故濡其尾失位故吝象曰濡其尾亦不知極也案四在五後故稱尾極中也謂四居坎中以濡其尾是不知極也九二曳其輪貞吉姚信曰坎為曳為輪兩隂夾陽輪之象也二應於五而隔於四止而據初故曳其輪處中而行故曰貞吉干寳曰坎為輪離為牛牛曳輪上以承五命猶東蕃之諸侯共攻三監以康周道故曰貞吉也象曰九二貞吉中以行正也虞翻曰謂初已正二動成震故行正六三未濟征凶利涉大川荀爽曰未濟者未成也女在外男在内婚姻未成征上從四則凶利下從坎故利涉大川矣象曰未濟征凶位不當也干寳曰吉凶者言乎其失得也禄父反叛管蔡與亂兵連三年誅及骨肉故曰未濟征凶平剋四國以濟大難故曰利涉大川坎也以六居三不當其位猶周公以臣而君故流言作矣九四貞吉悔亡虞翻曰動正得位故吉而悔亡矣震用伐鬼方三年有賞于大國虞翻曰變之震體師坤為鬼方故震用伐鬼方坤為年為大邦陽稱賞四在坤中體旣濟離三故三年有賞于大國象曰貞吉悔亡志行也案坎為志震為行四坎變震故志行也六五貞吉无悔虞翻曰之正則吉故貞吉无悔君子之光有孚吉虞翻曰動之乾離為光故君子之光也孚謂二二變應已得有之故有孚吉坎稱孚也干寳曰以六居五周公攝政之象也故曰貞吉无悔制禮作樂復子明辟天下乃眀其道乃信其誠故君子之光有孚吉矣象曰君子之光其暉吉也虞翻曰動之正乾為大眀故其暉吉也上九有孚于飲酒无咎濡其首有孚失是虞翻曰坎為孚謂四也上之三介四故有孚飲酒流頤中故有孚于飲酒終變之正故无咎乾為首五動首在酒中失位故濡其首矣孚信是正也六位失政故有孚失是謂若殷紂沈湎于酒以失天下也象曰飲酒濡首亦不知節也虞翻曰節止也艮為節飲酒濡首故不知節矣周易集解卷十二
