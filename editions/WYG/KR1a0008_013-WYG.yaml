body:
  text: 周昜集解卷十三唐李鼎祚撰天尊地卑乾坤定矣虞翻曰天貴故尊地賤故卑定謂成列荀爽曰謂否卦也否七月萬物已成乾坤各得其位定矣卑高以陳貴賤位矣虞翻曰乾髙貴五坤卑賤二列貴賤者存乎位也荀爽曰謂泰卦也侯果曰天地卑高義既陳矣萬物貴賤位宜差矣動靜有常剛柔斷矣虞翻曰斷分也乾剛常動坤柔常靜分隂分陽迭用柔剛方以類聚九家易曰謂姤卦陽爻聚於午也方道也謂陽道施生萬物各聚其所也物以羣分九家易曰謂復卦隂爻羣於子也隂主成物故曰物也至於萬物一成分散天下也以周人用故曰物以羣分也吉凶生矣虞翻曰物三稱羣坤方道靜故以類聚乾物動行故以羣分乾生故吉坤殺故凶則吉凶生矣在天成象在地成形變化見矣虞翻曰謂日月在天成八卦震象出庚兑象見丁乾象盈甲巽象伏辛艮象消丙坤象喪乙坎象流戊離象就已故在天成象也在地成形震為竹巽木坎水離火艮山兑澤乾金坤土在天為變在地為化剛柔相推而生變化矣是故剛柔相摩八卦相盪虞翻曰旋轉稱摩薄也乾以二五摩坤成震坎艮坤以二五摩乾成巽離兑故剛柔相摩則八卦相盪也鼓之以雷霆潤之以風雨虞翻曰鼓動潤澤也雷震霆艮風巽雨兑也日月運行一寒一暑虞翻曰日離月坎寒乾暑坤也運行往來日月相推而明生焉寒暑相推而嵗成焉故一寒一暑也乾道成男坤道成女荀爽曰男謂乾初適坤為震二適坤為坎三適坤為艮以成三男也女謂坤初適乾為巽二適乾為離三適乾為兑以成三女也乾知大始九家易曰始為乾禀元氣萬物資始也坤作成物荀爽曰物謂坤任育體萬物資生乾以易知坤以簡能虞翻曰陽見稱易隂藏為簡簡閲也乾息昭物天下文明故以易知坤閲藏物故以簡能矣易則易知簡則易從虞翻曰乾懸象著明故易知坤隂陽動闢故易從不習无不利地道光也易知則有親易從則有功虞翻曰陽道成乾為父震坎艮為子本乎天者親上故易知則有親以陽從隂至五多功故易從則有功矣蜀才曰以其易知故物親而附之以其易從故物法而有功也有親則可久有功則可大荀爽曰隂陽相親雜而不厭故可久也萬物生息種類繁滋故可大也可久則賢人之徳可大則賢人之業姚信曰賢人乾坤也言乾以日新為徳坤以富有為業也易簡而天下之理得矣虞翻曰易為乾息簡為坤消乾坤變通窮理以盡性故天下之理得矣天下之理得而成位乎其中矣荀爽曰陽位成於五隂位成於二五為上中二為下中故曰成位乎其中也聖人設卦案聖人謂伏羲也始作八卦重為六十四卦矣觀象繫辭焉案文王觀六十四卦三百八十四爻之象系屬其辭而明吉凶荀爽曰因得明吉因失明凶也剛柔相推而生變化虞翻曰剛推柔生變柔推剛生化也是故吉凶者失得之象也虞翻曰吉則象得凶則象失也悔吝者憂虞之象也荀爽曰憂虞小疵故悔吝也虞翻曰悔則象憂吝則象虞也干寶曰悔亡則虞有小吝則憂憂虞未至於失得悔吝不入於吉凶事有小大故辭有急緩各象其意也變化者進退之象也荀爽曰春夏為變秋冬為化息卦為進消卦為退也剛柔者晝夜之象也荀爽曰剛謂乾柔謂坤乾為晝坤為夜晝以喻君夜以喻臣也六爻之動陸績曰天有隂陽二氣地有剛柔二性人有仁義二行六爻之動法乎此也三極之道也陸績曰此三才極至之道也初四下極二五中極三上上極也是故君子所居而安者易之象也虞翻曰君子謂文王象謂乾二之坤成坎月離日日月為象君子黄中通理正位居體故居而安者易之象也舊讀象誤作厚或作序非也所變而玩者爻之辭也虞翻曰爻者言乎變者也謂乾五之坤坤五動則觀其變舊作樂字誤是故君子居則觀其象而玩其辭虞翻曰玩弄也謂乾五動成大有以離之目觀天之象兑口玩習所繫之辭故玩其辭動則觀其變而玩其占虞翻曰謂觀爻動也以動者尚其變占事知來故玩其占是以自天祐之吉无不利虞翻曰謂乾五變之坤成大有有天地日月之象文王則庖犧亦與天地合徳日月合明天道助順人道助信履信思順故自天祐之吉无不利也彖者言乎象者也虞翻曰在天成象八卦以象告彖説三才故言乎象也爻者言乎變者也虞翻曰爻有六畫所變而玩者爻之辭也謂九六變化故言乎變者也吉凶者言乎其失得也虞翻曰得正言吉失位言凶也悔吝者言乎其小疵也崔憬曰繫辭著悔吝之言則異凶咎有其小病比於凶咎若疾病之與小疵无咎者善補過也虞翻曰失位為咎悔變而之正故善補過孔子曰退思補過者也是故列貴賤者存乎位侯果曰二五為功譽位三四為凶懼位凡爻得位則貴失位則賤故曰列貴賤者存乎位矣齊大小者存乎卦王肅曰齊猶正也陽卦大隂卦小卦列則小大分故曰齊小大者存乎卦也辯吉凶者存乎辭韓康伯曰辭爻辭也即爻者言乎變也言象所以明小大言變所以明吉凶故大小之義存乎卦吉凶之狀存乎爻至於悔吝无咎其例一也吉凶悔吝小疵无咎皆生乎變事有小大故下厯言五者之差也憂悔吝者存乎介虞翻曰介纖也介如石焉斷可識也故存乎介謂識小疵震无咎者存乎悔虞翻曰震動也有不善未嘗不知之知之未嘗復行无咎者善補過故存乎悔也是故卦有小大辭有險易辭也者各指其所之虞翻曰陽易指天隂險指地聖人之情見乎辭故指所之易與天地準故能彌綸天地之道虞翻曰準同也彌大綸絡謂易在天下包絡萬物以言乎天地之間則備矣故與天地準也仰以觀於天文俯則察於地理荀爽曰謂隂升之陽則成天之文也陽降之隂則成地之理也是故知幽明之故荀爽曰幽謂天上地下不可得覩者也謂否卦變成未濟也明謂天地之間萬物陳列著於耳目者謂泰卦變成既濟也原始反終故知死生之説九家易曰隂陽交合物之始也隂陽分離物之終也合則生離則死故原始反終故知死生之説矣交泰時春也分離否時秋也精氣為物逰䰟為變虞翻曰䰟陽物謂乾神也變謂坤鬼乾純粹精故主為物乾流坤體變成萬物故逰䰟為變也是故知鬼神之情狀與天地相似故不違虞翻曰乾神似天坤鬼似地聖人與天地合徳鬼神合吉凶故不違鄭𤣥曰精氣謂七八也逰䰟謂九六也七八木火之數也九六金水之數木火用事而物生故曰精氣為物金水用事而物變故曰逰䰟為變精氣謂之神逰䰟謂之鬼木火生物金水終物二物變化其情與天地相似故無所差違之也知周乎萬物荀爽曰二篇之策萬有一千五百二十當萬物之數故曰知周乎萬物也而道濟天下故不過九家易曰言乾坤道濟成天下而不過也王凱沖曰智周道濟洪纖不遺亦不過差也旁行而不流九家易曰旁行周合六十四卦月主五卦爻主一日嵗既周而復始也侯果曰應變旁行周被萬物而不流淫也樂天知命故不憂荀爽曰坤建於亥乾立於已隂陽孤絶其法宜憂坤下有伏乾為樂天乾下有伏巽為知命隂陽合居故不憂安土敦乎仁故能愛荀爽曰安土謂否卦乾坤相據故安上敦仁謂泰卦天氣下降以生萬物故敦仁生息萬物故謂之愛也範圍天地之化而不過九家易曰範者法也圍者周也言乾坤消息法周天地而不過於十二辰也辰日月所會之宿謂諏訾降婁大梁實沈鶉首鶉火鶉尾夀星大火柅木星紀𤣥枵之屬是也曲成萬物而不遺荀爽曰謂二篇之策曲成萬物无遺失也侯果曰言隂陽二氣委曲成物不遺微細也通乎晝夜之道而知荀爽曰晝者謂乾夜者坤也通於乾坤之道無所不知矣故神无方而易无體干寶曰否泰盈虚者神也變而周流者易也言神之鼓萬物無常方易之應變化無定體也一隂一陽之謂道韓康伯曰道者何无之稱也无不通也无不由也况之曰道寂然无體不可為象必有之用極而无之功顯故至乎神无方而易无體而道可見矣故窮以盡神因神以明道隂陽雖殊無一以待之在隂為無隂隂以之生在陽為無陽陽以之成故曰一隂一陽也繼之者善也成之者性也虞翻曰繼統也謂乾能統天生物坤合乾性養化成之故繼之者善成之者性也仁者見之謂之仁知者見之謂之知侯果曰仁者見道謂道有仁知者見道謂道有知也百姓日用而不知侯果曰用道以濟然不知其方故君子之道鮮矣韓康伯曰君子體道以為用仁知則滯於所見百姓日用而不知體斯道者不亦鮮矣乎故常無欲以觀妙可以語至而言極矣顯諸仁藏諸用王凱沖曰萬物皆成仁功著也不見所為藏諸用也鼓萬物而不與聖人同憂侯果曰聖人成務不能無心故有憂神道鼓物寂然無情故無憂也盛徳大業至矣哉荀爽曰盛徳者天大業者地也富有之謂大業日新之謂盛徳王凱沖曰物無不備故曰富有變化不息故曰日新生生之謂易荀爽曰隂陽相易轉相生也成象之謂乾案道生一一生二二生三三才既備以成乾象也效法之謂坤案爻猶效也效乾三天之法而兩地成坤之象卦也極數知來之謂占孔頴達曰謂窮極蓍策之數逆知將來之事占其吉凶也通變之謂事虞翻曰事謂變通趨時以盡利天下之民謂之事業也隂陽不測之謂神韓康伯曰神也者變化之極妙萬物而為言不可以形詰者也故隂陽不測嘗試論之曰原夫兩儀之運萬物之動豈有使之然哉莫不獨化於太虚歘爾而自造矣造之非我理自𤣥應化之無主數自冥運故不知所以然而况之神矣是以明兩儀以太極為始言變化而稱乎神也夫唯天之所為者窮理體化坐忘遺照至虚而善應則以道為稱不思𤣥覽則以神為名盖資道而同乎道由神而冥於神者也夫易廣矣大矣虞翻曰乾象動直故大坤形動闢故廣也以言乎逺則不禦虞翻曰禦止也逺謂乾天髙不禦也以言乎邇則靜而正虞翻曰地謂坤坤至靜而徳方故正也以言乎天地之間則備矣虞翻曰謂易廣大悉備有天地人道焉故稱備也夫乾其靜也専其動也直是以大生焉宋衷曰乾靜不用事則清靜専一含養萬物矣動而用事則直道而行導出萬物矣一専一直動靜有時而物無夭瘁是以大生焉夫坤其靜也翕其動也闢是以廣生焉宋衷曰翕猶閉也坤靜不用事閉藏微伏應育萬物矣動而用事則開闢羣蟄敬導沈滯矣一翕一闢動靜不失時而物無災害是以廣生也廣大配天地荀爽曰隂廣陽大配天地變通配四時虞翻曰變通趨時謂十二月消息也泰大壯夬配春乾姤遯配夏否觀剥配秋坤復臨配冬謂十二月消息相變通而周於四時也隂陽之義配日月荀爽曰謂乾舍於離配日而居坤舍於坎配月而居之義是也易簡之善配至徳荀爽曰乾徳至健坤徳至順乾坤簡易相配於天地故易簡之善配至徳子曰易其至矣乎崔憬曰夫言子曰皆是語之别端此更美易之至極也夫易聖人所以崇徳而廣業也虞翻曰崇徳效乾廣業法坤也知崇禮卑崇效天卑法地虞翻曰知謂乾效天崇禮謂坤法地卑也天地設位而易行乎其中矣虞翻曰位謂六畫之位乾坤各三爻故天地設位易出乾入坤上下無常周流六虚故易行乎其中也成性存存道義之門虞翻曰知終終之可與存義也乾為道門坤為義門成性謂成之者性也陽在道門隂在義門其易之門耶聖人有以見天下之賾而擬諸其形容虞翻曰乾稱聖人謂庖犧也賾謂初自上議下稱擬形容謂隂在地成形者也象其物宜是故謂之象虞翻曰物宜謂陽逺取諸物在天成象故象其物宜象謂三才八卦在天也庖犧重為六畫也聖人有以見天下之動虞翻曰重言聖人謂文王也動謂六爻矣而觀其會通荀爽曰謂三百八十四爻隂陽動移各有所會各有所通張璠曰會者隂陽合會若蒙九二也通者乾坤交通既濟是也以行其典禮繫辭焉以斷其吉凶孔頴達曰既觀其會通而行其典禮以定一爻之通變而有三百八十四於此爻下繫屬文辭以斷其吉凶若會通典禮得則為吉也若會通典禮失則為凶矣是故謂之爻孔頴達曰謂此會通之事而為爻也爻者效也效諸物之變通故上章云爻者言乎變也言天下之至賾而不可惡也虞翻曰至賾无情隂陽會通品物流宕以乾易坤簡之至也元善之長故不可惡也言天下之至動而不可亂也虞翻曰以陽動隂萬物以生故不可亂六二之動直以方動舊誤作賾也擬之而後言議之而後動虞翻曰以陽擬坤而成震震為言議為後動故擬之而後言議之而後動安其身而後動謂當時也矣擬議以成其變化虞翻曰議天成變擬地成化天施地生其益無方也鳴鶴在隂其子和之我有好爵吾與爾縻之孔頴達曰上略明擬議而動故引鳴鶴在隂取同類相應以證之此中孚九二爻辭也子曰君子居其室出其言善虞翻曰君子謂初也二變五來應之艮為居初在艮内故居其室震為出言訟乾為善故出言善此亦成益卦也則千里之外應之况其邇者乎虞翻曰謂二變則五來應之體益卦坤數十震為百里十之千里也外謂震巽同聲同聲者相應故千里之外應之邇謂坤坤為順二變順初故况其邇者乎此信及豚魚者也居其室出其言不善虞翻曰謂初陽動入隂成坤坤為不善也則千里之外違之况其邇者乎虞翻曰謂初變體剥弑父弑君二陽肥遯則坤違之而承於五故千里之外違之况其邇者乎言出乎身加乎民虞翻曰震為出為言坤為身為民也行𤼵乎邇見乎逺虞翻曰震為行坤為邇乾為逺兑為見謂二𤼵應五則千里之外故行𤼵邇見逺也言行君子之樞機樞機之𤼵榮辱之主也荀爽曰艮為門故曰樞震為動故曰機也翟𤣥曰樞主開閉機主𤼵動開閉有明暗𤼵動有中否主於榮辱也言行君子之所以動天地也可不慎乎虞翻曰二已變成益巽四以風動天震初以雷動地中孚十一月雷動地中艮為慎故可不慎乎同人先號咷而後笑侯果曰同人九五爻辭也言九五與六二初未好合故先號咷而後得同心故笑也引者喻擬議於事未有不應也子曰君子之道或出或處或黙或語虞翻曰乾為道故稱君子也同人反師震為出為語坤為黙巽為處故或出或處或黙或語也二人同心其利斷金虞翻曰二人謂夫婦師震為夫巽為婦坎為心巽為同六二震巽俱體師坎故二人同心巽為利乾為金以離斷金故其利斷金謂夫出婦處婦黙夫語故同心也同心之言其臭如蘭虞翻曰臭氣也蘭香草震為言巽為蘭離日燥之故其臭如蘭也案六三互巽巽為臭也斷金之言良藥苦口故香若蘭矣初六藉用白茅无咎孔頴達曰欲求外物來應必須擬議謹慎則物來應之故引大過初六藉用白茅无咎之事以證謹慎之理也子曰茍錯諸地而可矣虞翻曰茍或錯置也頤坤為地故茍錯諸地其初難知隂又失正故獨舉初六藉之用茅何咎之有慎之至也虞翻曰頤為坤為震故錯諸地今藉以茅故无咎也夫茅之為物薄虞翻曰隂道柔賤故薄也而用可重也虞翻曰香絜可貴故可重也慎斯術也以往其無所失矣侯果曰言初六柔而在下茍能恭慎誠絜雖置羞於地神亦享矣此章明但能重慎卑退則悔吝無從而生術道者也勞謙君子有終吉孔頴達曰欲求外物之應非唯謹慎又須謙以下人故引謙卦九三爻辭以證之矣子曰勞而不伐有功而不徳厚之至也虞翻曰坎為勞五多功乾為徳徳言至以上之貴下居三賤故勞而不伐有功而不徳艮為厚坤為至故厚之至也語以其功下人者也虞翻曰震為語五多功下居三故以其功下人者也徳言盛禮言恭虞翻曰謙旁通履乾為盛徳坤為禮天道虧盈而益謙三從上來同之盛徳故恭震為言故徳言盛禮言恭謙也者致恭以存其位者也虞翻曰坎為勞故能恭三得位故以存其位者也亢龍有悔孔頴達曰上既以謙得保安此明無謙則有悔故引乾之上九亢龍有悔證驕亢不謙之義也子曰貴而无位虞翻曰天尊故貴以陽居隂故无位髙而无民虞翻曰在上故髙无隂故无民也賢人在下位虞翻曰乾稱賢人下位謂初也遯世無悶故賢人在下位而不憂也而无輔是以動而有悔也虞翻曰謂上无民故无輔乾盈動傾故有悔文王居三紂亢極上故以為誡也不出户庭无咎孔頴達曰又明擬議之道非但謙而不驕又當謹慎周密故引節初周密之事以明之也子曰亂之所生也則言語以為階虞翻曰節本泰卦坤為亂震為生為言語坤稱階故亂之所生則言語為之階也君不密則失臣臣不密則失身虞翻曰泰乾為君坤為臣為閉故稱密乾三之坤五君臣毁賊故君不密則失臣坤五之乾三坤體毁壊故臣不密則失身坤為身也㡬事不密則害成虞翻曰㡬初也謂二已變成坤坤為事故㡬事不密初利居貞不密初動則體剥子弑其父臣弑其君故害成是以君子慎密而不出也虞翻曰君子謂初二動坤為密故君子慎密體屯盤桓利居貞故不出也子曰作易者其知盜乎虞翻曰為易者謂文王否上之二成困三暴慢以隂乗陽二變入宫為萃五之二奪之成解坎為盜故為易者其知盜乎易曰負且乗致宼至孔頴達曰此又明擬議之道當量身而行不可以小處大以賤貪貴故引解六三爻辭以明之矣負也者小人之事也虞翻曰隂稱小人坤為事以賤倍貴違禮悖義故小人之事也乗也者君子之器也虞翻曰君子謂五器坤也坤為大車故乗君子之器也小人而乗君子之器盜思奪之矣虞翻曰小人謂三既違禮倍五復乗其車五來之二成坎坎為盜思奪之矣為易者知盜乎此之謂也上慢下暴盜思伐之矣虞翻曰三倍五上慢乾君而乗其器下暴於二二藏於坤五來宼二以離戈兵故稱伐之坎為暴也慢藏誨盜冶容誨淫虞翻曰坎心為誨坤為藏兑為見藏不見故慢藏三動成乾為冶坎水為淫三變藏坤則五來奪之故慢藏誨盜冶容誨淫易曰負且乗致宼至盜之招也虞翻曰五來奪三以離兵伐之故變宼言戎以成二惡二藏坤時艮手招盜故盜之招周易集解卷十三
