body:
  text: 周昜集解卷十五唐李鼎祚撰八卦成列象在其中矣虞翻曰象謂三才成八卦之象乾坤列東艮兑列南震巽列西坎離在中故八卦成列則象在其中天垂象見吉凶聖人象之是也因而重之爻在其中矣虞翻曰謂參重三才為六爻𤼵揮剛柔則爻在其中六畫稱爻六爻之動三極之道也剛柔相推變在其中矣虞翻曰謂十二消息九六相變剛柔相推而生變化故變在其中矣繫辭焉而命之動在其中矣虞翻曰謂繫彖象九六之辭故動在其中鼓天下之動者存乎辭者也吉凶悔吝者生乎動者也虞翻曰動謂爻也爻者效天下之動者也爻象動内吉凶見外吉凶生而悔吝著故生乎動也剛柔者立本者也虞翻曰乾剛坤柔為六子父母乾天稱父坤地稱母本天親上本地親下故立本者也變通者趣時者也虞翻曰變通配四時故趣時者也吉凶者貞勝者也虞翻曰貞正也勝滅也陽生則吉隂消則凶者也天地之道貞觀者也陸績曰言天地正可以觀瞻為道也日月之道貞明者也荀爽曰離為日日中之時正當離位然後明也月者坎也坎正位衝離衝為十五日月當日衝正值坎位亦大圓明故曰日月之道貞明者也言日月正當其位乃大明也陸績曰言日月正以明照為道矣天下之動貞夫一者也虞翻曰一謂乾元萬物之動各資天一陽氣以生故天下之動貞夫一者也夫乾確然示人易矣虞翻曰陽在初弗用確然无為潛龍時也不易世不成名故示人易者也夫坤隤然示人簡矣虞翻曰隤安簡閲也坤以簡能閲内萬物故示人簡者也爻也者效此者也虞翻曰效法之謂坤謂效三才以為六畫象也者像此者也虞翻曰成象之謂乾謂聖人則天之象分為三材也爻象動乎内吉凶見乎外虞翻曰内初外上也陽象動内則吉見外隂爻動内則凶見外也功業見乎變荀爽曰隂陽相變功業乃成者也聖人之情見乎辭崔憬曰言文王作卦爻之辭所以明聖人之情陳於易象天地之大徳曰生孔頴達曰自此以下欲明聖人同天地之徳廣生萬物之意也言天地之盛徳常生萬物而不有生是其大徳也聖人之大寶曰位崔憬曰言聖人行易之道當須法天地之大徳寶萬乗之天位謂以道濟天下為寶而不有位是其大寶也何以守位曰仁宋衷曰守位當得士大夫公侯有其仁賢兼濟天下何以聚人曰財陸績曰人非財不聚故聖人觀象制器備物盡利以業萬民而聚之也盖取聚人之本矣理財正辭禁民為非曰義荀爽曰尊卑貴賤衣食有差謂之理財名實相應萬事得正為之正辭咸得其宜故謂之義也崔憬曰夫財貨人所貪愛不以義理之則必有敗也言辭人之樞要不以義正之則必有辱也百姓有非不以義禁之則必不改也此三者皆資於義以此行之得其宜也故知仁義與財聖人寶位之所要也古者庖犧之王天下也虞翻曰庖犧太昊氏以木徳王天下位乎乾五五動見離離生木故知火化炮啖犧牲號庖犧氏也仰則觀象於天荀爽曰震巽為雷風離坎為日月也俯則觀法於地九家易曰艮兑為山澤也地有水火五行八卦之形者也觀鳥獸之文荀爽曰乾為馬坤為牛震為龍巽為雞之屬是也陸績曰謂朱鳥白虎蒼龍𤣥武四方二十八宿經緯之文與地之宜九家易曰謂四方四維八卦之位山澤高卑五土之宜也近取諸身荀爽曰乾為首坤為腹震為足巽為股也逺取諸物荀爽曰乾為金玉坤為布釡之類是也於是始作八卦虞翻曰謂庖犧觀鳥獸之文則天八卦效之易有太極是生兩儀兩儀生四象四象生八卦八卦乃四象所生非庖犧之所造也故曰象者像此者也則大人造爻象以象天卦可知也而讀易者咸以為庖犧之時天未有八卦恐失之矣天垂象示吉凶聖人象之則天已有八卦之象以通神明之徳荀爽曰乾坤為天地離坎為日月巽震為雷風艮兑為山澤此皆神明之徳也以類萬物之情九家易曰六十四卦凡有萬一千五百二十策策類一物故曰類萬物之情以此庖犧重為六十四卦明矣作結繩而為網罟以佃以漁盖取諸離虞翻曰離為目巽為繩目之重者唯罟故結繩為罟坤二五之乾成離巽為田坤亦稱田以罟取獸曰畋故取諸離也庖犧氏沒神農氏作虞翻曰沒終作起也神農以火徳繼庖犧王火生土故知土則利民播種號神農氏也斲木為耜揉木為耒耒耨之利以教天下盖取諸益虞翻曰否四之初也巽為木為入艮為手乾為金手持金以入木故斲木為耜耜止所踰因名曰耜艮為小木手以撓之故揉木為耒耒耜耔器也巽為號令乾為天故以教天下坤為田巽為股進退震足動耜艮手持耒進退田中耕之象也益萬物者莫若雷風故法風雷而作耒耜日中為市致天下之民聚天下之貨交易而退各得其所盖取諸噬嗑虞翻曰否五之初也離象正上故稱日中也艮為徑路震為足又為大塗否乾為天坤為民故致天下之民象也坎水艮山羣珍所出聚天下貨之象也震升坎降交易而退各得其所噬嗑食也市井交易飲食之道故取諸此也神農氏沒黄帝堯舜氏作通其變使民不倦虞翻曰變而通之以盡利謂作舟檝服牛乗馬之類故使民不倦也神而化之使民宜之虞翻曰神謂乾乾動之坤化成萬物以利天下坤為民也象其物宜故使民宜之也易窮則變變則通通則久是以自天祐之吉无不利陸績曰隂窮則變為陽陽窮則變為隂天之道也庖犧作網罟教民取禽獸以􅂶民食民衆獸少其道窮則神農教播殖以變之此窮變之大要也窮則變變則通與天終始故可久民得其用故无所不利也黄帝堯舜垂衣裳而天下治盖取諸乾坤九家易曰黄帝以上羽皮革木以禦寒暑至乎黄帝始制衣裳垂示天下衣取象乾居上覆物裳取象坤在下含物也虞翻曰乾為治在上為衣坤下為裳乾坤萬物之緼故以象衣裳乾為明君坤為順臣百官以治萬民以察故天下治盖取諸此也刳木為舟剡木為檝舟檝之利以濟不通致逺以利天下盖取諸渙九家易曰木在水上流行若風舟檝之象也此本否卦九四之二刳除也巽為長為木艮為手乾為金艮手持金故刳木為舟剡木為檝也乾為逺天故濟不通致逺以利天下矣法渙而作舟檝盖取斯義也服牛乗馬引重致逺以利天下盖取諸隨虞翻曰否上之初也否乾為馬為逺坤為牛為重坤初之上為引重乾上之初為致逺艮為背巽為股在馬上故乗馬巽為繩繩束縳物在牛背上故服牛出否之隨引重致逺以利天下故取諸隨重門擊柝以待暴客干寶曰卒暴之客為奸宼也盖取諸豫九家易曰下有艮象從外示之震復為艮兩艮對合重門之象也柝者兩木相擊以行夜也艮為手為小木為上持震為足又為木為行坤為夜即手持柝木夜行擊門之象也坎為盜暴水暴長无常故以待暴客既有不虞之備故盖取諸豫也斷木為杵掘地為臼臼杵之利萬民以濟盖取諸小過虞翻曰晉上之三也艮為小木上來之三斷艮故斷木為杵坤為地艮手持木以掘坤三故掘地為臼艮止於下臼之象也震動而上杵之象也震出巽入艮手持杵出入臼中舂之象也故取諸小過本无乾象故不言以利天下也弦木為弧剡木為矢弧矢之利以威天下盖取諸睽虞翻曰无妄五之二也巽為繩為木坎為弧離為矢故弦木為弧艮為小木五之二以金剡艮故剡木為矢乾為威五之二故以威天下弓𤼵矢應而坎雨集故取諸睽也上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨盖取諸大壯虞翻曰无妄兩象易也无妄乾在上故稱上古艮為穴居乾為野巽為處无妄乾人在路故穴居野處震為後世乾為聖人後世聖人謂黃帝也艮為宫室變成大壯乾人入宫故易以宫室艮為待巽為風兑為雨乾為高巽為長木反在上為棟動起故上棟下宇謂屋邊也兑澤動下為下宇无妄之大壯巽風不見兑雨隔震與乾絶體故上棟下宇以待風雨盖取諸大壯者也古之葬者厚衣之以薪葬之中野不封不樹喪期无數後世聖人易之以棺槨盖取諸大過虞翻曰中孚上下象易也本无乾象故不言上古大過乾在中故但言古者巽為薪艮為厚乾為衣為野乾象在中故厚衣之以薪葬之中野穿土稱封封古窆字也聚土為樹中孚无坤坎象故不封不樹坤為喪期謂從斬衰至緦麻日月之期數无坎離日月坤象故喪期无數巽為木為入處兑為口乾為人木而有口乾人入處棺斂之象中孚艮為山丘巽木在裏棺藏山陵椁之象也故取諸大過上古結繩而治後世聖人易之以書契百官以治萬民以察盖取諸夬九家易曰古者无文字其有約誓之事事大大其繩事小小其繩結之多少隨物衆寡各執以相考亦足以相治也夬本坤世下有伏坤書之象也上又見乾契之象也以乾照坤察之象也夬者決也取百官以書治職萬民以契明其事契刻也大壯進而成夬金決竹木為書契象故法夬而作書契矣虞翻曰履上下象易也乾象在上故復言上古巽為繩離為網罟乾為治故結繩以治後世聖人謂黄帝堯舜也夬旁通剥剥坤為書兑為契故易之以書契乾為百剥艮為官坤為衆臣為萬民為迷暗乾為治夬反剥以乾照坤故百官以治萬民以察故取諸夬大壯大過夬此三盖取直兩象上下相易故俱言易之大壯本无妄夬本履卦乾象俱在上故言上古中孚本无乾象大過乾不在上故但言古者大過亦言後世聖人易之明上古時也是故易者象也干寶曰言是故又總結上義也虞翻曰易謂日月在天成八卦象縣象著明莫大日月是也象也者像也崔憬曰上明取象以制器之義故以此重釋於象言易者象於萬物象者形像之象也彖者材也虞翻曰彖説三才則三分天象以為三才謂天地人道也爻也者效天下之動者也虞翻曰動𤼵也謂兩三才為六畫則𤼵揮剛柔而生爻也是故吉凶生而悔吝著也虞翻曰爻象動内則吉凶見外吉凶悔吝者生乎動者也故曰著陽卦多隂隂卦多陽其故何也崔憬曰此明卦象隂陽與徳行也陽卦多隂謂震坎艮一陽而二隂隂卦多陽謂巽離兑一隂而二陽也陽卦竒隂卦耦其徳行何也虞翻曰陽卦一陽故竒隂卦二隂故耦謂徳行何可者也陽一君而二民君子之道也隂二君而一民小人之道也韓康伯曰陽君道也隂臣道也君以无為統衆无為則一也臣以有事代終有事則二也故陽爻畫一以明君道必一隂爻畫兩以明臣體必二斯隂陽之數君子之辯也以一為君君之徳也二居君位非其道也故陽卦曰君子之道也隂卦曰小人之道也易曰憧憧徃來朋從爾思翟𤣥曰此咸之九四辭也咸之為卦三君三民四獨逺隂思慮之爻也韓康伯曰天下之動必歸於一思以求朋未能寂寂以感物不思而至也子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮韓康伯曰夫少則得多則惑塗雖殊其歸則同慮雖百其致不二茍識其要不在博求一以貫之百慮而盡矣天下何思何慮虞翻曰易无思也既濟定六位得正故何思何慮日往則月來虞翻曰謂咸初往之四與五成離故日往與二成坎故月來之外日徃在内月來此就爻之正者也月徃則日來虞翻曰初變之四與上成坎故月徃四變之初與三成離故日來者也日月相推而明生焉虞翻曰既濟體兩離坎象故明生焉寒徃則暑來虞翻曰乾為寒坤為暑謂隂息陽消從姤至否故寒徃暑來也暑徃則寒來虞翻曰隂詘陽信從復至泰故暑徃寒來也寒暑相推而嵗成焉崔憬曰言日月寒暑徃來雖多而明生嵗成相推則一何思何慮於其間哉徃者屈也荀爽曰隂氣徃則萬物屈者也來者信也荀爽曰陽氣來則萬物信者也屈信相感而利生焉虞翻曰感咸象故相感天地感而萬物化生聖人感人心而天下和平故利生利生謂陽出震隂伏藏尺蠖之屈以求信也荀爽曰以喻隂陽氣屈以求信也龍蛇之蟄以存身也虞翻曰潛藏也龍潛而蛇藏隂息初巽為蛇陽息初震為龍十月坤成十一月復生姤巽在下龍蛇俱蟄初坤為身故龍蛇之蟄以存身侯果曰不屈則不信不蟄則无存則屈蟄相感而後利生矣以况无思得一則萬物歸思矣莊子曰古之畜天下者其治一也記曰通於一萬事畢无心得鬼神服此之謂矣蠖屈行蟲郭璞云蝍􅠸也精義入神以致用也姚信曰陽稱精隂為義入在初也隂陽在初深不可測故謂之神變為姤復故曰致用也韓康伯曰精義物理之微者也神寂然不動感而遂通者也理入寂一則精義斯得乃用无極也干寳曰能精義理之微以得未然之事是以涉於神道而逆禍福也利用安身以崇徳也九家易曰利用隂道用也謂姤時也隂升上兑則乾伏坤中屈以求信陽當復升安身嘿處也時既潛藏故利用安身以崇其徳崇徳體卑而徳高韓康伯曰利用之道皆安其身而後動也精義由於入神以致其用利用由於安以崇其徳理必由乎其宗事各本乎其根歸根則寜天下之理得也若役其思慮以求動用忘其安身以殉功義則偽彌多而理愈失名彌美而累愈彰矣過此以徃未之或知也荀爽曰出乾之外无有知之窮神知化徳之盛也虞翻曰以坤變乾謂之窮神以乾通坤謂之知化乾為盛徳故徳之盛侯果曰夫精義入神利用崇徳亦一致之道極矣過斯以徃則未之能知也若窮於神理通於變化則徳之盛者能矣易曰困于石據于蒺藜入于其宫不見其妻凶孔頴達曰上章先言利用安身可以崇徳若身危辱何崇之有此章引困之六三履非其位欲上于四四自應初不納于已是困於九二之蒺藜也又有入于其宫不見其妻凶之象也子曰非所困而困焉名必辱虞翻曰困本咸咸三入宫以陽之隂則二制坤故以決咸為四所困四失位惡人故非所困而困焉陽稱名隂為辱以陽之隂下故名必辱也非所據而據焉身必危虞翻曰謂據二二失位故非所據而據焉二變時坤為身二折坤體故身必危既辱且危死期將至妻其可得見耶陸績曰六三從困辱之家變之大過為棺椁死喪之象故曰死期將至妻不可得見易曰公用射隼于髙墉之上獲之无不利孔頴達曰前章先須安身可以崇徳故此明藏器於身待時而動是有利也故引解之上六以證之矣子曰隼者禽也虞翻曰離為隼故稱禽言其行野容如禽獸焉弓矢者器也虞翻曰離為矢坎為弓坤為器射之者人也虞翻曰人賢人也謂乾三伏陽出而成乾故曰射之者人人則公三應上故上令三出而射隼也君子藏器於身待時而動何不利之有虞翻曰三伏陽為君子二變時坤為身為藏器為藏弓矢以待射隼艮為待為時三待五來之二弓張矢𤼵動出成乾貫隼入大過死兩坎象壊故何不利之有象曰以解悖三隂小人乗君子器故上觀三出射去隼也動而不括是以出而有獲語成器而動者也虞翻曰括作也震為語乾五之坤二成坎弓離矢動以貫隼故語成器而動者也子曰小人不恥不仁不畏不義虞翻曰謂否也以坤滅乾為不仁不義坤為恥為畏乾為仁為義者也不見利不勸不威不懲虞翻曰否乾為威為利巽為近利謂否五之初成噬嗑市離日見乾為見利震為動故不見利不動五之初以乾威坤故不威不懲震為懲也小懲而大誡此小人之福也虞翻曰艮為小乾為大五下威初坤殺不行震懼虩虩故小懲大誡坤為小人乾為福以陽下隂民説無彊故小人之福也易曰屨校滅趾无咎此之謂也九家易曰噬嗑六五本先在初處非其位小人者也故歴説小人所以為罪終以致害雖欲為惡能止不行則无咎侯果曰噬嗑初九爻辭也校者以木夾足止行也此明小人因小刑而大誡乃福也善不積不足以成名虞翻曰乾為積善陽稱名惡不積不足以滅身虞翻曰坤為積惡為身以乾滅坤故滅身者也小人以小善為无益而弗為也虞翻曰小善為復初以小惡為无傷而弗去也虞翻曰小惡謂姤初故惡積而不可掩虞翻曰謂隂息姤至遯子弑其父故惡積而不可掩罪大而不可解虞翻曰隂息遯成否以臣弑君故罪大而不可解也易曰何校滅耳凶九家易曰噬嗑上九爻辭也隂自初升五所在失正積惡而罪大故為上所滅善不積斥五隂爻也聰不明者聞善不聴聞戒不改故凶也子曰危者安其位者也崔憬曰言有危之慮則能安其位不失也亡者保其存者也崔憬曰言有亡之慮則能保其存者也亂者有其治者也崔憬曰言有防亂之慮則能有其治者也是故君子安而不忘危虞翻曰君子大人謂否五也否坤為安危謂上也翟𤣥曰在安慮危存而不忘亡荀爽曰謂除戎器戒不虞也翟𤣥曰在存而慮亡治而不忘亂荀爽曰謂思患而逆防之翟𤣥曰在治而慮亂是以身安而國家可保也虞翻曰坤為身謂否反成泰君位定於内而臣忠於外故身安而國家可保也易曰其亡其亡荀爽曰存不忘亡也繫于包桑荀爽曰桑者上𤣥下黄乾坤相包以正故不可忘也陸績曰自此以上皆謂否隂滅陽之卦五在否家雖得中正常自懼以危亡之事者也子曰徳薄而位尊虞翻曰鼎四也則離九四凶惡小人故徳薄四在乾位故位尊知小而謀大虞翻曰兑為小知乾為大謀四在乾體故謀大矣力少而任重虞翻曰五至初體大過本末弱故力少也乾為仁故任重以為己任不亦重乎鮮不及矣虞翻曰鮮少也及于刑矣易曰鼎折足覆公餗其形渥凶言不勝其任也孔頴達曰言不能安身智小謀大而遇禍也故引鼎九四以證之矣子曰知㡬其神乎虞翻曰㡬謂陽也陽在復初稱㡬此謂豫四也惡鼎四折足故以此次言豫四知㡬而反復初也君子上交不謟下交不瀆虞翻曰豫上謂四也四失位謟瀆上謂交五五貴震為笑言笑言且謟也故上交不謟下謂交三坎為瀆故下交不瀆欲其復初得正元吉故其知㡬乎其知㡬乎侯果曰上謂王侯下謂凡庶君子上交不至謟媚下交不至瀆慢悔吝无從而生豈非知微者乎㡬者動之微吉之先見者也虞翻曰陽見初成震故動之微復初元吉吉之先見者也韓康伯曰㡬者去无入有理而未形者不可以名尋不可以形覩也唯神也不疾而速感而遂通故能𤣥照鑒於未形也合抱之木起於毫末吉凶之彰始乎微兆故言吉之先見君子見㡬而作不俟終日易曰介于石不终日貞吉介如石焉寜用終日斷可識矣孔頴達曰前章云精義入神此明知㡬入神之事故引豫之六二以證之崔憬曰此爻得位居中於豫之時能順以動而防於豫如石之耿介守志不移雖暫豫樂以其見微而不終日則能貞吉斷可知矣君子知微知彰知柔知剛姚信曰此謂豫卦也二下交初故曰知微上交於三故曰知彰體坤處和故曰知柔與四同功故曰知剛萬夫之望荀爽曰聖人作而萬物覩干寶曰言君子茍達於此則萬夫之望矣周公聞齊魯之政知後世彊弱之勢辛有見被髪而祭則知為戎狄之居凡若此類可謂知㡬也皆稱君子君子則以得㡬不必聖者也子曰顔氏之子其殆庶㡬乎虞翻曰㡬者神妙也顔子知微故殆庶㡬孔子曰回也其庶㡬乎有不善未嘗不知虞翻曰復以自知老子曰自知者明知之未嘗復行也虞翻曰謂顔回不遷怒不貳過克已復禮天下歸仁周易集解卷十五
